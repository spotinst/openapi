type: object
title: Ocean Rightsizing Recommendation History Item
description: >
  Recommendation snapshot for a workload at a specific point in time.
properties:
  podCount:
    type: integer
    description: Number of pods in the workload at recommendation time.
  cpu:
    type: object
    description: CPU recommendation details.
    properties:
      requested:
        type: number
      recommended:
        type: number
      limit:
        type: number
      p99:
        type: number
      p95:
        type: number
      p90:
        type: number
      p85:
        type: number
  memory:
    type: object
    description: Memory recommendation details.
    properties:
      requested:
        type: number
      recommended:
        type: number
      limit:
        type: number
      p100:
        type: number
      p95:
        type: number
      p90:
        type: number
      p85:
        type: number
  recommendedAt:
    type: integer
    format: int64
    description: Unix epoch timestamp in milliseconds when the recommendation was generated.
