type: object
title: Ocean Rightsizing Recommendation History Item
description: >
  Recommendation snapshot for a workload container at a specific point in time.
properties:
  timestamp:
    type: integer
    format: int64
    description: Unix epoch timestamp in milliseconds.
  namespace:
    type: string
    description: Namespace of the workload.
  workloadName:
    type: string
    description: Name of the workload.
  workloadType:
    type: string
    description: Type of the workload.
  containerName:
    type: string
    description: Name of the container.
  requestedCPU:
    type: number
    description: Current requested CPU.
  suggestedCPU:
    type: integer
    description: Recommended CPU request.
  requestedMemory:
    type: number
    description: Current requested memory.
  suggestedMemory:
    type: integer
    description: Recommended memory request.
  monthlyMaxSavings:
    type: number
    description: Estimated monthly maximum savings.
  optimizationStatus:
    type: string
    description: Optimization status of the workload recommendation.
  appliedAt:
    type: string
    format: date-time
    description: Timestamp when recommendation was applied.

