type: object
description: Common Ocean cluster fields.
properties:
  id:
    type: string
    readOnly: true
    description: Ocean cluster identifier.
    example: "o-abcd1234"
  createdAt:
    type: string
    readOnly: true
    format: date-time
    example: "2021-03-17T08:13:08.000Z"
    description: |
      A timestamp of the cluster creation.
  updatedAt:
    type: string
    readOnly: true
    format: date-time
    example: "2021-03-17T15:06:13.000Z"
    description: |
      A timestamp of the latest cluster update.

