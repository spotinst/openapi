type: object
title: Purchase Plan
description: |
  Defines the Azure Marketplace purchase plan for the VM image or persisted OS disk.
  * Use this when the selected marketplace image, gallery image, or persisted OS disk requires plan metadata.
required:
  - publisher
  - product
  - name
properties:
  publisher:
    type: string
    description: |
      Purchase plan publisher.
    example: "canonical"
  product:
    type: string
    description: |
      Purchase plan product / offer.
    example: "0001-com-ubuntu-pro-jammy"
  name:
    type: string
    description: |
      Purchase plan name / SKU.
    example: "pro-22_04-lts"
