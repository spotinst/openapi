type: object
title: savings:extended:resource
properties:
  resources:
    type: array
    items:
      anyOf:
        - $ref: "../schemas/resourceSavingsExampleOcean.yaml"
        - $ref: "../schemas/resourceSavingsExampleElastigroup.yaml"
  summary:
    type: object
    properties:
      runningHours:
        type: number
        format: float
        example: 117.30
      actualCosts:
        type: number
        format: float
        example: 207.30
      potentialCosts:
        type: number
        format: float
        example: 11378.41
      amountSaved:
        type: number
        format: float
        example: 1306.77
