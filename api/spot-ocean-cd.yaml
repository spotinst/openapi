openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Ocean CD
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@spot.io
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags:
  - name: Ocean CD
    description: |
      Ocean CD is a fully managed continuous delivery ('CD') solution for Kubernetes applications. Designed for end-to-end automation and verification of frequent application-deployment processes at scale.
      Ocean CD architecture and API enable a simple and secured installation that seamlessly fits into any Kubernetes environment. Users get key features like granular visibility, SaaS logic that manage the rollout process, verifications of the applied workloads and automatic rollbacks.
      To enable Ocean CD, install the controller with one simple command in the Kubernetes cluster and create the following entities using the API:
      * Strategy
      * Rollout Spec
    externalDocs:
      description: Ocean CD
      url: https://docs.flexera.com/spot/ocean-cd/
paths:
  /ocean/cd/cluster:
    summary: Ocean CD
    get:
      summary: List Ocean CD Clusters
      description: |
        List all Ocean CD clusters.
      operationId: OceanCDClusterList
      tags:
        - Ocean CD
      responses:
        '200': &ref_0
          description: Ocean CD Cluster Response
          content:
            application/json:
              schema:
                allOf:
                  - &ref_1
                    type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties.
                        properties:
                          id:
                            type: string
                            example: e593ff58-067d-4340-92f9-8b1c0bad70d7
                            description: |
                              Unique identifier associated with this request.
                          url:
                            type: string
                            description: |
                              The URL that was used for the request.
                          method:
                            type: string
                            description: |
                              The HTTP **METHOD** used for the request.
                          timestamp:
                            type: string
                            example: '2018-06-20T11:35:01.745Z'
                            description: |
                              When the request was received by Spot.
                      response:
                        type: object
                        description: |
                          Response package that includes status, type, and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response.
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code.
                  - type: object
                    properties:
                      response:
                        type: object
                        description: response body
                        properties:
                          items:
                            type: array
                            items:
                              allOf:
                                - type: object
                                  required:
                                    - cluster
                                  properties:
                                    lastHeartbeatTime:
                                      type: string
                                      example: '2018-11-05T12:55:50.000Z'
                                      description: |
                                        Time stamp of latest time the controller sent heartbeat.
                                    clusterInfo:
                                      type: object
                                      title: Ocean CD Cluster Info
                                      description: |
                                        Contains OceanCD cluster detailed information.
                                      properties:
                                        kubernetesVersion:
                                          type: string
                                        cloudProvider:
                                          type: string
                                        kubernetesOrchestrator:
                                          type: string
                                    operatorInfo:
                                      type: object
                                      title: Ocean CD Operator Info
                                      description: |
                                        Contains OceanCD operator detailed information.
                                      properties:
                                        kubernetesVersion:
                                          type: string
                                        nodeName:
                                          type: string
                                        operatorVersion:
                                          type: string
                                        podName:
                                          type: string
                                    operatorMetadata:
                                      type: object
                                      title: Ocean CD Operator Metadata
                                      description: |
                                        Contains OceanCD operator metadata information.
                                      properties:
                                        lastHeartbeatTime:
                                          type: string
                                          example: '2018-11-05T12:55:50.000Z'
                                          description: |
                                            Time stamp of latest time the operator controller sent heartbeat.
                                    omInfo:
                                      type: object
                                      title: Ocean CD Operator Manager Info
                                      description: |
                                        Contains OceanCD operator manager detailed information.
                                      properties:
                                        kubernetesVersion:
                                          type: string
                                        nodeName:
                                          type: string
                                        operatorVersion:
                                          type: string
                                        podName:
                                          type: string
                                    omMetadata:
                                      type: object
                                      title: Ocean CD Operator Maanager Metadata
                                      description: |
                                        Contains OceanCD operator manager metadata information.
                                      properties:
                                        lastHeartbeatTime:
                                          type: string
                                          example: '2018-11-05T12:55:50.000Z'
                                          description: |
                                            Time stamp of latest time the operator manager controller sent heartbeat.
                                    argoRolloutInfo:
                                      type: object
                                      title: Argo Rollouts Metadata
                                      description: |
                                        Contains Argo Rollouts metadata information.
                                      properties:
                                        argoRolloutVersion:
                                          type: string
                                        lastHeartbeatTime:
                                          type: string
                                          example: '2018-11-05T12:55:50.000Z'
                                          description: |
                                            Time stamp of latest time the operator controller sent heartbeat.
                                - type: object
                                  properties:
                                    id:
                                      type: string
                                      example: oceanCluster
                                    createdAt:
                                      type: string
                                      example: '2018-11-05T12:55:50.000Z'
                                    updatedAt:
                                      type: string
                                      example: '2018-11-05T12:58:15.000Z'
        '400':
          description: Bad Request
  /ocean/cd/cluster/{clusterId}:
    summary: Ocean CD
    get:
      summary: Get Ocean CD Cluster
      description: |
        Get an existing Ocean CD cluster.
      operationId: OceanCDClusterGet
      tags:
        - Ocean CD
      parameters:
        - in: path
          name: clusterId
          schema:
            type: string
          required: true
          example: cluster-prod
          description: |
            The identifier of the Ocean CD cluster
      responses:
        '200': *ref_0
        '400':
          description: Bad Request
  /ocean/cd/verificationProvider:
    summary: Ocean CD
    post:
      summary: Create Ocean CD Verification Provider
      description: |
        Create Ocean CD Verification Provider. Only one provider type can be defined
      operationId: OceanCDVerificationProviderCreate
      tags:
        - Ocean CD
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: Ocean CD Verification Provider Request
                  description: |
                    Ocean CD Verification Provider request entity.
                  required:
                    - verificationProvider
                  properties:
                    verificationProvider:
                      type: object
                      required: &ref_2
                        - name
                        - clusterIds
                      properties: &ref_3
                        name:
                          type: string
                          description: Identifier name for Ocean CD Verification Provider. Must be unique
                          example: datadog-prod
                        clusterIds:
                          description: List of cluster IDs that this Verification Provider will be applied to
                          type: array
                          items:
                            type: string
                          example:
                            - prod-cluster-1
                            - prod-cluster-2
                        prometheus:
                          type: object
                          required: &ref_5
                            - address
                          title: Ocean CD Verification Provider Prometheus
                          properties: &ref_6
                            address:
                              type: string
                              description: The address which the Prometheus server available on
                              example: http://localhost:9090
                        datadog:
                          type: object
                          required: &ref_7
                            - address
                            - apiKey
                            - appKey
                          title: Ocean CD Verification Provider Datadog
                          properties: &ref_8
                            address:
                              type: string
                              description: DataDog API URL
                              example: https://api.datadoghq.eu
                            apiKey:
                              type: string
                              description: API key required by the Datadog Agent to submit metrics and events to Datadog
                              example: AUO32RN20oUMD-40283
                            appKey:
                              type: string
                              description: API key that gives users access to Datadog’s programmatic API
                              example: APP-113ndsKlfmaoN
                        newRelic:
                          type: object
                          required: &ref_9
                            - personalApiKey
                            - accountId
                          title: Ocean CD Verification Provider NewRelic
                          properties: &ref_10
                            personalApiKey:
                              type: string
                              description: The NewRelic user key
                              example: AUO32RN20oUMD-40283
                            accountId:
                              type: string
                              description: The ID number New Relic assigns to their account
                              example: account-0189718
                            region:
                              type: string
                              description: A region which the account is attached to. Default is "us"
                              example: eu
                            baseUrlRest:
                              type: string
                              description: The base URL of the New Relic REST API for a proxy
                              example: https://rest.api.newrelic.eu
                            baseUrlNerdGraph:
                              type: string
                              description: The base URL for NerdGraph for a proxy
                              example: https://nerdgraph.api.newrelic.eu
                        cloudWatch:
                          type: object
                          required: &ref_11
                            - iamArn
                          title: Ocean CD Verification Provider CloudWatch
                          properties: &ref_12
                            iamArn:
                              type: string
                              description: AWS resource that has permissions for cloudwatch:GetMetricData
                              example: arn:aws:iam::123456789012:role/GetMetricData
                        jenkins:
                          type: object
                          required: &ref_13
                            - baseUrl
                            - username
                            - apiToken
                          title: Ocean CD Verification Provider Jenkins
                          properties: &ref_14
                            baseUrl:
                              type: string
                              description: The address of the Jenkins server within the cluster.
                              example: http://localhost:9090
                            username:
                              type: string
                              description: The Jenkins server’s access username.
                              example: admin
                            apiToken:
                              type: string
                              description: The Jenkins server’s access apiToken.
                              example: AbCDeeFFGG
      responses:
        '200': &ref_4
          description: Ocean CD Verification Provider Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_1
                  - type: object
                    properties:
                      response:
                        type: object
                        description: response body
                        properties:
                          items:
                            type: array
                            items:
                              allOf:
                                - type: object
                                  required: *ref_2
                                  properties: *ref_3
                                - &ref_23
                                  type: object
                                  properties:
                                    createdAt:
                                      type: string
                                      description: The time when the entity was created
                                      example: '2018-11-05T12:55:50.000Z'
                                    updatedAt:
                                      type: string
                                      description: The last time when the entity was updated
                                      example: '2018-11-05T12:58:15.000Z'
        '400':
          description: Bad Request
    get:
      summary: List Ocean CD Verification Providers
      description: |
        List all Ocean CD Verification Providers.
      operationId: OceanCDVerificationProviderList
      tags:
        - Ocean CD
      responses:
        '200': *ref_4
        '400':
          description: Bad Request
  /ocean/cd/verificationProvider/{name}:
    summary: Ocean CD
    get:
      summary: Get Ocean CD Verification Provider
      description: |
        Get an existing Ocean CD Verification Provider.
      operationId: OceanCDVerificationProviderGet
      tags:
        - Ocean CD
      parameters:
        - in: path
          name: name
          schema:
            type: string
          required: true
          example: datadog-prod
          description: |
            The identifier of the Ocean CD Verification Provider
      responses:
        '200': *ref_4
        '400':
          description: Bad Request
    put:
      summary: Update Ocean CD Verification Provider
      description: |
        Full Update of Ocean CD Verification Provider configuration.
        *All non included fields will be nullified*
      operationId: OceanCDVerificationProviderUpdate
      tags:
        - Ocean CD
      parameters:
        - in: path
          name: name
          schema:
            type: string
          required: true
          example: datadog-prod
          description: |
            The identifier name of the Ocean CD Verification Provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: Ocean CD Verification Provider Request
                  description: |
                    Ocean CD Verification Provider request entity.
                  required:
                    - verificationProvider
                  properties:
                    verificationProvider:
                      type: object
                      required:
                        - clusterIds
                      properties:
                        clusterIds:
                          description: List of cluster ids that this Verification Provider will be applied to
                          type: array
                          items:
                            type: string
                          example:
                            - prod-cluster-1
                            - prod-cluster-2
                        prometheus:
                          type: object
                          required: *ref_5
                          title: Ocean CD Verification Provider Prometheus
                          properties: *ref_6
                        datadog:
                          type: object
                          required: *ref_7
                          title: Ocean CD Verification Provider Datadog
                          properties: *ref_8
                        newRelic:
                          type: object
                          required: *ref_9
                          title: Ocean CD Verification Provider NewRelic
                          properties: *ref_10
                        cloudWatch:
                          type: object
                          required: *ref_11
                          title: Ocean CD Verification Provider CloudWatch
                          properties: *ref_12
                        jenkins:
                          type: object
                          required: *ref_13
                          title: Ocean CD Verification Provider Jenkins
                          properties: *ref_14
      responses:
        '200':
          description: Ok
        '400':
          description: Bad Request
    patch:
      summary: Patch Ocean CD Verification Provider
      description: |
        Partial update Ocean CD Verification Provider configuration.
      operationId: OceanCDVerificationProviderPatch
      tags:
        - Ocean CD
      parameters:
        - in: path
          name: name
          schema:
            type: string
          required: true
          example: datadog-prod
          description: |
            The identifier name of the Ocean CD Verification Provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: Ocean CD Verification Provider Request
                  description: |
                    Ocean CD Verification Provider request entity.
                  required:
                    - verificationProvider
                  properties:
                    verificationProvider:
                      type: object
                      title: Ocean CD Verification Provider
                      description: |
                        Ocean CD Verification Provider spec entity.
                      properties:
                        clusterIds:
                          description: List of cluster ids that this Verification Provider will be applied to
                          type: array
                          items:
                            type: string
                          example:
                            - prod-cluster-1
                            - prod-cluster-2
                        prometheus:
                          type: object
                          required: *ref_5
                          title: Ocean CD Verification Provider Prometheus
                          properties: *ref_6
                        datadog:
                          type: object
                          required: *ref_7
                          title: Ocean CD Verification Provider Datadog
                          properties: *ref_8
                        newRelic:
                          type: object
                          required: *ref_9
                          title: Ocean CD Verification Provider NewRelic
                          properties: *ref_10
                        cloudWatch:
                          type: object
                          required: *ref_11
                          title: Ocean CD Verification Provider CloudWatch
                          properties: *ref_12
                        jenkins:
                          type: object
                          required: *ref_13
                          title: Ocean CD Verification Provider Jenkins
                          properties: *ref_14
      responses:
        '200':
          description: Ok
        '400':
          description: Bad Request
    delete:
      summary: Delete Ocean CD Verification Provider
      description: |
        Delete an existing Ocean CD Verification Provider.
      operationId: OceanCDVerificationProviderDelete
      tags:
        - Ocean CD
      parameters:
        - in: path
          name: name
          schema:
            type: string
          required: true
          example: datadog-prod
          description: |
            The identifier name of the Ocean CD Verification Provider
      responses:
        '200':
          description: Ok
        '400':
          description: Bad Request
  /ocean/cd/verificationTemplate:
    summary: Ocean CD
    post:
      summary: Create Ocean CD Verification Template
      description: |
        Create Ocean CD Verification Template.
      operationId: OceanCDVerificationTemplateCreate
      tags:
        - Ocean CD
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: Ocean CD Verification Template Request
                  description: |
                    Ocean CD Verification Template request entity.
                  required:
                    - verificationTemplate
                  properties:
                    verificationTemplate:
                      type: object
                      required: &ref_21
                        - name
                        - metrics
                      description: The object specifying a set of metrics that need to be analyzed during the rollout, and the values that are considered successful or failed
                      properties: &ref_22
                        name:
                          type: string
                          example: latency-validation
                          description: Identifier name for Ocean CD Verification Template. Must be a unique name
                        args:
                          description: List of verification arguments. You may specify either `value` OR `valueFrom` but not both. In case `args`:`value` is already defined in the RolloutSpec entity, there is no need to also specify it in the VerificationTemplate entity
                          type: array
                          items:
                            type: object
                            title: Ocean CD Verification Template argument
                            required: &ref_25
                              - name
                            properties: &ref_26
                              name:
                                type: string
                                example: root-password
                                description: Name of an argument
                              value:
                                type: string
                                example: 12345678
                                description: String representation of data
                              valueFrom:
                                type: object
                                title: Ocean CD Verification Template argument
                                properties:
                                  secretKeyRef:
                                    type: object
                                    title: Ocean CD Verification Template Secret Key Ref
                                    description: Secret key to use
                                    required: &ref_45
                                      - name
                                      - key
                                    properties: &ref_46
                                      name:
                                        description: The name of the secret
                                        example: root-password-secret
                                        type: string
                                      key:
                                        description: The name of the field inside the secret
                                        example: root-password
                                        type: string
                        metrics:
                          description: List of verification metrics
                          type: array
                          items:
                            type: object
                            required: &ref_27
                              - name
                              - provider
                            title: Ocean CD Verification Metric
                            properties: &ref_28
                              name:
                                type: string
                                example: 5xx-errors
                                description: The name of the verification metric
                              dryRun:
                                type: boolean
                                example: false
                                description: Defines whether the metric should have an impact on the result of the rollout
                              interval:
                                type: string
                                example: 5m
                                description: Defines an interval string (30s, 5m, 1h) between each verification measurements. If omitted, will perform a single measurement. When choosing `Jenkins` as the provider, there is no need to send this variable.
                              initialDelay:
                                type: string
                                description: How long to wait before starting this metric measurements. When choosing `Jenkins` as the provider, there is no need to send this variable.
                                example: 1m
                              count:
                                type: integer
                                description: The number of times to run the measurement. If both interval and count are omitted, the effective count is 1. If only interval is specified, metric runs indefinitely. If count > 1, interval must be specified. When choosing `Jenkins` as the provider, there is no need to send this variable.
                                example: 10
                              successCondition:
                                type: string
                                description: An expression which determines if a measurement is considered successful. The keyword `result` is a variable reference to the value of measurement. Results can be both structured data or primitive. If successCondition is set, then failureCondition is not allowed. When choosing `Jenkins` as the provider, there is no need to send this variable.
                                example: result[0] <= 0.95
                              failureCondition:
                                type: string
                                description: An expression which determines if a measurement is considered failed. If failureCondition is set, then successCondition is not allowed. When choosing `Jenkins` as the provider, there is no need to send this variable.
                                example: result[0] >= 1.2
                              failureLimit:
                                type: integer
                                example: 2
                                description: The maximum number of times the measurement is allowed to fail, before the entire metric is considered failed. Default is 0. When choosing `Jenkins` as the provider, there is no need to send this variable.
                              consecutiveErrorLimit:
                                type: integer
                                example: 4
                                description: The maximum number of times the measurement is allowed to error in succession, before the metric is considered error. Default is 4. When choosing `Jenkins` as the provider, there is no need to send this variable.
                              provider:
                                type: object
                                title: Ocean CD Verification Metric Provider, only one provider type can be defined
                                description: The name of the monitoring tool chosen for the metric
                                properties:
                                  prometheus:
                                    type: object
                                    required: &ref_15
                                      - query
                                    title: Ocean CD Verification Prometheus Metric
                                    properties: &ref_16
                                      query:
                                        type: string
                                        description: A request for information retrieved from Prometheus
                                        example: http_requests_total{status!~"5.."}"
                                  newRelic:
                                    type: object
                                    title: Ocean CD Verification NewRelic Metric
                                    required: &ref_17
                                      - query
                                    properties: &ref_18
                                      profile:
                                        type: string
                                        example: account-12345678
                                        description: The name of the secret holding NR account configuration
                                      query:
                                        type: string
                                        example: FROM Metric SELECT count(*)
                                        description: A raw newrelic NRQL query to perform
                                  datadog:
                                    type: object
                                    title: Ocean CD Verification Datadog Metric
                                    required: &ref_19
                                      - query
                                    properties: &ref_20
                                      duration:
                                        type: string
                                        description: The window of time we are looking at in DataDog. For example, if the values is `5m` then basically we will fetch data from (now-5m) to now
                                        example: 1m
                                      query:
                                        type: string
                                        description: A request for information retrieved from Datadog
                                        example: avg:kubernetes.cpu.user.total{*}
                                  cloudWatch:
                                    type: object
                                    title: Ocean CD Verification CloudWatch Metric
                                    required:
                                      - metricDataQueries
                                    properties:
                                      duration:
                                        type: string
                                        description: The window of time we are looking at in CloudWatch. For example, if the values is `5m` then basically we will fetch data from (now-5m) to now
                                        example: 5m
                                      metricDataQueries:
                                        type: array
                                        description: The metric queries to be returned. A single MetricData call can include as many as 500 MetricDataQuery structures. Each of these structures can specify either a metric to retrieve, a Metrics Insights query, or a math expression to perform on retrieved data
                                        items:
                                          required:
                                            - id
                                          type: object
                                          properties:
                                            id:
                                              type: string
                                              example: utilization
                                              description: The response ID. Must be unique and not null. This object can contain characters, letters, numbers and underscore. The first letter must be a lowercase letter
                                            metricStat:
                                              type: object
                                              description: The metric to be returned, along with statistics, period, and units. Use this parameter only if this object is retrieving a metric and not performing a math expression on returned data. WITHIN ONE METRICDATAQUERY OBJECT, YOU MUST SPECIFY EITHER EXPRESSION OR METRICSTAT BUT NOT BOTH
                                              properties:
                                                metric:
                                                  required:
                                                    - metricName
                                                  type: object
                                                  description: The metric to return, including the metric name, namespace, and dimensions
                                                  properties:
                                                    metricName:
                                                      type: string
                                                      example: CPUUtilization
                                                      description: The name of the metric
                                                    namespace:
                                                      type: string
                                                      example: AWS/EC2
                                                      description: The namespace of the metric
                                                    dimensions:
                                                      type: array
                                                      description: A dimension is a name/value pair that is part of the identity of a metric. Because dimensions are part of the unique identifier for a metric, whenever you add a unique name/value pair to one of your metrics, you are creating a new variation of that metric. You can assign up to 30 dimensions to a metric
                                                      items:
                                                        type: object
                                                        required:
                                                          - name
                                                          - value
                                                        properties:
                                                          name:
                                                            type: string
                                                            example: InstanceId
                                                            description: The name of the dimensions. These names must contain only ASCII characters, must include at least one non-whitespace character, and cannot start with a colon(':')
                                                          value:
                                                            type: string
                                                            example: i-1234567890abcdef
                                                            description: The value of the dimensions. These values must contain only ASCII characters and must include at least one non-whitespace character
                                                period:
                                                  type: integer
                                                  example: 300
                                                  description: The granularity, in seconds, of the returned data points. For metrics with regular resolution, a period can be as short as one minute (60 seconds) and must be a multiple of 60. For high-resolution metrics that are collected at intervals of less than one minute, the period can be 1, 5, 10, 30, 60, or any multiple of 60. High-resolution metrics are those metrics stored by a PutMetricData call that includes a StorageResolution of 1 second
                                                stat:
                                                  type: string
