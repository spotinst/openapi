                          example: service-strategy
                        canary: &ref_33
                          type: object
                          title: Ocean CD Strategy Canary
                          description: |
                            Represents Canary strategy
                          properties:
                            backgroundVerification:
                              type: object
                              title: Ocean CD Strategy Background Verification
                              description: A list of background verifications
                              properties:
                                templateNames:
                                  description: List of Verification Template names
                                  type: array
                                  items:
                                    type: string
                                    description: Name of a Verification Template
                                    example: verification-template-name
                              required:
                                - templateNames
                            steps:
                              type: array
                              description: A set of separate conditions of rollout processing
                              items:
                                type: object
                                title: Ocean CD Strategy Canary Step
                                description: |
                                  Defines a step of the canary strategy
                                properties:
                                  name:
                                    type: string
                                    description: The name of a step
                                    example: first-step
                                  setWeight:
                                    type: integer
                                    description: Defines the percentage that the new version should receive
                                    example: 20
                                  setCanaryScale:
                                    type: object
                                    title: Ocean CD Strategy Canary Step Scale
                                    description: |
                                      Defines how to scale the version without traffic weight changing
                                    properties:
                                      weight:
                                        type: integer
                                        description: Sets the percentage of replicas the new version should have
                                        example: 20
                                      replicas:
                                        type: integer
                                        description: Sets the number of replicas the new version should have
                                        example: 20
                                      matchTrafficWeight:
                                        type: boolean
                                        description: Defines whether a rollout should match the current canary's setWeight step
                                        example: true
                                  verification: &ref_29
                                    type: object
                                    title: Ocean CD Strategy Step Verification
                                    description: |
                                      Represents the list of verifications to run in a step
                                    properties:
                                      templateNames:
                                        description: List of Verification Template names
                                        type: array
                                        items:
                                          type: string
                                        example:
                                          - 5xx-errors
                                    required:
                                      - templateNames
                                  pause: &ref_30
                                    type: object
                                    title: Ocean CD Strategy Step Pause
                                    description: |
                                      Defines the duration of time to freeze the rollout
                                    properties:
                                      duration:
                                        type: string
                                        description: The amount of time to wait before moving to the next step
                                        example: 5m
                                  setHeaderRoute:
                                    type: object
                                    title: Ocean CD Strategy Canary Step Header
                                    description: |
                                      Defines the list of HeaderRoutes to add to the Rollout
                                    properties:
                                      name:
                                        type: string
                                        description: The name of the HeaderRoute group
                                        example: set-header-1
                                      match:
                                        type: array
                                        description: The matching rules for the header route
                                        items:
                                          type: object
                                          title: Ocean CD Strategy Canary Step Header Match
                                          description: |
                                            Defines a single header to add to the Rollout
                                          properties:
                                            headerName:
                                              type: string
                                              description: The name of the header
                                              example: User-Agent
                                            headerValue:
                                              type: object
                                              title: Ocean CD Strategy Canary Step Header Match Value
                                              description: |
                                                Defines a single header to add to the Rollout.
                                                <p style=color:red>Must be only one initialized from the following (exact, prefix, regex).</p>
                                              properties:
                                                exact:
                                                  type: string
                                                  description: The exact header value
                                                  example: Mozilla
                                                prefix:
                                                  type: string
                                                  description: The prefix of the value
                                                  example: Mozilla-
                                                regex:
                                                  type: string
                                                  description: The value in a regex format
                                                  example: Mozilla(.*)
                                          required:
                                            - headerName
                                            - headerValue
                                    required:
                                      - name
                                      - match
                          required:
                            - steps
