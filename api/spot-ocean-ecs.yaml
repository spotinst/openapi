                                description: |
                                  Unique identifier associated with this request.
                              url:
                                type: string
                                description: |
                                  The URL that was used for the request.
                              method:
                                type: string
                                description: |
                                  The HTTP **METHOD** used for the request.
                              timestamp:
                                type: string
                                example: '2018-06-20T11:35:01.745Z'
                                description: |
                                  When the request was received by Spot.
                            example: &ref_0
                              id: e593ff58-067d-4340-92f9-8b1c0bad70d7
                              timestamp: '2018-06-20T11:35:01.745Z'
                          response:
                            type: object
                            description: |
                              Response package that includes status, type, and any relevant data.
                            properties:
                              status:
                                type: object
                                properties:
                                  code:
                                    type: integer
                                    example: 200
                                    description: |
                                      HTTP status code assigned to this response.
                                  message:
                                    type: string
                                    example: OK
                                    description: |
                                      HTTP status message for the respective status code.
                                example:
                                  code: 200
                                  message: OK
                            example: &ref_1
                              status:
                                code: 200
                                message: OK
                        example:
                          request: *ref_0
                          response: *ref_1
                      - type: object
                        properties:
                          response:
                            type: object
                            properties:
                              count:
                                type: integer
                                example: 1
                                description: |
                                  Size of the data object array.
                              kind:
                                type: string
                                description: |
                                  The data type of each item in the response.
                            example:
                              count: 1
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items: &ref_35
                              type: object
                              required:
                                - cluster
                              properties:
                                cluster:
                                  type: object
                                  title: ECS Ocean
                                  properties:
                                    id:
                                      type: string
                                      example: o-12345abc
                                      readOnly: true
                                      description: |
                                        Ocean cluster identifier.
                                    name:
                                      type: string
                                      example: Ocean::my-elastigroup-name
                                      description: |
                                        Add a name for the Ocean cluster.
                                    clusterName:
                                      type: string
                                      example: my-ECS-cluster-name
                                      description: |
                                        ECS cluster name.
                                    autoScaler: &ref_15
                                      type: object
                                      title: Ocean Autoscaler
                                      description: |
                                        The Ocean ECS Autoscaler.
                                      properties:
                                        isEnabled:
                                          type: boolean
                                          description: |
                                            Enable the Ocean ECS Autoscaler.
                                          example: true
                                        cooldown:
                                          type: integer
                                          description: |
                                            Cooldown period between scaling actions. Value should be cooldown period in seconds, greater than 180.
                                          example: 300
                                        resourceLimits:
                                          type: object
                                          description: |
                                            Optionally set upper and lower bounds on the resource usage of the cluster.
                                          properties:
                                            maxMemoryGib:
                                              type: integer
                                              description: |
                                                The maximum memory in GiB units that can be allocated to the cluster. Minimum value: 1.
                                              example: 1
                                            maxVCpu:
                                              type: integer
                                              description: |
                                                The maximum CPU in vCPU units that can be allocated to the cluster. Minimum value: 1.
                                              example: 1
                                          example:
                                            maxMemoryGib: 1
                                            maxVCpu: 1
                                        down:
                                          type: object
                                          description: |
                                            Autoscaling scale down operations.
                                          properties:
                                            evaluationPeriods:
                                              type: integer
                                              example: 4
                                            maxScaleDownPercentage:
                                              type: integer
                                              description: |
                                                The maximum portion (as a %) of nodes that will be scaled down at once out of the total number of potential nodes to scale down.
                                                Example: If there are 10 nodes to scale down and the parameter is 50%, then only 5 nodes will be scaled down at once.
                                                The other 5 nodes will be scaled down in the next autoscaling iteration.
                                              example: 20
                                          example:
                                            evaluationPeriods: 4
                                            maxScaleDownPercentage: 20
                                        headroom:
                                          type: object
                                          description: |
                                            Spare resource capacity management enabling fast assignment of pods without waiting for new resources to launch.
                                          properties:
                                            cpuPerUnit:
                                              type: integer
                                              description: |
                                                Optionally configure the number of CPUs to allocate per headroom unit. CPUs are denoted in CPU units, where 1024 units = 1 vCPU.
                                              example: 2048
                                            memoryPerUnit:
                                              type: integer
                                              description: |
                                                Optionally configure the amount of memory (MiB) to allocate per headroom unit.
                                              example: 3
                                            numOfUnits:
                                              type: integer
                                              description: |
                                                The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                              example: 2
                                          example:
                                            cpuPerUnit: 2048
                                            memoryPerUnit: 3
                                            numOfUnits: 2
                                        isAutoConfig:
                                          type: boolean
                                          description: |
                                            Use automatic headroom. When set to true, the values under cluster.autoScaler.headroom are not effective, as Ocean configures and optimizes headroom automatically. The auto headroom is calculated based on the service with the most changed task in the cluster, not taking the Virtual Node Group's settings into consideration.
                                          example: false
                                        autoHeadroomPercentage:
                                          type: integer
                                          description: |
                                            Optionally set the auto-headroom percentage. Set a number between 0-200 to control the headroom % of the cluster. Relevant when isAutoConfig=true.
                                          example: 20
                                        shouldScaleDownNonServiceTasks:
                                          type: boolean
                                          description: |
                                            Option to scale down non-service tasks. If not set, Ocean does not scale down standalone tasks.
                                          default: false
                                          example: true
                                        enableAutomaticAndManualHeadroom:
                                          type: boolean
                                          description: |
                                            When set to true, both automatic and per custom Virtual Node Group manual headroom to be saved concurrently and independently in the cluster. prerequisite: isAutoConfig must be true
                                          example: false
                                      example: &ref_28
                                        isEnabled: true
                                        cooldown: 300
                                        resourceLimits:
                                          maxMemoryGib: 1
                                          maxVCpu: 1
                                        down:
                                          evaluationPeriods: 4
                                          maxScaleDownPercentage: 20
                                        headroom:
                                          cpuPerUnit: 2048
                                          memoryPerUnit: 3
                                          numOfUnits: 2
                                        isAutoConfig: false
                                        autoHeadroomPercentage: 20
                                        shouldScaleDownNonServiceTasks: true
                                        enableAutomaticAndManualHeadroom: false
                                    capacity: &ref_16
                                      type: object
                                      title: Capacity Units
                                      description: |
                                        Capacity specifications for the Ocean cluster.
                                      properties:
                                        minimum:
                                          type: integer
                                          example: 1
                                          description: |
                                            The bottom limit of instances that the cluster can scale down to.
                                        maximum:
                                          type: integer
                                          example: 10
                                          description: |
                                            The upper limit of instances that the cluster can scale up to.
                                          default: 1000
                                        target:
                                          type: integer
                                          example: 5
                                          description: |
                                            Number of instances to launch and maintain in cluster.h
                                      example: &ref_29
                                        minimum: 1
                                        maximum: 10
                                        target: 5
                                    strategy: &ref_17
                                      type: object
                                      title: Ocean Strategy
                                      description: |
                                        Strategy Configuration of the Ocean cluster.
                                      properties:
                                        utilizeReservedInstances:
                                          type: boolean
                                          description: |
                                            If reserved instances exist, Ocean will use them before launching spot instances.
                                          example: true
                                          default: false
                                        fallbackToOd:
                                          type: boolean
                                          description: |
                                            If no spot instance markets are available, enable Ocean to launch on-demand instances instead.
                                          example: true
                                          default: true
                                        spotPercentage:
                                          type: integer
                                          example: 100
                                        drainingTimeout:
                                          type: integer
                                          description: |
                                            The draining timeout (in seconds) before terminating the instance. If no draining timeout is defined, the default draining timeout will be used.
                                          example: 200
                                        utilizeCommitments:
                                          type: boolean
                                          description: |
                                            If savings plans commitment has available capacity, Ocean will utilize them alongside RIs (if exist) to maximize cost efficiency.
                                          example: false
                                          default: false
                                        clusterOrientation:
                                          type: object
                                          properties:
                                            availabilityVsCost:
                                              type: string
                                              description: |
                                                You can control the approach that Ocean takes while launching nodes by configuring this value.
                                              enum:
                                                - costOriented
                                                - balanced
                                                - cheapest
                                              example: balanced
                                              default: balanced
                                          example:
                                            availabilityVsCost: balanced
                                      example: &ref_30
                                        utilizeReservedInstances: true
                                        fallbackToOd: true
                                        spotPercentage: 100
                                        drainingTimeout: 200
                                        utilizeCommitments: false
                                        clusterOrientation:
                                          availabilityVsCost: balanced
                                    compute:
                                      type: object
                                      title: Ocean Compute
                                      properties:
                                        subnetIds:
                                          type: array
                                          description: |
