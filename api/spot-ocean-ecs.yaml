  /ocean/aws/ecs/cluster/{oceanClusterId}/aggregatedCosts:
    post:
      summary: Get Ecs Cluster Aggregated Detailed Costs
      description: |
        Provides Ecs cluster resource usage and costs over a time interval which can be grouped and/or filtered by AWS tags,\
        for example - application name (webapp, backend), environment (production, staging), version etc.\
        The response will contain a breakdown of the cluster resource costs($) in terms of compute (CPU, memory), storage (block, file, rootVolume).
        The response will group the cluster usage costs based on the preselected default of Ecs Group Type which is composed of Service, Headroom, Custom Object,
        Idle and Standalone, or user selected AWS tags.\
        Within the default grouping, costs are broken down for the Service group, and for tag grouping the costs will be broken up by tag value.

        Time Rounding Down: The CostAnalysis API applies rounding down to the hours provided during the call.\
        For example, the value 1707004799099 (In GMT) representing Saturday, February 3, 2024, 23:59:59.099 is rounded down to Saturday, February 3, 2024, 23:00:00.000, resulting in the omission of one hour of cost.
      operationId: oceanECSClusterAggregatedDetailedCosts
      tags:
        - Ocean ECS
      parameters:
        - *ref_51
        - *ref_14
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - endTime
                    - startTime
                  properties:
                    startTime:
                      type: string
                      example: 1675209600000
                      description: |
                        Beginning date value using either the date format "yyyy-MM-dd'T'HH:mm:ss'Z'" or ms "1494751821472".
                    endTime:
                      type: string
                      example: 1675216800000
                      description: |
                        End date value using either the date format "yyyy-MM-dd'T'HH:mm:ss'Z'" or ms "1494751821472".
                    groupBy:
                      type: string
                      description: |
                        The parameter we want to group the costs by, default is grouping by ECS group types. Only a tag key can be passed in.
                      example: env
                    filter:
                      type: object
                      description: Describe how to filter the costs. Optional field. Can only be used if grouping by tags.
                      required:
                        - conditions
                      properties:
                        conditions:
                          type: object
                          required:
                            - anyMatch
                          properties:
                            anyMatch:
                              type: array
                              description: |
                                Array of conditions set that OR operator is applied between them.
                              items:
                                type: object
                                required:
                                  - allMatch
                                properties:
                                  allMatch:
                                    type: array
                                    description: |
                                      Array of conditions that AND operator is applied between them.\
                                      For example, (label env equals prod) AND (label app exists)
                                    items:
                                      type: object
                                      description: The basic expression of a condition
                                      required:
                                        - key
                                        - operator
                                      properties:
                                        key:
                                          type: string
                                          description: |
                                            May be any string, but shouldn't be empty.
                                          example: env
                                        operator:
                                          type: string
                                          example: equals
                                          enum:
                                            - equals
                                            - notEquals
                                            - exists
                                            - notExists
                                        value:
                                          type: string
                                          description: |
                                            Required whenever the operator is "equals" or "notEquals".
                                          example: dev
                                      example:
                                        key: env
                                        operator: equals
                                        value: dev
                                example:
                                  allMatch:
                                    - key: env
                                      operator: equals
                                      value: dev
                              example: &ref_72
                                - allMatch:
                                    - key: env
                                      operator: equals
                                      value: dev
                                    - key: app
                                      operator: exists
                                - allMatch:
                                    - key: team
                                      operator: exists
                          example:
                            anyMatch: *ref_72
                      example:
                        conditions:
                          anyMatch: *ref_72
