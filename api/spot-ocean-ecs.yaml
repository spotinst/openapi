  /mcs/ecs/cluster/{clusterName}/costs:
    get:
      summary: Get Cluster Costs
      description: |
        Describes ECS cluster costs in a time range.\
        The response will provide the distribution of the costs per cluster.

        <span><strong>Deprecated API:</strong></span></span>
        This API is no longer supported. As an alternative you may use the "Get Ecs Cluster Aggregated Detailed Costs" API.
      operationId: oceanEcsClusterCosts
      tags:
        - Ocean ECS
      parameters:
        - *ref_0
        - *ref_33
        - *ref_34
        - in: query
          name: region
          example: us-east-1
          description: |
            Region name.
          schema:
            type: string
          required: true
        - in: path
          name: clusterName
          schema:
            type: string
          required: true
          example: ocean.ecs
          description: |
            The name of the ECS cluster, as set in the Ocean cluster configuration under the "clusterName" field.
      responses:
        '200':
          description: Ocean ECS Cluster Costs Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_13
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /mcs/ecs/cluster/my-cluster-identifier/costs
                          method:
                            example: GET
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                totalCost:
                                  type: number
                                  format: float
                                  example: 279.9907
                                headroomCost:
                                  type: number
                                  format: float
                                  example: 279.9907
                                standAloneTasksCost:
                                  type: number
                                  format: float
                                  example: 0
                                ecsGroups:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                        example: default
                                      cost:
                                        type: number
                                        format: float
                                        example: 18.00862
                                      type:
                                        type: string
                                        example: SERVICE
                                        enum:
                                          - SERVICE
                                          - HEADROOM
                                          - STAND_ALONE
                                          - IDLE
        '400':
          description: Bad Request
  /ocean/aws/ecs/launchSpec/{launchSpecId}/launchContainerInstances:
    put:
      summary: Launch Container Instances In VNG
      description: |
        Launch container instances in virtual node group.
      operationId: OceanAWSEcsLaunchSpecLaunchNodes
      tags:
        - Ocean ECS
      parameters:
        - *ref_0
        - *ref_25
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - launchRequest
              properties:
                launchRequest:
                  type: object
                  title: Ocean ECS VNG Launch Request
                  required:
                    - amount
                  properties:
                    amount:
                      description: |
                        The number of container instances to launch.
                      type: integer
                      example: 5
      responses:
        '200':
          description: Ocean VNG Launch Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_13
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /ocean/aws/ecs/launchSpec/ols-12345abc/launchContainerInstances
                          method:
                            example: PUT
                      response:
                        type: object
                        properties:
                          launchSpecId:
                            type: string
                            example: ols-f73821bc
                          items:
                            type: array
