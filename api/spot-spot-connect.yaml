openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Spot Connect
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@flexera.com
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags: []
paths:
  /connect/executions/formatted_execution/{exe_id}:
    get:
      description: Get details for the selected workflow execution.
      operationId: get_formatted_execution_instance
      parameters:
        - &ref_0
          description: unique execution id
          in: path
          name: exe_id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  AutomationExecutionId:
                    description: SSM doc automation execution id.
                    type: string
                  AutomationExecutionStatus:
                    description: Status of execution.
                    type: string
                  DocumentName:
                    description: Name of the workflow
                    type: string
                  DocumentVersion:
                    description: Executed version of the workflow.
                    type: integer
                  ExecutedBy:
                    description: AWS role that executed the workflow.
                    type: string
                  ExecutionEndTime:
                    description: Time at which execution ended.
                    format: date-time
                    type: string
                  ExecutionStartTime:
                    description: Start time of the execution.
                    format: date-time
                    type: string
                  Mode:
                    type: string
                  Outputs:
                    description: Outputs of the execution.
                    properties: {}
                    type: object
                  Parameters:
                    description: Runtime parameters for execution.
                    properties: {}
                    type: object
                  PostProcessingCompletedAt:
                    description: Time at which post processing was completed.
                    format: date-time
                    type: string
                  ResolvedTargets:
                    properties: {}
                    type: object
                  StepExecutions:
                    description: List of steps in workflow execution.
                    items:
                      properties:
                        Action:
                          description: Action of the step in the workflow.
                          type: string
                        ExecutionEndTime:
                          description: Time when step execution ended.
                          format: date-time
                          type: string
                        ExecutionStartTime:
                          description: Time when execution started.
                          format: date-time
                          type: string
                        Inputs:
                          description: Inputs for the step.
                          properties: {}
                          type: object
                        IsEnd:
                          description: Indicator for final step.
                          type: boolean
                        NextStep:
                          description: Name of the next step.
                          type: string
                        Outputs:
                          description: Outputs of the step.
                          properties: {}
                          type: object
                        OverriddenParameters:
                          description: Overridden Parameters of the step.
                          properties: {}
                          type: object
                        StepExecutionId:
                          description: Unique execution id of the step.
                          type: string
                        StepName:
                          description: Name of the step.
                          type: string
                        StepStatus:
                          description: Status of the step.
                          type: string
                        ValidNextSteps:
                          description: Valid next steps in the workflow.
                          items:
                            type: string
                          type: array
                      type: object
                    type: array
                  Targets:
                    items:
                      type: string
                    type: array
                  TaskId:
                    description: Integer id for execution task.
                    type: integer
                  TenantId:
                    description: Tenant id of the owner of the workflow.
                    type: string
                  Trigger:
                    description: User who triggered the workflow.
                    type: string
                  WorkflowDeleted:
                    description: Indicator if workflow is deleted.
                    type: boolean
                  WorkspaceId:
                    description: ID of workspace this workflow belongs to.
                    type: string
                type: object
          description: Success
        '400':
          content: {}
          description: Bad request
      summary: Get Execution
      tags:
        - Connect Executions
    parameters: []
  /connect/executions/formatted_execution/{exe_id}/download:
    get:
      description: Get link to download details for the selected workflow execution.
      operationId: get_formatted_execution_instance_download
      parameters:
        - *ref_0
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  redirect_url:
                    description: Redirect url.
                    type: string
                type: object
          description: Success
        '400':
          content: {}
          description: Bad request
      summary: Get Execution download url
      tags:
        - Connect Executions
    parameters: []
  /connect/executions/{name}:
    parameters: []
    post:
      description: Start the execution of the selected workflow.
      operationId: post_workflow_execution
      parameters:
        - description: DisplayName of a workflow
          in: path
          name: name
          required: true
          schema:
            type: string
        - description: Selected workflow version
          in: query
          name: version
          schema:
            type: string
        - description: Currently selected Workspace ID
          in: query
          name: workspace_id
          schema:
            type: string
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  exe_id:
                    description: Execution ID
                    type: string
                type: object
          description: Created
        '400':
          content: {}
          description: Bad Request
      summary: Start Execution
      tags:
        - Connect Executions
  /connect/schedules:
    get:
      description: List all scheduled workflows of the selected workspace.
      operationId: get_schedules_list
      parameters:
        - description: (optional) filter related schedules to a task
          in: query
          name: task_id
          schema:
            type: string
        - &ref_1
          description: currently selected Workspace ID
          in: query
          name: workspace_id
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema: &ref_3
                properties:
                  items:
                    description: List of workflow schedules.
                    items:
                      properties:
                        created_at:
                          description: Time when the schedule was created.
                          type: string
                        created_by:
                          description: Tenant ID for the user who created the schedule.
                          type: integer
                        created_by_username:
                          description: Name of the user who created the schedule.
                          type: string
                        enabled:
                          description: Status of the schedule (true for active and false for inactive).
                          type: boolean
                        rule:
                          description: Rule ID of the schedule
                          type: string
                        schedule_expression:
                          description: CRON expression for the schedule.
                          type: string
                        task_id:
                          description: Task ID for the schedule.
                          type: integer
                        workflow:
                          description: Name of the workflow.
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
        '400':
          content: {}
          description: Bad Request
      summary: List Scheduled Workflows
      tags:
        - Connect Schedules
    parameters: []
  /connect/schedules/{workflow_name}:
    delete:
      description: Delete a selected execution schedule of the selected workflow.
      operationId: delete_workflow_schedules
      parameters:
        - &ref_2
          description: unique workflow name only
          in: path
          name: workflow_name
          required: true
          schema:
            type: string
        - *ref_1
        - &ref_4
          description: version of workflow in schedule
          in: query
          name: version
          schema:
            type: string
      responses:
        '200':
          content: {}
          description: Deleted
        '400':
          content: {}
          description: Bad Request
      summary: Delete Schedule
      tags:
        - Connect Schedules
    get:
      description: List all execution schedules for the selected workflow.
      operationId: get_workflow_schedules
      parameters:
        - *ref_2
        - *ref_1
      responses:
        '200':
          content:
            application/json:
              schema: *ref_3
          description: Success
        '400':
          content: {}
          description: Bad Request
      summary: List Schedules for Workflow
      tags:
        - Connect Schedules
    parameters: []
    post:
      description: Create a new execution schedule for the selected workflow.
      operationId: post_workflow_schedules
      parameters:
        - *ref_2
        - *ref_1
      requestBody:
        content:
          application/json:
            schema:
              properties:
                expression:
                  description: CRON expression of the schedule.
                  type: string
                params:
                  description: Runtime parameters for the workflow.
                  properties: {}
                  type: object
                version:
                  description: Version of the workflow.
                  type: integer
              required:
                - expression
                - version
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  rule_name:
                    description: Rule ID of the schedule.
                    type: string
                type: object
          description: Created
        '400':
          content: {}
          description: Bad Request
      summary: Create Schedule
      tags:
        - Connect Schedules
      x-codegen-request-body-name: payload
    put:
      description: Enable/disable the status of the selected execution schedule.
      operationId: put_workflow_schedules
      parameters:
        - *ref_2
        - *ref_1
        - *ref_4
      responses:
        '200':
          content: {}
          description: Success
        '400':
          content: {}
          description: Bad Request
      summary: Update Schedule Status
      tags:
        - Connect Schedules
  /connect/settings/apikeys:
    get:
      description: Endpoint to fetch list of API Keys and its values.
      operationId: get_settings_api_keys
      parameters:
        - &ref_7
          description: Disable redacting API keys
          in: query
          name: disable_redact
          schema:
            type: string
        - &ref_5
          description: Currently selected Workspace ID
          in: query
          name: workspace_id
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  body:
                    allOf:
                      - properties:
                          apikeys:
                            description: List of API keys.
                            items: &ref_8
                              properties:
                                ApikeyName:
                                  description: API key name.
                                  type: string
                                CreatedDate:
                                  description: API key creation date.
                                  format: date-time
                                  type: string
                                Value:
                                  description: API key value.
                                  type: string
                              type: object
                            type: array
                        type: object
                    description: Response body.
                    type: object
                  statusCode:
                    description: HTTP status code.
                    type: integer
                type: object
          description: Success
        '400':
          content: {}
          description: Bad Request
      summary: List API Keys
      tags:
        - Connect Settings
    parameters: []
  /connect/settings/apikeys/{apikey_name}:
    delete:
      description: Endpoint to delete an API Key.
      operationId: delete_settings_api_key_item
      parameters:
        - &ref_6
          description: API key name
          in: path
          name: apikey_name
          required: true
          schema:
            type: string
        - *ref_5
      responses:
        '200':
          content:
            application/json:
              schema: &ref_10
                properties:
                  body:
                    allOf:
                      - &ref_9
                        properties:
                          message:
                            description: Success message.
                            type: string
                        type: object
                    description: Response body.
                    type: object
                  statusCode:
                    description: HTTP status code.
                    type: integer
                type: object
          description: Success
        '400':
          content: {}
          description: Bad Request
      summary: Delete API Key
      tags:
        - Connect Settings
    get:
      description: Endpoint to fetch the selected API key's information from the selected workspace.
      operationId: get_settings_api_key_item
      parameters:
        - *ref_6
        - *ref_7
        - *ref_5
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  body:
                    allOf:
                      - *ref_8
                    description: Response body.
                    type: object
                  statusCode:
                    description: HTTP status code.
                    type: integer
                type: object
          description: Success
        '400':
          content: {}
          description: Bad Request
        '500':
          content: {}
          description: Internal Server Error
      summary: Get API Key
      tags:
        - Connect Settings
    parameters: []
    post:
      description: Endpoint to create a new API Key.
      operationId: post_settings_api_key_item
      parameters:
        - *ref_6
        - *ref_5
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  body:
                    allOf:
                      - allOf:
                          - *ref_9
                          - properties:
                              value:
                                description: API key value.
                                type: string
                            type: object
                    description: Response body.
                    type: object
                  statusCode:
                    description: HTTP status code.
                    type: integer
                type: object
          description: Created
        '400':
          content: {}
          description: Bad Request
      summary: Create API Key
      tags:
        - Connect Settings
    put:
      description: Move the API key to the new workspace.
      operationId: put_settings_api_key_item
      parameters:
        - *ref_6
        - *ref_5
      responses:
        '200':
          content:
            application/json:
              schema: *ref_10
          description: Success
        '400':
          content: {}
          description: Bad Request
      summary: Update API Key
      tags:
        - Connect Settings
  /connect/settings/available/{service}:
    parameters: []
    post:
      description: |-
        Checks whether given Alias name is available for use
        for the selected service in the current organization.
      operationId: post_setting_check_alias
      parameters:
        - &ref_16
          description: Name of connector service (value=ansible|apikeys|bitbucket|datadog|git|humio|instana|jira|opsgenie|aws_health|pagerduty|prometheus|pulumi|slack|splunk|splunk_on_call|spot|squadcast|terraform|terraform_cli|twilio|zoom)
          in: path
          name: service
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                alias:
                  description: The alias to check availability for.
                  type: string
              required:
                - alias
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  body:
                    allOf:
                      - properties:
                          alias:
                            description: The alias that was checked for availability.
                            type: string
                          available:
                            description: Whether the alias is available for use. True for available and false for not available.
                            type: boolean
                          message:
                            description: A message indicating the availability of the alias.
                            type: string
                        type: object
                    description: Response body.
                    type: object
                  statusCode:
                    description: HTTP status code.
                    type: integer
                type: object
          description: Success
        '400':
          content: {}
          description: Bad Request
      summary: Get Alias Name Availability
      tags:
        - Connect Settings
      x-codegen-request-body-name: payload
  /connect/settings/connectors:
    get:
      description: |-
        Retrieve a list of all enabled connectors (integration or resource), excluding those that are
        exclusively trigger-based. For each connector, extract essential settings from its schema and
        determine a boolean status indicating whether it's configured or not.
      operationId: get_settings_connector_discovery
      parameters:
        - *ref_5
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  body:
                    allOf:
                      - properties:
                          ansible:
                            allOf:
                              - &ref_11
                                properties:
                                  coming_soon:
                                    description: Whether the connector is coming soon. True for coming soon and false if connector is active.
                                    type: boolean
                                  connector_type:
                                    description: Type of connector (Integration, Resource, Cloud).
                                    type: string
                                  connectors:
                                    items:
                                      description: List of integrations this connector depends on.
                                      type: string
                                    type: array
                                  display_name:
                                    description: Display name of the connector.
                                    type: string
                                  is_configured:
                                    description: Whether the connector is configured. True if configured and false for not configured.
                                    type: boolean
                                  is_trigger:
                                    description: Whether the connector is trigger-based. True for trigger based and false for not trigger based.
                                    type: boolean
                                type: object
                            description: ansible connector details.
                            type: object
                          apikeys:
                            allOf:
                              - *ref_11
                            description: apikeys connector details.
                            type: object
                          aws:
                            allOf:
                              - *ref_11
                            description: aws connector details.
                            type: object
                          aws_health:
                            allOf:
                              - *ref_11
                            description: aws_health connector details.
                            type: object
                          azure:
                            allOf:
                              - *ref_11
                            description: azure connector details.
                            type: object
                          azure_openai:
                            allOf:
                              - *ref_11
                            description: azure_openai connector details.
                            type: object
                          bitbucket:
                            allOf:
                              - *ref_11
                            description: bitbucket connector details.
                            type: object
                          cloudformation:
                            allOf:
                              - *ref_11
                            description: cloudformation connector details.
                            type: object
                          datadog:
                            allOf:
                              - *ref_11
                            description: datadog connector details.
                            type: object
                          eks:
                            allOf:
                              - *ref_11
                            description: eks connector details.
                            type: object
                          elasticsearch:
                            allOf:
                              - *ref_11
                            description: elasticsearch connector details.
                            type: object
                          gcp:
                            allOf:
                              - *ref_11
                            description: gcp connector details.
                            type: object
                          git:
                            allOf:
                              - *ref_11
                            description: git connector details.
                            type: object
                          gke:
                            allOf:
                              - *ref_11
                            description: gke connector details.
                            type: object
                          http:
                            allOf:
                              - *ref_11
                            description: http connector details.
                            type: object
                          humio:
                            allOf:
                              - *ref_11
                            description: humio connector details.
                            type: object
                          instana:
                            allOf:
                              - *ref_11
                            description: instana connector details.
                            type: object
                          jenkins:
                            allOf:
                              - *ref_11
                            description: jenkins connector details.
                            type: object
                          jira:
                            allOf:
                              - *ref_11
                            description: jira connector details.
                            type: object
                          new_relic:
                            allOf:
                              - *ref_11
                            description: new_relic connector details.
                            type: object
                          opsgenie:
                            allOf:
                              - *ref_11
                            description: opsgenie connector details.
                            type: object
                          pagerduty:
                            allOf:
                              - *ref_11
