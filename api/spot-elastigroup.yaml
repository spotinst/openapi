                                                  maximum:
                                                    type: integer
                                                    title: Maximum
                                                    description: |
                                                      Upper limit of instances that you can scale up to. Also you must indicate “minimum” and “target” amounts. Required if selected as action type:
                                                      + updateCapacity
                                                    example: 1
                                              - type: object
                                                title: adjustment
                                                properties:
                                                  type:
                                                    type: string
                                                    description: |
                                                      Type of scaling action to take when the scaling policy is triggered.
                                                    example: adjustment
                                                    enum:
                                                      - adjustment
                                                      - updateCapacity
                                                  adjustment:
                                                    title: Adjustment
                                                    description: |
                                                      Value to which the action type will be adjusted. Required if using the next action types:
                                                      + adjustment
                                                    type: string
                                                    example: '2'
                            down:
                              type: array
                              description: |
                                Defines scaling down policy.
                              items:
                                allOf:
                                  - *ref_124
                                  - type: object
                                    allOf:
                                      - *ref_124
                                      - type: object
                                        properties:
                                          policyName:
                                            type: string
                                            example: cpuScaleDown
                                          threshold:
                                            type: number
                                            example: 0.25
                                          operator:
                                            type: string
                                            example: lte
                                          dimensions:
                                            type: array
                                            description: |
                                              Required if scaling.down.namespace is different from "Microsoft.Compute".\
                                              2 dimensions are required.
                                            items:
                                              type: object
                                              properties:
                                                name:
                                                  type: string
                                                  description: |
                                                    Azure resource group for the scaling.down.dimensions. Required if using namespace different from "Microsoft.Compute".
                                                  example: resourceName
                                                value:
                                                  type: string
                                                  description: |
                                                    Azure resource for the scaling.down.dimensions. Required if using namespace different from "Microsoft.Compute".
                                                  example: testApplicationGateway
                                              example:
                                                name: resourceName
                                                value: testApplicationGateway
                                            example:
                                              - name: resourceName
                                                value: testApplicationGateway
                                              - name: resourceGroupName
                                                value: testResourceGroup
                                          action:
                                            type: object
                                            description: |
                                              The action to take when scale down is needed.
                                            oneOf:
                                              - type: object
                                                title: updateCapacity
                                                properties:
                                                  type:
                                                    type: string
                                                    description: |
                                                      Type of scaling action to take when the scaling policy is triggered.
                                                    example: updateCapacity
                                                    enum:
                                                      - adjustment
                                                      - updateCapacity
                                                  target:
                                                    type: integer
                                                    title: Target
                                                    description: |
                                                      The desired amount of instances. Must be defined along with the ‘minimum’ and ‘maximum’ amounts.
                                                      Required if selection as action type is:
                                                       + updateCapacity
                                                    example: 1
                                                  minimum:
                                                    type: integer
                                                    title: Minimum
                                                    description: |
                                                      The lower limit of instances that you can scale down to. Must be defined along with the ‘maximum’ and ‘target’ amounts.
                                                      Required if selection as action type is:
                                                      + updateCapacity
                                                    example: 1
                                                  maximum:
                                                    type: integer
                                                    title: Maximum
                                                    description: |
                                                      The upper limit of instances that you can scale down to. Must be defined along with the ‘minimum’ and ‘target’ amounts.
                                                      Required if selection as action type is:
                                                      + updateCapacity
                                                    example: 1
                                              - type: object
                                                title: adjustment
                                                properties:
                                                  type:
                                                    type: string
                                                    description: |
                                                      Type of scaling action to take when the scaling policy is triggered.
                                                    example: adjustment
                                                    enum:
                                                      - adjustment
                                                      - updateCapacity
                                                  adjustment:
                                                    title: Adjustment
                                                    description: |
                                                      Value to which the action type will be adjusted. Required if using the next action types:
                                                      + adjustment
                                                    type: string
                                                    example: '2'
                        compute:
                          type: object
                          title: Elastigroup Compute Update
                          description: |
                            Compute settings for Elastigroup.
                          properties:
                            vmSizes:
                              type: object
                              description: |
                                amount of time to be unhealthy before a replacement is triggered
                              properties:
                                odSizes:
                                  type: array
                                  description: |
                                    Available On-Demand sizes.
                                  items:
                                    type: string
                                    example: standard_a1_v1
                                spotSizes:
                                  type: array
                                  description: |
                                    Available spot VM sizes.
                                  items:
                                    type: string
                                    example: standard_a2_v2
                                preferredSpotSizes:
                                  type: array
                                  description: |
                                    Prioritize Spot VM sizes when launching Spot VMs for the group.
                                    <a style=color:red>Must be a sublist of compute.vmSizes.spotSizes. </a>
                                  items:
                                    type: string
                                    example: standard_a2_v2
                                spotSizeAttributes: &ref_132
                                  type: object
                                  title: Elastigroup spot size attributes
                                  description: |
                                    The values and ranges for spot size attributes when launching VMs.  
                                     <a style=color:red>Required if spotSizes isn't specified.</a>
                                  properties:
                                    minCpu:
                                      type: integer
                                      description: |
                                        Minimum instance CPU units.
                                      example: 2
                                    maxCpu:
                                      type: integer
                                      description: |
                                        Maximum instance CPU units.
                                      example: 8
                                    minStorage:
                                      type: integer
                                      description: |
                                        Minimum instance storage (GiB).
                                      example: 5
                                    maxStorage:
                                      type: integer
                                      description: |
                                        Maximum instance storage (GiB).
                                      example: 50
                                    minMemory:
                                      type: integer
                                      description: |
                                        Minimum instance memory (GiB).
                                      example: 2
                                    maxMemory:
                                      type: integer
                                      description: |
                                        Maximum instance memory (GiB).
                                      example: 2
                                  example: &ref_133
                                    minCpu: 2
                                    maxCpu: 8
                                    minStorage: 5
                                    maxStorage: 50
                                    minMemory: 2
                                    maxMemory: 2
                                excludedVmSizes:
                                  type: array
                                  description: |
                                    Exclude these spot VM sizes when using attribute-based VM sizes.
                                  example: &ref_125
                                    - standard_a2_v2
                                    - standard_d2s_v3
                                  items:
                                    type: string
                              example:
                                odSizes:
                                  - standard_a1_v1
                                spotSizes:
                                  - standard_a2_v2
                                preferredSpotSizes:
                                  - standard_a2_v2
                                spotSizeAttributes:
                                  minCpu: 2
                                  maxCpu: 8
                                  minStorage: 5
                                  maxStorage: 50
                                  minMemory: 2
                                  maxMemory: 2
                                excludedVmSizes: *ref_125
                            launchSpecification:
                              type: object
                              properties:
                                vmNamePrefix:
                                  type: string
                                  description: |
                                    Set a VM name prefix to be used for all launched VMs and the VM resources.
                                    * The prefix value should comply with the following limitations: 
                                      *  A maximal length of 25 characters.
                                      * The prefix can’t contain spaces, control characters, or these characters: ~ ! @ # $ % ^ & * ( ) = + _ [ ] { } | ; : . ' " , < > / ?
                                      * The VM prefix can't end with a hyphen.
                                  example: prefix
                                customData:
                                  type: string
                                  format: byte
                                  description: |
                                    This value will hold the YML in base64 and will be added to the virtual machine.
                                  example: ''
                                userData:
                                  type: string
                                  description: |
                                    Define a set of scripts or other metadata that's inserted to an Azure virtual machine at provision time. (Base64 encoded)
                                  example: IyEvYmluL2Jhc2gKZWNobyAidGVzdCI
                                image:
                                  title: Image
                                  description: Image of VM. An image is a template for creating new VMs. Choose from Azure image catalogue (marketplace) or use a custom image or chosen from shared gallery image.
                                  type: object
                                  properties:
                                    marketplace:
                                      title: Marketplace
                                      type: object
                                      description: Select an image from Azure's Marketplace image catalogue. Cannot be used with `custom` or `gallery`. <a style=color:red;>Required if custom or gallery image are not specified.</a>
                                      properties:
                                        publisher:
                                          title: Publisher
                                          description: Image publisher.  <a style=color:red;>Required if marketplace image is specified.</a>
                                          type: string
                                          example: OpenLogic
                                        offer:
                                          title: Offer
                                          description: Name of image to use.  <a style=color:red;>Required if marketplace image is specified.</a>
                                          type: string
                                          example: CentOS
                                        sku:
                                          title: Stock Keeping Unit
                                          description: Image's Stock Keeping Unit, which is the specific version of the image.  <a style=color:red;>Required if marketplace image is specified.</a>
                                          type: string
                                          example: '7.3'
                                        version:
                                          title: Version
                                          description: Image's version. if version not provided we use 'latest'
                                          type: string
                                          example: 7.3-1611
                                          default: latest
                                      example:
                                        publisher: OpenLogic
                                        offer: CentOS
                                        sku: '7.3'
                                        version: 7.3-1611
                                    custom:
                                      title: Custom
                                      type: object
                                      description: Custom image to launch Elastigroup with. Cannot be used with `marketplace` or `gallery`. <a style=color:red;>Required if marketplace or gallery image are not specified.</a>
                                      properties:
                                        resourceGroupName:
                                          title: Resource Group Name
                                          description: Name of Resource Group for custom image.  <a style=color:red;>Required if custom image is specified.</a>
                                          type: string
                                          example: spotinst-azure
                                        name:
                                          title: Image Name
                                          description: Name of the custom image.  <a style=color:red;>Required if custom image is specified.</a>
                                          type: string
                                          example: custom-image-name
                                      example:
                                        resourceGroupName: spotinst-azure
                                        name: custom-image-name
                                    gallery:
                                      title: Gallery
                                      type: object
                                      description: Gallery image to launch Elastigroup with. Cannot be used with `marketplace` or `custom`. <a style=color:red;>Required if marketplace or custom image are not specified.</a>
                                      properties:
                                        resourceGroupName:
                                          title: Resource Group Name
                                          description: Name of Resource Group for custom image.  <a style=color:red;>Required if gallery image is specified.</a>
                                          type: string
                                          example: spotinst-azure
                                        galleryName:
                                          title: Gallery Name
                                          description: Name of the gallery.  <a style=color:red;>Required if gallery image is specified.</a>
                                          type: string
                                          example: gallery-name
                                        imageName:
                                          title: Image Name
                                          description: Name of the gallery image.  <a style=color:red;>Required if gallery image is specified.</a>
                                          type: string
                                          example: gallery-image-name
                                        version:
                                          title: Version
                                          description: Image's version. Can be in the format x.x.x or 'latest'. <a style=color:red;>Required if gallery image is specified.</a>
                                          type: string
                                          example: 0.0.1
                                        spotAccountId:
                                          title: Spot Account ID
                                          description: The Spot account ID that connected to the Azure subscription to which the gallery belongs. Relevant only in case of cross-subscription shared galleries. [Read more](https://docs.flexera.com/spot/elastigroup/features-azure/shared-image-galleries) about cross-subscription shared galleries in Elastigroup.
                                          type: string
                                          example: act-123456789
                                      example:
                                        resourceGroupName: spotinst-azure
                                        galleryName: gallery-name
                                        imageName: gallery-image-name
                                        version: 0.0.1
                                        spotAccountId: act-123456789
                                  example:
                                    marketplace:
                                      publisher: OpenLogic
                                      offer: CentOS
                                      sku: '7.3'
                                      version: 7.3-1611
                                    custom:
                                      resourceGroupName: spotinst-azure
                                      name: custom-image-name
                                    gallery:
                                      resourceGroupName: spotinst-azure
                                      galleryName: gallery-name
                                      imageName: gallery-image-name
                                      version: 0.0.1
                                      spotAccountId: act-123456789
                                network:
                                  title: Network
                                  description: Define the Virtual Network and Subnet for your Elastigroup.
                                  type: object
                                  required:
                                    - resourceGroupName
                                    - virtualNetworkName
                                    - networkInterfaces
                                  properties:
                                    resourceGroupName:
                                      title: Resource Group Name
                                      description: Vnet Resource Group Name
                                      type: string
                                      example: subnetResourceGroup
                                    virtualNetworkName:
                                      title: Virtual Network Name
                                      description: Virtual Network
                                      type: string
                                      example: vname
                                    networkInterfaces:
                                      title: Virtual Network Name
                                      description: Virtual Network
                                      type: array
                                      items:
                                        type: object
                                        required:
                                          - isPrimary
                                          - subnetName
                                        properties:
                                          isPrimary:
                                            title: Is Primary Criteria
                                            description: Defines whether the network interface is primary or not.
                                            type: boolean
                                            example: true
                                          subnetName:
                                            title: Subnet Name
                                            description: Subnet name
                                            type: string
                                            example: testSubnet
                                          assignPublicIp:
                                            title: Assign Public IP
                                            description: Assign public IP
                                            type: boolean
                                            example: true
                                          publicIpSku:
                                            title: Type of Public Ip
                                            description: Required if assignPublicIp=true values=[STANDARD/BASIC]
                                            type: string
                                            example: STANDARD
                                          securityGroup:
                                            title: Security Group
                                            description: Security Group
                                            type: object
                                            properties:
                                              name:
                                                title: Name
                                                description: Requires valid security group name. Required if security group is specified.
                                                type: string
                                                example: test
                                              resourceGroupName:
                                                title: Resource Group Name
                                                description: Requires valid resource group name. Required if security group is specified.
                                                type: string
                                                example: test
                                            example:
                                              name: test
                                              resourceGroupName: test
                                          publicIps:
                                            description: Defined a pool of Public Ips (from Azure), that will be associated to the network interface. We will associate one public ip per instance until the pool is exhausted, in which case, we will create a new one.
                                            type: array
                                            items:
                                              type: object
                                              required:
                                                - resourceGroupName
                                                - name
                                              properties:
                                                resourceGroupName:
                                                  description: The resource group of the public ip.
                                                  type: string
                                                  example: resourceGroup
                                                name:
                                                  description: The name of the public ip.
                                                  type: string
                                                  example: name
                                              example:
                                                resourceGroupName: resourceGroup
                                                name: name
                                          enableIPForwarding:
                                            title: Enable IP Forwarding
                                            description: Enable IP Forwarding
                                            type: boolean
                                            example: true
                                          additionalIpConfigurations:
                                            title: Additional IP Configurations
                                            description: Additional configuration of network interface
                                            type: array
                                            items:
                                              type: object
                                              properties:
                                                name:
                                                  title: Name
                                                  description: Required if additionalConfiguration has been specified.
                                                  type: string
                                                  example: test
                                                privateIpAddressVersion:
                                                  title: Private IP Address Version
                                                  description: |-
                                                    Possible values:
                                                    + IPv4
                                                    + IPv6
                                                  default: IPv4
                                              example:
                                                name: test
                                          applicationSecurityGroups:
                                            description: List of Application Security Groups that will be associated to the primary ip configration of the network interface.
                                            type: array
                                            items:
                                              type: object
                                              required:
                                                - resourceGroupName
                                                - name
                                              properties:
                                                resourceGroupName:
                                                  description: The resource group of the Application Security Group.
                                                  type: string
                                                  example: AsgResourceGroup
                                                name:
                                                  description: The name of the Application Security group
                                                  type: string
                                                  example: AsgName
                                              example:
                                                resourceGroupName: AsgResourceGroup
                                                name: AsgName
                                        example:
                                          isPrimary: true
                                          subnetName: testSubnet
                                          assignPublicIp: true
                                          publicIpSku: STANDARD
                                          securityGroup:
                                            name: test
                                            resourceGroupName: test
                                          publicIps:
                                            - resourceGroupName: resourceGroup
                                              name: name
                                          enableIPForwarding: true
                                          additionalIpConfigurations:
                                            - name: test
                                          applicationSecurityGroups:
                                            - resourceGroupName: AsgResourceGroup
                                              name: AsgName
                                  example:
                                    resourceGroupName: subnetResourceGroup
                                    virtualNetworkName: vname
                                    networkInterfaces:
                                      - isPrimary: true
                                        subnetName: testSubnet
                                        assignPublicIp: true
                                        publicIpSku: STANDARD
                                        securityGroup:
                                          name: test
                                          resourceGroupName: test
                                        publicIps:
                                          - resourceGroupName: resourceGroup
                                            name: name
                                        enableIPForwarding: true
                                        additionalIpConfigurations:
                                          - name: test
                                        applicationSecurityGroups:
                                          - resourceGroupName: AsgResourceGroup
                                            name: AsgName
                                login:
                                  type: object
                                  description: Set admin access for accessing your VMs. Password/SSH is required for Linux. <a style=color:red;>Required null if specialized image is set.</a>
                                  properties:
                                    userName:
                                      type: string
                                      description: |
                                        user name for admin access to VMs.\
                                        Login can be set:
                                        * for windows: compute.launchSpecification.login.password
                                        * for linux: compute.launchSpecification.login.sshPublicKey

                                        Just user name, without pwd or SSH key
                                      example: spotinst
                                    sshPublicKey:
                                      type: string
                                      description: |
                                        SSH for admin access to Linux VMs.\
                                        Optional for Linux.
                                      example: ssh-rsa
                                    password:
                                      type: string
                                      writeOnly: true
                                      description: |
                                        Password for admin access to Windows VMs.\
                                        Required for Windows.
                                  example:
                                    userName: spotinst
                                    sshPublicKey: ssh-rsa
                                loadBalancersConfig:
                                  type: object
                                  description: |
                                    Configure a Load Balancer.
                                  properties:
                                    loadBalancers:
                                      type: array
                                      description: |
                                        Add a load balancer. For Azure Gateway, each Backend Pool is a separate load balancer.
                                      items:
                                        type: object
                                        properties:
                                          type:
                                            type: string
                                            description: |
                                              The type of load balancer.
                                            enum:
                                              - loadBalancer
                                              - applicationGateway
                                            example: loadBalancer
                                          resourceGroupName:
                                            type: string
                                            description: |
                                              The Resource Group name of the Load Balancer.
                                            example: testResourceGroup
                                          name:
                                            type: string
                                            description: |
                                              Name of the Application Gateway/Load Balancer
                                            example: testLoadBalancer
                                          sku:
                                            type: string
                                            description: |
                                              *if type is LoadBalancer then possible values are “Standard/Basic”;
                                              *if ApplicationGateway then possible values are “Standard_Large”,“Standard_Medium”,“Standard_Small”,“Standard_v2”,“WAF_Large”,“WAF_Medium”,“WAF_v2"
