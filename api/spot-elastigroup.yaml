                        scheduling:
                          type: object
                          title: Elastigroup Scheduling
                          description: |
                            Schedule tasks to execute, using CRON expressions.
                          properties:
                            tasks:
                              type: array
                              description: |
                                The scheduling tasks for the group.
                              items:
                                type: object
                                properties:
                                  isEnabled:
                                    type: boolean
                                    description: |
                                      Describes whether the task is enabled. When true the task should run when false it should not run.
                                    example: true
                                  startTime:
                                    type: string
                                    description: |
                                      DATETIME in ISO-8601 format and is in UTC time. Sets a start time for scheduled actions.
                                      If "frequency" or "cronExpression" are not used - the task will run only once at the start time and will then be deleted from the group configuration.
                                    example: '2018-05-23T10:55:09Z'
                                  frequency:
                                    type: string
                                    description: |
                                      The recurrence frequency to run this task.
                                      Only one of ‘frequency' or ‘cronExpression' should be used at a time
                                    enum:
                                      - hourly
                                      - daily
                                      - weekly
                                    example: hourly
                                  cronExpression:
                                    type: string
                                    description: |
                                      A valid cron expression.
                                      The cron is running in UTC time zone and is in Unix cron format Cron Expression Validator Script.
                                      Only one of ‘frequency' or ‘cronExpression' should be used at a time.
                                    example: 0 1 * * *
                                  taskType:
                                    type: string
                                    description: |
                                      The task type to run. For stateful groups, use only those who has a `stateful` prefix, or `backup_ami`. For non-stateful group, use the rest.
                                    enum:
                                      - backup_ami
                                      - scale
                                      - scaleUp
                                      - percentageScaleUp
                                      - scaleDown
                                      - percentageScaleDown
                                      - roll
                                      - clusterRoll (For ECS Integration)
                                      - statefulUpdateCapacity
                                      - statefulRecycle
                                    example: scale
                                  scaleTargetCapacity:
                                    type: integer
                                    description: |
                                      The target capacity of the group.
                                      Should be used when choosing ‘taskType' of ‘scale'.
                                  scaleMinCapacity:
                                    type: integer
                                    description: |
                                      The min capacity of the group.
                                      Should be used when choosing ‘taskType' of ‘scale'.
                                  scaleMaxCapacity:
                                    type: integer
                                    description: |
                                      The max capacity of the group.
                                      Required when ‘taskType' is ‘scale'.
                                  targetCapacity:
                                    type: integer
                                    description: |
                                      Set a new target capacity for the Elastigroup.
                                      Required when ‘taskType' is ‘statefulUpdateCapacity'.
                                  MinCapacity:
                                    type: integer
                                    description: |
                                      Set a new minimum capacity for the Elastigroup.
                                      Required when ‘taskType' is ‘statefulUpdateCapacity'.
                                  MaxCapacity:
                                    type: integer
                                    description: |
                                      Set a new maximum capacity for the Elastigroup.
                                      Required when ‘taskType' is ‘statefulUpdateCapacity'.
                                  batchSizePercentage:
                                    type: integer
                                    description: |
                                      The percentage size of each batch in the scheduled deployment roll.
                                      Required when the taskType is roll.
                        thirdPartiesIntegration:
                          type: object
                          title: Elastigroup Third Party Integrations
                          description: |
                            All definitions for using third-party Integrations
                          properties:
                            rancher:
                              type: object
                              description: |
                                Rancher integration object.
                              properties:
                                masterHost:
                                  type: string
                                  description: |
                                    Rancher master url
                                  example: http://myRancher.com:8080/v1
                                accessKey:
                                  type: string
                                  description: |
                                    Rancher version
                                  example: '1'
                                  default: '1'
                                secretKey:
                                  type: string
                                  example: SECRET
                                version:
                                  type: string
                                  example: 1
                            kubernetes:
                              type: object
                              properties:
                                integrationMode:
                                  type: string
                                  example: pod
                                clusterIdentifier:
                                  type: string
                                  example: test-k8s
                                autoScale:
                                  type: object
                                  properties:
                                    isEnabled:
                                      type: boolean
                                      example: true
                                      default: true
                                    cooldown:
                                      type: integer
                                      example: 300
                                    down:
                                      type: object
                                      description: |
                                        Auto Scaling scale down operations.
                                      properties:
                                        evaluationPeriods:
                                          type: integer
                                          example: 5
                                        maxScaleDownPercentage:
                                          type: integer
                                          description: |
                                            The maximum % of nodes that will be scaled down at once out of the total amount of potential nodes to scale down.
                                            example: if 10 nodes can be scaled down, only 5 will be given 50% in this parameter.
                                            the other 50% will be scaled down in the next autoscaling iteration.
                                          example: 70
                                        headroom:
                                          type: object
                                          description: |
                                            Spare resource capacity management enabling fast assignment of Pods without waiting for new resources to launch.
                                          properties:
                                            cpuPerUnit:
                                              type: integer
                                              description: |
                                                Optionally configure the number of CPUs to allocate per headroom unit. CPUs are denoted in CPU units, where 1024 units = 1 vCPU.
                                              example: 2048
                                            memoryPerUnit:
                                              type: integer
                                              description: |
                                                Optionally configure the amount of memory (MiB) to allocate per headroom unit.
                                              example: 3
                                            numOfUnits:
                                              type: integer
                                              description: |
                                                The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                              example: 2
                                            gpuPerUnit:
                                              type: integer
                                              example: 2
                                    labels:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          key:
                                            type: string
                                            example: group, kops.k8s.io/instancegroup
                                          value:
                                            type: string
                                            example: microservices
                                    isAutoConfig:
                                      type: boolean
                                      example: false
                                      default: false
                            nomad:
                              type: object
                              properties:
                                masterHost:
                                  type: string
                                  example: https://master.host.com
                                masterPort:
                                  type: integer
                                  example: 443
                                autoScale:
                                  type: object
                                  properties:
                                    isEnabled:
                                      type: boolean
                                      description: |
                                        Enable the Autoscaler.
                                      example: true
                                    cooldown:
                                      type: integer
                                      description: |
                                        Cooldown period between scaling actions. Value should be cooldown period in seconds, greater than 180
                                      example: 180
                                    down:
                                      type: object
                                      description: |
                                        Auto Scaling scale down operations.
                                      properties:
                                        evaluationPeriods:
                                          type: integer
                                          example: 3
                                    headroom:
                                      type: object
                                      description: |
                                        Spare resource capacity management enabling fast assignment of Pods without waiting for new resources to launch.
                                      properties:
                                        cpuPerUnit:
                                          type: integer
                                          description: |
                                            Optionally configure the number of CPUs to allocate per headroom unit. CPUs are denoted in CPU units, where 1024 units = 1 vCPU.
                                          example: 2048
                                        memoryPerUnit:
                                          type: integer
                                          description: |
                                            Optionally configure the amount of memory (MiB) to allocate per headroom unit.
                                          example: 3
                                        numOfUnits:
                                          type: integer
                                          description: |
                                            The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                          example: 2
                                    constraints:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          key:
                                            type: string
                                            example: ${node.class}
                                          value:
                                            type: string
                                            example: value
                                aclToken:
                                  type: string
                                  example: 123
                                tlsConfig:
                                  type: object
                                  description: |
                                    Configuration object for TLS integration. (optional)
                                  properties:
                                    tlsEnabled:
                                      type: boolean
                                      example: true
                                      description: |
                                        When true, all communication to the master is with TLS. (required)
                                    privateKey:
                                      type: string
                                      example: PRIVATE KEY CERTIFICATE STR
                                      description: |
                                        A generated client private key. (required)
                                    certificate:
                                      type: string
                                      example: PUBLIC KEY CERTIFICATE STR
                                      description: |
                                        The certificates chain, first the client certificate then the ca certificate. (required)
                            opsWorks:
                              type: object
                              properties:
                                layerId:
                                  type: string
                                  example: 00d9m815-8aac-62b7-cc01-123456, xxxxxx-xxxxxxxx, xxxxxxx-xxxxxxxxxx
                                stackType:
                                  type: string
                                  example: CLASSIC
                            codeDeploy:
                              type: object
                              properties:
                                cleanUpOnFailure:
                                  type: boolean
                                  example: false
                                terminateInstanceOnFailure:
                                  type: boolean
                                  example: false
                                deploymentGroups:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      applicationName:
                                        type: string
                                        example: test-app
                                      deploymentGroupName:
                                        type: string
                                        example: test-grp
                            route53:
                              type: object
                              description: |
                                Route53 integration object.
                              properties:
                                domains:
                                  type: array
                                  description: |
                                    Route53 domain configurations.
                                  items:
                                    type: object
                                    properties:
                                      hostedZoneId:
                                        type: string
                                        description: |
                                          The Route53 Hosted Zone ID for the registered domain.
                                        example: Z3UFMBCGJMYLUT
                                      spotinstAccountId:
                                        type: string
                                        description: |
                                          The Spot account ID that is linked to the AWS account that holds the Route53 hosted Zone ID.
                                          The default is the user Spot account provided as a URL parameter.
                                        example: act-1234abcd
                                      recordSetType:
                                        type: string
                                        description: |
                                          Set the type of recordSet to update.
                                          Valid values:
                                          * "a" - means register and de-register of instances done by IP address (IPv4).
                                          When it is "a" you should also specify usePublicIp.
                                          * "cname" - register and de-register of instances done by CNAME. When it is "cname", you should also specify usePublicDns.
                                        enum:
                                          - a
                                          - cname
                                        example: a
                                        default: a
                                      recordSets:
                                        type: array
                                        description: |
                                          List of record sets.
                                        items:
                                          type: object
                                          properties:
                                            name:
                                              type: string
                                              description: |
                                                Name of the recordSet.
                                              example: testcname.spot.io.
                                            usePublicIp:
                                              type: boolean
                                              description: |
                                                Defines whether to use public or private IP. Relevant only when recordSetType=a.
                                              example: true
                                              default: false
                                            usePublicDns:
                                              type: boolean
                                              description: |
                                                Defines whether to use a public DNS or private DNS in the instance registration process.
                                                Relevant only when recordSetType=cname.
                                                * False=Create a new weighted CNAME recordset with same name and the instance Private DNS.
                                                * True=instances should be registered with public DNS.
                                              example: true
                                              default: false
                            elasticBeanstalk:
                              type: object
                              description: |
                                Beanstalk integration object.
                              properties:
                                environmentId:
                                  type: string
                                  example: e-12345
                                deploymentPreferences:
                                  type: object
                                  properties:
                                    automaticRoll:
