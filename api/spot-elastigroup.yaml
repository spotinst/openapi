                                      required:
                                        - resourceGroupName
                                        - galleryName
                                        - imageName
                                        - versionName
                                      properties:
                                        resourceGroupName:
                                          title: Resource Group Name
                                          description: |
                                            Name of Resource Group for custom image
                                          type: string
