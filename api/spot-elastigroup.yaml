  /azure/compute/group:
    post:
      summary: Create Elastigroup
      description: Create a new Elastigroup cluster.
      operationId: elastigroupAzureSpotVmsCreate
      tags:
        - Elastigroup Azure Spot VMs
      parameters:
        - *ref_48
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: Create Elastigroup Azure Spot VMs Body
                  required:
                    - group
                    - name
                    - region
                    - capacity
                    - strategy
                    - compute
                  properties:
                    group:
                      type: object
                      required:
                        - name
                        - region
                        - capacity
                        - resourceGroupName
                        - strategy
                        - compute
                      title: Azure Elastigroup
                      description: Azure Elastigroup Configuration
                      properties:
                        id:
                          type: string
                          example: sig-123456789
                          readOnly: true
                          description: |
                            Azure Elastigroup ID
                        name:
                          type: string
                          example: spotinst-group
                          description: |
                            Azure Elastigroup Name
                        description:
                          type: string
                          example: This is my example elastigroup
                          description: |
                            Describe your Azure Elastigroup
                        region:
                          type: string
                          example: eastus
                          description: |
                            Valid Azure region the Elastigroup is managed in
                        resourceGroupName:
                          type: string
                          example: spotinst-azure
                          description: |
                            The Azure resource group to associate the Elastigroup with
                        capacity:
                          type: object
                          description: Capacity of Elastigroup
                          required:
                            - target
                            - minimum
                            - maximum
                          properties:
                            target:
                              type: integer
                              example: 8
                              description: Current scale the Elastigroup will conform to
                            minimum:
                              type: integer
                              example: 2
                              description: |
                                The Elastigroup will not set a target below this value
                            maximum:
                              type: integer
                              example: 10
                              description: |
                                The Elastigroup will not set a target greater than this value
                          example:
                            target: 8
                            minimum: 2
                            maximum: 10
                        scaling:
                          type: object
                          description: Scaling Policies for Elastigroup. Set as many policies as needed to maximize the Elastigroup’s efficiency.
                          title: Azure Scaling
                          properties:
                            up:
                              type: object
                              title: Scale Up Policies
                              description: Provide the ability to accommodate increased workloads.
                              required:
                                - policyName
                                - metricName
                                - statistic
                                - threshold
                                - period
                                - isEnabled
                                - evaluationPeriods
                                - cooldown
                                - action
                                - operator
                                - namespace
                              properties:
                                isEnabled:
                                  type: boolean
                                  example: 'true'
                                  description: |
                                    Specifies whether the scaling policy is enabled.
                                  default: true
                                source:
                                  type: string
                                  description: |
                                    The metric source.
                                  example: azureMonitor
                                  enum:
                                    - azureMonitor
                                    - spotMetrics
                                policyName:
                                  title: Policy Name
                                  description: Name of scaling policy
                                  type: string
                                  example: cpuScale
                                metricName:
                                  title: Metric Name
                                  description: Metric to monitor by Azure metric display name
                                  type: string
                                  example: Percentage CPU
                                statistic:
                                  title: Statistics
                                  description: Statistic by which to evaluate the selected metric.
                                  type: string
                                  example: average
                                  enum:
                                    - average
                                    - sampleCount
                                    - sum
                                    - minimum
                                    - maximum
                                unit:
                                  title: Unit
                                  description: |-
                                    Unit to measure to evaluate the selected metric:  Valid Values:
                                    + Count
                                    + Bytes
                                    + Percent
                                    + CountPerSecond
                                    + Milliseconds
                                    + BytesPerSecond
                                    + Seconds
                                  type: string
                                  example: Count
                                threshold:
                                  title: Threshold
                                  description: The value at which the scaling action is triggered.
                                  type: number
                                  format: float
                                  example: 0.75
                                period:
                                  title: Period
                                  description: Amount of time (seconds) for which the threshold must be met in order to trigger the scaling action.
                                  type: integer
                                  example: 60
                                evaluationPeriods:
                                  title: Evaluation Periods
                                  description: Amount of time (seconds) for which the threshold must be met in order to trigger the scaling action.
                                  type: integer
                                  example: 3
                                cooldown:
                                  title: Cooldown
                                  description: Time (seconds) to wait after a scaling action before resuming monitoring.
                                  type: integer
                                  example: 300
                                namespace:
                                  title: namespace
                                  description: Select one of the next namespaces presented in Azure configurator - https://docs.microsoft.com/en-us/azure/templates/
                                  type: string
                                  example: Microsoft.Network/applicationGateways
                                  default: Microsoft.Compute
                                operator:
                                  title: Operator
                                  description: |-
                                    The operator used to evaluate the threshold against the current metric value.
                                    + gt (Greater Than)
                                    + gte (Greater Than or Equal)
                                    + lt (Less Than)
                                    + lte (Less Than or Equal) 
                                  type: string
                                  example: gte
                                  enum:
                                    - gt
                                    - gte
                                    - lt
                                    - lte
                                action:
                                  type: object
                                  description: |
                                    The action to take when scale down is needed.
                                  oneOf:
                                    - type: object
                                      title: updateCapacity
                                      properties:
                                        type:
                                          type: string
                                          description: |
                                            Type of scaling action to take when the scaling policy is triggered.
                                          example: updateCapacity
                                          enum:
                                            - adjustment
                                            - updateCapacity
                                        target:
                                          type: integer
                                          title: Target
                                          description: |
                                            Desired number of instances. Also you must indicate “minimum” and “maximum” amounts. Required if selected as action type:
                                             + updateCapacity
                                          example: 1
                                        minimum:
                                          type: integer
                                          title: Minimum
                                          description: |
                                            Lower limit of instances that you can scale up to. Also you must indicate “target” and “maximum” amounts. Required if selected as action type:
                                            + updateCapacity
                                          example: 1
                                        maximum:
                                          type: integer
                                          title: Maximum
                                          description: |
                                            Upper limit of instances that you can scale up to. Also you must indicate “minimum” and “target” amounts. Required if selected as action type:
                                            + updateCapacity
                                          example: 1
                                    - type: object
                                      title: adjustment
                                      properties:
                                        type:
                                          type: string
                                          description: |
                                            Type of scaling action to take when the scaling policy is triggered.
                                          example: adjustment
                                          enum:
                                            - adjustment
                                            - updateCapacity
                                        adjustment:
                                          title: Adjustment
                                          description: |
                                            Value to which the action type will be adjusted. Required if using the next action types:
                                            + adjustment
                                          type: string
                                          example: '2'
                                dimensions:
                                  type: array
                                  description: |
                                    Required if scaling.down.namespace is different from "Microsoft.Compute".\
                                    2 dimensions are required.
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                        description: |
                                          Azure resource group for the scaling.up.dimensions. Required if using namespace different from "Microsoft.Compute".
                                        example: resourceName
                                      value:
                                        type: string
                                        description: |
                                          Azure resource for the scaling.up.dimensions. Required if using namespace different from "Microsoft.Compute".
                                        example: testApplicationGateway
