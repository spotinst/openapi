                                        enum:
                                          - FORECAST_AND_SCALE
                                          - FORECAST_ONLY
                                        type: string
                                        example: FORECAST_AND_SCALE
                                    example:
                                      mode: FORECAST_AND_SCALE
                                example: &ref_40
                                  source: cloudWatch
                                  policyName: my-target-scaling-policy
                                  metricName: CPUUtilization
                                  statistic: average
                                  unit: percent
                                  dimensions:
                                    - name: InstanceId
                                  period: 300
                                  evaluationPeriods: 1
                                  cooldown: 300
                                  target: 1
                                  predictive:
                                    mode: FORECAST_AND_SCALE
                          example:
                            up:
                              - policyName: my-up-policy
                                source: cloudWatch
                                metricName: CPUUtilization
                                statistic: average
                                extendedStatistic: p1.5
                                unit: percent
                                threshold: 90
                                stepAdjustments:
                                  - action:
                                      type: setMinTarget
                                      adjustment: 2
                                      minTargetCapacity: 3
                                      target: 3
                                      minimum: 4
                                      maximum: 10
                                    threshold: 50
                                action:
                                  type: updateCapacity
                                  adjustment: 1
                                  minTargetCapacity: 1
                                  target: 1
                                  minimum: 0
                                  maximum: 5
                                dimensions:
                                  - name: InstanceId
                                period: 300
                                evaluationPeriods: 1
                                cooldown: 300
                                operator: gte
                                isEnabled: true
                            down:
                              - policyName: my-down-policy
                                source: cloudWatch
                                metricName: CPUUtilization
                                statistic: average
                                extendedStatistic: p1.5
                                unit: percent
                                threshold: 90
                                stepAdjustments:
                                  - action:
                                      type: percentageAdjustment
                                      adjustment: 40
                                      maxTargetCapacity: 1
                                      target: 2
                                      minimum: 1
                                      maximum: 5
                                    threshold: 10
                                action:
                                  type: updateCapacity
                                  adjustment: 1
                                  maxTargetCapacity: 1
                                  target: 1
                                  minimum: 0
                                  maximum: 5
                                dimensions:
                                  - name: InstanceId
                                period: 300
                                evaluationPeriods: 1
                                cooldown: 300
                                operator: gte
                                isEnabled: true
                            multipleMetrics:
                              metrics:
                                - name: metric1
                                  metricName: CPUUtilization
                                  statistic: average
                                  extendedStatistic: p1.5
                                  unit: percent
                                  dimensions:
                                    - name: InstanceId
                              expressions:
                                - name: e1
                                  expression: metric1+10
                            target:
                              - source: cloudWatch
                                policyName: my-target-scaling-policy
                                metricName: CPUUtilization
                                statistic: average
                                unit: percent
                                dimensions:
                                  - name: InstanceId
                                period: 300
                                evaluationPeriods: 1
                                cooldown: 300
                                target: 1
                                predictive:
                                  mode: FORECAST_AND_SCALE
                        scheduling:
                          type: object
                          title: Elastigroup Scheduling
                          description: |
                            Schedule tasks to execute, using CRON expressions.
                          properties:
                            tasks:
                              type: array
                              description: |
                                The scheduling tasks for the group.
                              items:
                                type: object
                                properties:
                                  isEnabled:
                                    type: boolean
                                    description: |
                                      Describes whether the task is enabled. When true the task should run when false it should not run.
                                    example: true
                                  startTime:
                                    type: string
                                    description: |
                                      DATETIME in ISO-8601 format and is in UTC time. Sets a start time for scheduled actions.
                                      If "frequency" or "cronExpression" are not used - the task will run only once at the start time and will then be deleted from the group configuration.
                                    example: '2018-05-23T10:55:09Z'
                                  frequency:
                                    type: string
                                    description: |
                                      The recurrence frequency to run this task.
                                      Only one of ‘frequency' or ‘cronExpression' should be used at a time
                                    enum:
                                      - hourly
                                      - daily
                                      - weekly
                                    example: hourly
                                  cronExpression:
                                    type: string
                                    description: |
                                      A valid cron expression.
                                      The cron is running in UTC time zone and is in Unix cron format Cron Expression Validator Script.
                                      Only one of ‘frequency' or ‘cronExpression' should be used at a time.
                                    example: 0 1 * * *
                                  taskType:
                                    type: string
                                    description: |
                                      The task type to run. For stateful groups, use only those who has a `stateful` prefix, or `backup_ami`. For non-stateful group, use the rest.
                                    enum:
                                      - backup_ami
                                      - scale
                                      - scaleUp
                                      - percentageScaleUp
                                      - scaleDown
                                      - percentageScaleDown
                                      - roll
                                      - clusterRoll (For ECS Integration)
                                      - statefulUpdateCapacity
                                      - statefulRecycle
                                    example: scale
                                  scaleTargetCapacity:
                                    type: integer
                                    description: |
                                      The target capacity of the group.
                                      Should be used when choosing ‘taskType' of ‘scale'.
                                  scaleMinCapacity:
                                    type: integer
                                    description: |
                                      The min capacity of the group.
                                      Should be used when choosing ‘taskType' of ‘scale'.
                                  scaleMaxCapacity:
                                    type: integer
                                    description: |
                                      The max capacity of the group.
                                      Required when ‘taskType' is ‘scale'.
                                  targetCapacity:
                                    type: integer
                                    description: |
                                      Set a new target capacity for the Elastigroup.
                                      Required when ‘taskType' is ‘statefulUpdateCapacity'.
                                  MinCapacity:
                                    type: integer
                                    description: |
                                      Set a new minimum capacity for the Elastigroup.
                                      Required when ‘taskType' is ‘statefulUpdateCapacity'.
                                  MaxCapacity:
                                    type: integer
                                    description: |
                                      Set a new maximum capacity for the Elastigroup.
                                      Required when ‘taskType' is ‘statefulUpdateCapacity'.
                                  batchSizePercentage:
                                    type: integer
                                    description: |
                                      The percentage size of each batch in the scheduled deployment roll.
                                      Required when the taskType is roll.
                                example:
                                  isEnabled: true
                                  startTime: '2018-05-23T10:55:09Z'
                                  frequency: hourly
                                  cronExpression: 0 1 * * *
                                  taskType: scale
                          example:
                            tasks:
                              - isEnabled: true
                                startTime: '2018-05-23T10:55:09Z'
                                frequency: hourly
                                cronExpression: 0 1 * * *
                                taskType: scale
