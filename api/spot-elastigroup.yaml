                                  description: |
                                    List of the desired CRGs to use under the associated Azure subscription.
                                    When null we will utilize any available reservation that matches the Virtual Node Group.
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - resourceGroupName
                                    properties:
                                      name:
                                        type: string
                                        description: |
                                          The name of the CRG.
                                        example: capacityReservationGroupName
                                      resourceGroupName:
                                        type: string
                                        description: |
                                          Azure resource group name
                                        example: resourceGroupName
                                      shouldPrioritize:
                                        type: boolean
                                        description: |
                                          The desired CRG to utilize ahead of other CRGs in the subscription.
                                        example: true
                                    example:
                                      name: capacityReservationGroupName
                                      resourceGroupName: resourceGroupName
                                      shouldPrioritize: true
                              example:
                                shouldUtilize: true
                                utilizationStrategy: utilizeOverSpot
                                capacityReservationGroups:
                                  - name: capacityReservationGroupName
                                    resourceGroupName: resourceGroupName
                                    shouldPrioritize: true
                            availabilityVsCost:
