  /azure/compute/statefulNode:
    post:
      summary: Create Stateful Node
      description: Create a new stateful node.
      operationId: azureStatefulNodeCreate
      tags:
        - Elastigroup Azure Stateful
      parameters:
        - *ref_48
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: Create Azure Stateful Node
                  properties:
                    statefulNode: &ref_168
                      type: object
                      title: Azure Stateful Node
                      required:
                        - name
                        - region
                        - resourceGroupName
                        - strategy
                        - persistence
                        - compute
                      properties:
                        id:
                          type: string
                          example: ssn-12345678
                          readOnly: true
                          description: |
                            Stateful Node unique identifier.
                        name:
                          type: string
                          example: Spot Stateful Node
                          description: |
                            Stateful Node Name.
                        region:
                          type: string
                          example: westus2
                          description: |
                            The Azure region in which the Stateful Node will be launched.
                        resourceGroupName:
                          type: string
                          example: spotResourceGroup
                          description: |
                            The Azure resource group in which the VM and all of the subsequent subresources will be launched.
                        description:
                          type: string
                          example: This is my example stateful node
                          description: |
                            The description for the Stateful Node.
                        strategy:
                          type: object
                          title: Stateful Node Strategy
                          description: |
                            The strategy to launch the underlying VM and Spot’s behavior for the Stateful Node.
                          required:
                            - fallbackToOd
                          properties:
                            preferredLifecycle:
                              type: string
                              enum:
                                - od
                                - spot
                              description: |
                                The preferred life cycle to launch the VM.
                              example: od
                              default: spot
                            shouldUtilizeCommitments:
                              type: boolean
                              description: |
                                Determines whether to utilize any existing Azure Savings Plans or Reserved Instances associated with the subscription for On-Demand VMs.
                              example: true
                              default: false
                            signals:
                              type: array
                              description: |
                                Signals that VMs are expected to send to the platform.
                              items:
                                type: object
                                required:
                                  - type
                                  - timeout
                                properties:
                                  type:
                                    type: string
                                    description: |
                                      The defined type of signal.
                                    enum:
                                      - vmReady
                                      - vmReadyToShutdown
                                    example: vmReady
                                  timeout:
                                    type: integer
                                    description: |
                                      The timeout in seconds to hold the vm until a signal is sent.
                                      * If no signal is sent the vm will be replaced (vmReady) or we will terminate the VM (vmReadyToShutdown) after the timeout.
                                    default: 1800
                                    minimum: 1
                                    example: 180
                                example:
                                  type: vmReady
                                  timeout: 180
                            fallbackToOd:
                              type: boolean
                              description: |
                                In case of no spots available, Stateful Node will launch an On-demand instance instead.
                              example: true
                            drainingTimeout:
                              type: integer
                              description: |
                                Time (in seconds) to allow the VM be drained from incoming TCP connections and detached from LB before terminating it.
                              default: 120
                              minimum: 1
                              example: 30
                            revertToSpot:
                              description: |
                                Hold settings for strategy correction - replacing On-Demand for Spot VMs
                              type: object
                              required:
                                - performAt
                              properties:
                                performAt:
                                  type: string
                                  enum:
                                    - timeWindow
                                    - never
                                    - always
                                  description: |
                                    Defines the time in which to perform revert to spot.
                                    default: always
                                  example: timeWindow
                              example:
                                performAt: timeWindow
                            optimizationWindows:
                              type: array
                              items:
                                type: string
                              description: |
                                Defines the windows of which to revert to spot.
                                * <a style=color:red>Requires the following format: "ddd:hh:mm-ddd:hh:mm (day:hour(0-23):minute(0-59))".</a>
                                * <a style=color:red>Must be not empty if revertToSpot.performAt = timeWindow.</a>
                              example: &ref_163
                                - Mon:03:00-Wed:02:30
                            odWindows:
                              type: array
                              items:
                                type: string
                              description: |
                                * Define the time windows in which the underlying VM will be set as an on-demand lifecycle type.
                                * During the entire time window, the rest of the strategy processes will be paused.
                                * Switching between on-demand and Spot VM types at the enter/exit of the time window will trigger the recycling of the stateful node.
                                * <a style=color:red>Requires the following format: "ddd:hh:mm-ddd:hh:mm (day:hour(0-23):minute(0-59))".</a>
                              example: &ref_164
                                - Sun:23:00-Mon:02:30
                            capacityReservation:
                              type: object
                              description: |
                                On-demand Capacity Reservation group enables you to reserve Compute capacity in an Azure region or an Availability Zone for any duration of time.
                                [CRG can only be created on the Azure end.](https://learn.microsoft.com/en-us/azure/virtual-machines/capacity-reservation-create)
                              required:
                                - shouldUtilize
                                - utilizationStrategy
                              properties:
                                shouldUtilize:
                                  type: boolean
                                  description: |
                                    Determines whether capacity reservations should be utilized.
                                  example: true
                                utilizationStrategy:
                                  type: string
                                  description: |
                                    The priority requested for using CRG. This value will determine if CRG is used ahead of spot VMs or On-demand VMs.
                                    * utilizeOverOD- If picked, we will use CRG only in case On demand should be launched.
                                    * utilizeOverSpot-  CRG will be preferred over Spot. Only after CRG is fully used, spot VMs can be used.
                                  enum:
                                    - utilizeOverSpot
                                    - utilizeOverOD
                                  example: utilizeOverSpot
                                capacityReservationGroups:
                                  type: array
                                  description: |
                                    List of the desired CRGs to use under the associated Azure subscription.
                                    When null we will utilize any available reservation that matches the Virtual Node Group.
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - resourceGroupName
                                    properties:
                                      name:
                                        type: string
                                        description: |
                                          The name of the CRG.
                                        example: capacityReservationGroupName
                                      resourceGroupName:
                                        type: string
                                        description: |
                                          Azure resource group name
                                        example: resourceGroupName
                                      shouldPrioritize:
                                        type: boolean
                                        description: |
                                          The desired CRG to utilize ahead of other CRGs in the subscription.
                                        example: true
                                    example:
                                      name: capacityReservationGroupName
                                      resourceGroupName: resourceGroupName
                                      shouldPrioritize: true
                              example:
                                shouldUtilize: true
                                utilizationStrategy: utilizeOverSpot
                                capacityReservationGroups:
                                  - name: capacityReservationGroupName
                                    resourceGroupName: resourceGroupName
                                    shouldPrioritize: true
                            availabilityVsCost:
                              title: Elastigroup Availability VS Cost
                              description: |
                                Set the desired preference for the Spot market VM selection. (100-  Availability, 0- cost)
                              type: integer
                              example: 100
                            interruptionToleration:
                              type: object
                              description: |
                                Interruption tolerance settings for the stateful node. When enabled, the stateful node tracks interruption frequency and 
                                temporarily switches the node to On-Demand if too many interruptions occur within a defined evaluation window.
                              properties:
                                isEnabled:
                                  type: boolean
                                  description: |
                                    Enables interruption tolerance for the stateful node.
                                  example: true
                                cooldown:
                                  type: integer
                                  description: |
                                    The cooldown period in minutes after an interruption occurs before another interruption can be tolerated.
                                    Must be set if isEnabled is true.
                                  minimum: 120
                                  maximum: 10080
                                  example: 20
                                evaluationPeriod:
                                  type: integer
                                  description: |
                                    The period in minutes to evaluate the interruption tolerance. 
                                    Must be set if isEnabled is true.
                                  minimum: 30
                                  maximum: 1440
                                  example: 60
                                threshold:
                                  type: integer
                                  description: |
                                    The maximum number of interruptions allowed within the evaluation period.
                                    Must be set if isEnabled is true.
                                  minimum: 3
                                  example: 3
                              example:
                                isEnabled: true
                                cooldown: 20
                                evaluationPeriod: 60
                                threshold: 3
                          example:
                            preferredLifecycle: od
                            shouldUtilizeCommitments: true
                            signals:
                              - type: vmReady
                                timeout: 180
                            fallbackToOd: true
                            drainingTimeout: 30
                            revertToSpot:
                              performAt: timeWindow
                            optimizationWindows: *ref_163
                            odWindows: *ref_164
                            capacityReservation:
                              shouldUtilize: true
                              utilizationStrategy: utilizeOverSpot
                              capacityReservationGroups:
                                - name: capacityReservationGroupName
                                  resourceGroupName: resourceGroupName
                                  shouldPrioritize: true
                            availabilityVsCost: 100
                            interruptionToleration:
                              isEnabled: true
                              cooldown: 20
                              evaluationPeriod: 60
                              threshold: 3
                        compute:
                          type: object
                          title: Stateful Node Compute
                          description: |
                            Defines the computational parameters to use when launch the VM for the Stateful Node.
                          required:
                            - os
                            - vmSizes
                            - launchSpecification
                          properties:
                            os:
                              type: string
                              enum:
                                - Linux
                                - Windows
                              description: |
                                Defines the type of the operating system.
                              example: Linux
                            vmSizes:
                              type: object
                              description: |
                                Defines the VM sizes to use when launching VMs.
                              required:
                                - odSizes
                              properties:
                                odSizes:
                                  type: array
                                  description: |
                                    Defines the on-demand sizes to use when launching VMs.
                                  items:
                                    type: string
                                    example: standard_a1_v2
                                spotSizes:
                                  type: array
                                  description: |
                                    Defines the spot VM sizes to use when launching VMs.
                                    <a style=color:red>Required if spotSizeAttributes isn't specified.</a>
                                  items:
                                    type: string
                                    example: standard_a2_v2
                                spotSizeAttributes:
                                  type: object
                                  description: |
                                    The values and ranges for spot size attributes when launching VMs.
                                     <a style=color:red>Required if spotSizes isn't specified.</a>
                                  properties:
                                    minCpu:
                                      type: integer
                                      example: 2
                                      description: |
                                        Minimum amount of vCPU units.
                                    maxCpu:
                                      type: integer
                                      example: 16
                                      description: |
                                        Maximum amount of vCPU units.
                                    minStorage:
                                      type: integer
                                      example: 50
                                      description: |
                                        Minimum amount of storage in GiB.
                                    MaxStorage:
                                      type: integer
                                      example: 1000
                                      description: |
                                        Maximum amount of storage in GiB.
                                    minMemory:
                                      type: integer
                                      example: 2
                                      description: |
                                        Minimum amount of memory in GiB.
                                    maxMemory:
                                      type: integer
                                      example: 48
                                      description: |
                                        Maximum amount of memory in GiB.
                                  example:
                                    minCpu: 2
                                    maxCpu: 16
                                    minStorage: 50
                                    MaxStorage: 1000
                                    minMemory: 2
                                    maxMemory: 48
                                excludedVmSizes:
                                  type: array
                                  description: |
                                    Exclude these spot VM sizes when using attribute-based VM sizes.
                                  items:
                                    type: string
                                    example: standard_a2_v2
                                preferredSpotSizes:
                                  type: array
                                  description: |
                                    Prioritize Spot VM sizes when launching Spot VMs.
                                    * <a style=color:red>If set, must be a sublist of compute.vmSizes.spotSizes. </a>
                                  items:
                                    type: string
                                    example: standard_a2_v2
                              example:
                                odSizes:
                                  - standard_a1_v2
                                spotSizes:
                                  - standard_a2_v2
                                spotSizeAttributes:
                                  minCpu: 2
                                  maxCpu: 16
                                  minStorage: 50
                                  MaxStorage: 1000
                                  minMemory: 2
                                  maxMemory: 48
                                excludedVmSizes:
                                  - standard_a2_v2
                                preferredSpotSizes:
                                  - standard_a2_v2
                            zones:
                              type: array
                              description: |
                                List of Azure Availability Zones in the defined region.
                                * If not defined, VMs will be launched regionally.
                              items:
                                enum:
                                  - '1'
                                  - '2'
                                  - '3'
                                type: string
                                example: '1'
                            preferredZone:
                              type: string
                              description: |
                                The AZ to prioritize when launching VMs.
                                * If no markets are available in the Preferred AZ, VMs will be launched in the non-preferred AZs.
                                * <a style=color:red>Must be one of the zones in compute.zones.</a>
                              enum:
                                - '1'
                                - '2'
                                - '3'
                              example: '1'
                            launchSpecification:
                              type: object
                              description: Defines the Virtual Node Group of the VM.
                              required:
                                - image
                                - network
                              properties:
                                image:
                                  type: object
                                  description: |
                                    Defines the image with which the VM will be launched.
                                    * <a style=color:red>Must be only one initialized from the following (marketplace, custom, gallery).</a>
                                    * <a style=color:red>For import or update operations, image object cannot be defined when the compute.persistence.shouldPersistOsDisk = true.</a>
                                    * <a style=color:red>For import or update operations, image that contains data disk definitions cannot be defined when the compute.persistence.shouldPersistDataDisks = true.</a>
                                  properties:
                                    marketplace:
                                      type: object
                                      description: |
                                        Select an image from Azure's Marketplace image catalogue.
                                        * <a style=color:red>Required if the custom image or gallery image are not specified.</a>
                                      required:
                                        - publisher
                                        - offer
                                        - sku
                                        - version
                                      properties:
                                        publisher:
                                          type: string
                                          description: |
                                            Image publisher.
                                          example: OpenLogic
                                        offer:
                                          type: string
                                          description: |
                                            Image offer.
                                          example: CentOS
                                        sku:
                                          type: string
                                          description: |
                                            Image Stock Keeping Unit, which is the specific version of the image.
                                          example: '7.3'
                                        version:
                                          type: string
                                          description: |
                                            Image's version. if version not provided we use "latest"
                                          default: lastest
                                          example: 7.3-1611
                                      example:
                                        publisher: OpenLogic
                                        offer: CentOS
                                        sku: '7.3'
                                        version: 7.3-1611
                                    custom:
                                      type: object
                                      description: |
                                        Custom image definitions.
                                        * <a style=color:red>Required if marketplace image or gallery image are not specified.</a>
                                      required:
                                        - resourceGroupName
                                        - name
                                      properties:
                                        resourceGroupName:
                                          type: string
                                          description: |
                                            The resource group name for custom image.
                                          example: spotinst-azure
                                        name:
                                          type: string
                                          description: |
                                            The name of the custom image.
                                          example: custom-image-name
                                      example:
                                        resourceGroupName: spotinst-azure
                                        name: custom-image-name
                                    gallery:
                                      title: Gallery
                                      type: object
                                      description: |
                                        Gallery image definitions.
                                        * <a style=color:red>Required if custom image or marketplace image are not specified.</a>
                                      required:
                                        - resourceGroupName
                                        - galleryName
                                        - imageName
                                        - versionName
                                      properties:
                                        resourceGroupName:
                                          title: Resource Group Name
                                          description: |
                                            The resource group name for gallery image.
                                          type: string
                                          example: spotinst-azure
                                        galleryName:
                                          title: Gallery Name
                                          description: |
                                            Name of the gallery.
                                          type: string
                                          example: gallery-name
                                        imageName:
                                          title: Image Name
                                          description: |
                                            Name of the gallery image.
                                          type: string
                                          example: gallery-image-name
                                        versionName:
                                          title: Version
                                          description: |
                                            Image's version. Can be in the format x.x.x or 'latest'.
                                          type: string
                                          example: 0.0.1
                                        spotAccountId:
                                          title: Spot Account ID
                                          description: The Spot account ID that connected to the Azure subscription to which the gallery belongs. Relevant only in case of cross-subscription shared galleries. [Read more](https://docs.flexera.com/spot/elastigroup/features-azure/shared-image-galleries) about cross-subscription shared galleries in Elastigroup.
                                          type: string
                                          example: act-123456789
                                      example:
                                        resourceGroupName: spotinst-azure
                                        galleryName: gallery-name
                                        imageName: gallery-image-name
                                        versionName: 0.0.1
                                        spotAccountId: act-123456789
                                  example:
                                    marketplace:
                                      publisher: OpenLogic
                                      offer: CentOS
                                      sku: '7.3'
                                      version: 7.3-1611
                                    custom:
                                      resourceGroupName: spotinst-azure
                                      name: custom-image-name
                                    gallery:
                                      resourceGroupName: spotinst-azure
                                      galleryName: gallery-name
                                      imageName: gallery-image-name
                                      versionName: 0.0.1
                                      spotAccountId: act-123456789
                                purchasePlan:
                                  description: |
                                    Defines the Azure Marketplace purchase plan metadata for the selected image or osDisk image.
                                  allOf:
                                    - type: object
                                      title: Purchase Plan
                                      additionalProperties: false
                                      description: |
                                        Defines the Azure Marketplace purchase plan for the VM image.
                                      required:
                                        - publisher
                                        - product
                                        - name
                                      properties:
                                        publisher:
                                          type: string
                                          minLength: 1
                                          description: |
                                            Purchase plan publisher.
                                          example: canonical
                                        product:
                                          type: string
                                          minLength: 1
                                          description: |
                                            Purchase plan product / offer.
                                          example: 0001-com-ubuntu-pro-jammy
                                        name:
                                          type: string
                                          minLength: 1
                                          description: |
                                            Purchase plan name / SKU.
                                            * This value is case-sensitive and must exactly match the Azure plan metadata.
                                          example: pro-22_04-lts
                                vmName:
                                  type: string
                                  description: |
                                    * Set a VM name that will be persisted throughout the entire node lifecycle.
                                    * The name value should comply with the following limitations: 
                                      *  A maximal length of 64 characters.
                                      * The name can’t contain spaces, control characters, or these characters: ~ ! @ # $ % ^ & * ( ) = + _ [ ] { } | ; : . ' " , < > / ?
                                      *  A Windows VM name can't include a period or end with a hyphen.
                                      * A Linux VM name can't end with a period or hyphen.
                                  example: devVm1
                                vmNamePrefix:
                                  type: string
                                  description: |
                                    * Set a VM name prefix to be used for all launched VMs and the VM resources.
                                    * The prefix value should comply with the following limitations: 
                                      *  A maximal length of 25 characters.
                                      * The prefix can’t contain spaces, control characters, or these characters: ~ ! @ # $ % ^ & * ( ) = + _ [ ] { } | ; : . ' " , < > / ?
                                      * The VM prefix can't end with a hyphen.
                                  example: prefix
                                customData:
                                  type: string
                                  format: byte
                                  description: |
                                    Defines the custom data (YAML encoded at Base64) that will be executed upon VM launch.
                                    * <a style=color:red>The customData object cannot be defined when the compute.launchSpecification.image is defined as specialized.</a>
                                    * <a style=color:red>For import or update operations, customData object cannot be defined when the compute.persistence.shouldPersistOsDisk = true.</a>
                                  example: ''
                                userData:
                                  type: string
                                  description: |
                                    Define a set of scripts or other metadata that's inserted to an Azure virtual machine at provision time. (Base64 encoded)
                                  example: IyEvYmluL2Jhc2gKZWNobyAidGVzdCI
                                shutdownScript:
                                  type: string
                                  format: byte
                                  writeOnly: true
                                  example: IyEvdXNyL2Jpbi9lbnYgYmFzaAoiR29vZGJ5ZSBvbGQgaW5zdGFuY2Ui
                                  description: |
                                    Defines the shutdown script (encoded at Base64) to execute once the VM is detached.
                                    * <a style=color:red>For import or update operations, shutdownScript object cannot be defined when the compute.persistence.shouldPersistOsDisk = true.</a>
                                network:
                                  title: Network
                                  description: |
                                    Defines the network profile with which the VM will be launched.
                                    * <a style=color:red>For import or update operations, network object cannot be defined when the compute.persistence.shouldPersistNetwork = true.</a>
                                  type: object
                                  required:
                                    - resourceGroupName
                                    - virtualNetworkName
                                    - networkInterfaces
                                  properties:
                                    resourceGroupName:
                                      title: Resource Group Name
                                      description: Defines the resource group name of the virtual network with which the VM will be launched.
                                      type: string
                                      example: subnetResourceGroup
                                    virtualNetworkName:
                                      title: Virtual Network Name
                                      description: Defines the name of the virtual network with which the VM will be launched.
                                      type: string
                                      example: vname
                                    networkInterfaces:
                                      title: Network Interfaces
                                      description: Defines the network interfaces with which the VM will be launched.
                                      type: array
                                      items:
                                        type: object
                                        required:
                                          - isPrimary
                                          - subnetName
                                        properties:
                                          isPrimary:
                                            title: Is Primary Criteria
                                            description: |
                                              Defines whether the network interface is primary or not.
                                              * <a style=color:red>Must be true for only one of the items.</a>
                                            type: boolean
                                            example: true
                                          subnetName:
                                            title: Subnet Name
                                            description: Defines the subnet to which the network interface will be connected.
                                            type: string
                                            example: testSubnet
                                          assignPublicIp:
                                            title: Assign Public IP
                                            description: Defines if a Public IP should be assigned in this network interface.
                                            type: boolean
                                            example: true
                                          publicIpSku:
                                            title: Public Ip Sku
                                            description: |
                                              Defines the type of public IP to assign the VM.
                                              * <a style=color:red>Required if assignPublicIp=true.</a>
                                            type: string
                                            enum:
                                              - Standard
                                              - Basic
                                            example: Standard
                                          networkSecurityGroup:
                                            title: Network Security Group
                                            description: Defines the network security group to which the network interface will be assigned.
                                            type: object
                                            required:
