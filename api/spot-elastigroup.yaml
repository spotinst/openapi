openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Elastigroup
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@flexera.com
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags:
  - name: Elastigroup AWS
    description: Elastigroup for Amazon Web Services (AWS)
    externalDocs:
      description: Elastigroup Concepts and Tutorials
      url: https://docs.flexera.com/spot/elastigroup/
  - name: Elastigroup Azure Spot VMs
    description: Elastigroup for Microsoft Azure
    externalDocs:
      description: Elastigroup Concepts and Tutorials
      url: https://docs.flexera.com/spot/elastigroup/
  - name: Elastigroup GCP
    description: Elastigroup for Google Cloud
    externalDocs:
      description: Elastigroup Concepts and Tutorials
      url: https://docs.flexera.com/spot/elastigroup/
  - name: Elastigroup Azure Stateful
    description: Elastigroup for Microsoft Azure Stateful Node
    externalDocs:
      description: Elastigroup Concepts and Tutorials
      url: https://docs.flexera.com/spot/elastigroup/
paths:
  /aws/ec2/group:
    summary: Elastigroups for AWS
    post:
      summary: Create Elastigroup
      description: |
        Create a new AWS Elastigroup.

        There are several third Party Integrations available, which can be activated based on your configuration, such as:
        * [Rancher Elastigroup](https://docs.flexera.com/spot/elastigroup/tools-integrations/rancher)
        * [Route53 Elastigroup](https://docs.flexera.com/spot/elastigroup/tools-integrations/route53)
        * [DockerSwarm Elastigroup](https://docs.flexera.com/spot/elastigroup/tools-integrations/docker-swarm)
        * [ECS Elastigroup](https://docs.flexera.com/spot/elastigroup/features/amazon-ecs/elastigroup-for-ecs)
        * [Beanstalk Elastigroup](https://docs.flexera.com/spot/elastigroup/tools-integrations/elastic-beanstalk)


          You can create a beanstalk elastigroup with the following steps:
          * [Get the beanstalk configuration](https://spec.dev.spot.io/#operation/elastigroupAwsGetBeanstalkConfiguration) to JSON format
          * Modify required parameters and post the JSON as a body to create a new elastigroup
      operationId: elastigroupAwsCreate
      tags:
        - Elastigroup AWS
      parameters:
        - &ref_48
          in: query
          name: accountId
          example: act-123456789
          description: |
            The ID of the account associated with your token.
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: AWS Elastigroup
                  required:
                    - group
                  properties:
                    group:
                      type: object
                      description: Elastigroup Configuration
                      required:
                        - name
                        - capacity
                        - region
                        - strategy
                        - compute
                      properties:
                        name:
                          type: string
                          description: |
                            AWS Elastigroup Name
                          example: my-Elastigroup
                        description:
                          type: string
                          description: |
                            Describe your AWS Elastigroup
                          example: This Elastigroup is used for Development
                        region:
                          type: string
                          description: |
                            The AWS region your group will be created in.
                             This parameter is required if you specify subnets (through compute.subnetIds).
                             This parameter is optional if you specify Availability Zones (through compute.availabilityZones).
                          example: use-east-1
                        capacity:
                          description: Capacity Configuration
                          type: object
                          title: Elastigroup Capacity
                          required:
                            - target
                            - minimum
                            - maximum
                            - unit
                          properties:
                            target:
                              type: integer
                              description: |
                                The number of instances to launch
                              example: 1
                            minimum:
                              type: integer
                              description: |
                                The lower limit number of instances that you can scale down to
                              example: 0
                            maximum:
                              type: integer
                              description: |
                                The upper limit number of instances that you can scale up to
                              example: 10
                            unit:
                              type: string
                              enum:
                                - instance
                                - weight
                              description: |
                                The capacity unit to launch instances by.
                                Note: for groups with integration to K8S / ECS weight option is not supported.
                              example: instance
                          example:
                            target: 1
                            minimum: 0
                            maximum: 10
                            unit: instance
                        strategy:
                          type: object
                          title: Elastigroup Strategy
                          description: Strategy
                          required:
                            - availabilityVsCost
                          properties:
                            risk:
                              type: integer
                              minimum: 0
                              maximum: 100
                              example: 100
                              default: 0
                              description: |
                                The percentage of Elastigroup that will run with spot market capacity
                            onDemandCount:
                              type: integer
                              minimum: 0
                              example: 0
                              description: |
                                Minimum number of instances that will always be on-demand
                            availabilityVsCost:
                              type: string
                              enum:
                                - costOriented
                                - availabilityOriented
                                - balanced
                                - cheapest
                                - equalAzDistribution
                              default: balanced
                              description: |
                                How Elastigroup determines which instances to add and replace.
                                (please read this article before using [Equal AZ Instance Distribution](https://docs.flexera.com/spot/elastigroup-for-aws/concepts/general-concepts/equal-az-distribution))
                            fallbackToOd:
                              type: boolean
                              default: true
                              example: true
                              description: |
                                When set to `true` Elastigroup will launch On Demand instances if no spot market is available
                            considerODPricing:
                              type: boolean
                              default: false
                              example: false
                              description: |
                                When the value is set to `true`, Elastigroup will prioritize launching On-Demand instances if they are found to be more cost-effective than available Spot markets.
                            utilizeReservedInstances:
                              type: boolean
                              description: |
                                In case of any available Reserved Instances, Elastigroup will utilize them before purchasing Spot instances
                              example: false
                            utilizeCommitments:
                              type: boolean
                              description: |
                                If there are available Reserved Instances or Savings Plans, Elastigroup will utilize them before using Spot instances
                              example: false
                            restrictSingleAz:
                              type: boolean
                              description: |
                                Elastigroup will automatically scale your instances in the most available and cost efficient availability zone. Every evaluation will be done when there are no active instances in the group.
                              example: false
                            drainingTimeout:
                              type: integer
                              example: 120
                              description: |
                                The time in seconds to allow the instance be drained from incoming TCP connections and detached from ELB before terminating it, during a scale down operation
                            maxReplacementsPercentage:
                              type: integer
                              description: |
                                The percentage of active instances that can be replaced in parallel.
                                This is used to prevent a large number of instances from being replaced at once.
                              example: 15
                            signals:
                              type: array
                              description: |
                                The signals defined for this group. For more information refer the below article: [Signals](https://docs.flexera.com/spot/elastigroup-for-aws/concepts/compute-concepts/using-signals-in-elastigroups)
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                    description: |
                                      The name of the signal defined for the group.
                                    enum:
                                      - INSTANCE_READY
                                      - INSTANCE_READY_TO_SHUTDOWN
                                  timeout:
                                    type: integer
                                    minimum: 60
                                    maximum: 1800
                                    description: |
                                      The timeout in seconds to hold the instance until a signal is sent.
                                      If no signal is sent the instance will be replaced (INSTANCE_READY) or we will terminate the instance (INSTANCE_READY_TO_SHUTDOWN) after the timeout.
                                    default: 1800
                                    example: 120
                                example:
                                  timeout: 120
                            persistence:
                              type: array
                              description: |
                                You can register persistence (Stateful) recovery arguments
                              items:
                                type: object
                                properties:
                                  shouldPersistPrivateIp:
                                    type: boolean
                                    description: |
                                      Should the instance maintain its private IP
                                    example: true
                                  shouldPersistRootDevice:
                                    type: boolean
                                    description: |
                                      Should the instance maintain its root device volumes
                                    example: true
                                  shouldPersistBlockDevices:
                                    type: boolean
                                    description: |
                                      Should the instance maintain its Data volumes
                                    example: true
                                  blockDevicesMode:
                                    type: string
                                    description: |
                                      Determine the way we attach the data volumes to the data devices
                                    enum:
                                      - reattach
                                      - onLaunch
                                    example: reattach
                                example:
                                  shouldPersistPrivateIp: true
                                  shouldPersistRootDevice: true
                                  shouldPersistBlockDevices: true
                                  blockDevicesMode: reattach
                            revertToSpot:
                              type: object
                              description: |
                                Hold settings for strategy correction - replacing On-Demand for Spot instances
                              properties:
                                performAt:
                                  type: string
                                  description: |
                                    Settings for maintenance strategy - possible values: timeWindow, never, always.
                                    performAt of type: 'never' OR 'timeWindow' can only be applied to groups with "availabilityOriented" OR groups with "persistence",
                                    other groups allow either 'always' type or nothing which also means always.
                                  enum:
                                    - never
                                    - always
                                    - timeWindow
                                  example: timeWindow
                                  default: always
                                timeWindows:
                                  type: array
                                  description: |
                                    When performAt is 'timeWindow': must specify a list of 'timeWindows' with at least one time window Each string is in the format of - ddd:hh:mm-ddd:hh:mm
                                    ddd = day of week = Sun | Mon | Tue | Wed | Thu | Fri | Sat
                                    hh = hour 24 = 0 -23
                                    mm = minute = 0 - 59
                                  items:
                                    type: string
                                    example: Mon:03:00-Wed:02:30
                              example:
                                performAt: timeWindow
                                timeWindows:
                                  - Mon:03:00-Wed:02:30
                            scalingStrategy:
                              type: object
                              description: |
                                Set termination policy
                              properties:
                                terminationPolicy:
                                  type: string
                                  enum:
                                    - default
                                    - newestInstance
                                  example: default
                              example:
                                terminationPolicy: default
                          example:
                            risk: 100
                            onDemandCount: 0
                            fallbackToOd: true
                            considerODPricing: false
                            utilizeReservedInstances: false
                            utilizeCommitments: false
                            restrictSingleAz: false
                            drainingTimeout: 120
                            maxReplacementsPercentage: 15
                            signals:
                              - timeout: 120
                            persistence:
                              - shouldPersistPrivateIp: true
                                shouldPersistRootDevice: true
                                shouldPersistBlockDevices: true
                                blockDevicesMode: reattach
                            revertToSpot:
                              performAt: timeWindow
                              timeWindows:
                                - Mon:03:00-Wed:02:30
                            scalingStrategy:
                              terminationPolicy: default
                        compute:
                          type: object
                          title: Elastigroup Compute
                          required:
                            - availabilityZones
                            - launchSpecification
                          properties:
                            product:
                              type: string
                              description: |
                                Operation system type.
                              enum:
                                - Linux/UNIX (Amazon VPC)
                                - SUSE Linux (Amazon VPC)
                                - Windows (Amazon VPC)
                                - Red Hat Enterprise Linux (Amazon VPC)
                              example: Linux/UNIX
                            elasticIps:
                              type: array
                              description: |
                                List of ElasticIPs Allocation Ids to associate to the group instances
                              items:
                                type: string
                                example: eipalloc-9d4e16f8
                            privateIps:
                              type: array
                              description: |
                                List of Private IPs to associate to the group instances.
                                Please note: This setting will only apply if rategy.persistence.shouldPersistPrivateIp is set to true.
                              items:
                                type: string
                                default: 172.1.1.0
                            instanceTypes:
                              type: object
                              description: |
                                Instance Types
                              properties:
                                ondemand:
                                  type: string
                                  description: |
                                    Available on demand instance type.
                                    Note: Either ondemand or onDemandTypes must be defined, but not both.
                                  example: m3.medium
                                onDemandTypes:
                                  type: array
                                  description: |
                                    Available on demand instance types.
                                    Note: Either ondemand or onDemandTypes must be defined, but not both.
                                  items:
                                    type: string
                                    example: &ref_3
                                      - c3.large
                                      - c4.large
                                      - m3.large
                                      - r3.large
                                spot:
                                  type: array
                                  description: |
                                    Available Spot Instance types.  
                                    Note: Cannot be defined if 'resourceRequirements' is defined.
                                  items:
                                    type: string
                                    example: &ref_4
                                      - c3.large
                                      - c4.large
                                      - m3.large
                                      - r3.large
                                resourceRequirements: &ref_15
                                  type: object
                                  title: Resource Requirements
                                  description: |
                                    Required instance attributes. Instance types will be selected based on these requirements.
                                  required:
                                    - requiredVCpu
                                    - requiredMemory
                                  properties:
                                    requiredGpu:
                                      type: object
                                      description: Required instance GPU
                                      properties:
                                        minimum:
                                          type: integer
                                          minimum: 1
                                        maximum:
                                          type: integer
                                          maximum: 16
                                    requiredVCpu:
                                      type: object
                                      description: Required instance vCPU
                                      properties:
                                        minimum:
                                          type: integer
                                          minimum: 1
                                        maximum:
                                          type: integer
                                          maximum: 64
                                    requiredMemory:
                                      type: object
                                      description: Required instance memory (GiB)
                                      properties:
                                        minimum:
                                          type: integer
                                          minimum: 1
                                        maximum:
                                          type: integer
                                          maximum: 512
                                    excludedInstanceTypes:
                                      type: array
                                      description: Instance types to exclude
                                      items:
                                        type: string
                                        example: &ref_0
                                          - c4.large
                                    excludedInstanceFamilies:
                                      type: array
                                      description: Instance families to exclude
                                      items:
                                        type: string
                                        example: &ref_1
                                          - A
                                          - C
                                          - D
                                    excludedInstanceGenerations:
                                      type: array
                                      description: Instance generations to exclude
                                      items:
                                        type: string
                                        example: &ref_2
                                          - '1'
                                          - '2'
                                          - '3'
                                  example: &ref_18
                                    excludedInstanceTypes:
                                      - *ref_0
                                    excludedInstanceFamilies:
                                      - *ref_1
                                    excludedInstanceGenerations:
                                      - *ref_2
                                preferredSpot:
                                  type: array
                                  description: |
                                    Prioritized subset of spot instance types. The list must be a subset of the selected spot instance 
                                    types or meet the resource requirements if defined.
                                  items:
                                    type: string
                                    example: &ref_5
                                      - c4.large
                                weights:
                                  type: array
                                  description: |
                                    Custom weight for each instance type (only valid in weight capacity unit)
                                  items:
                                    type: object
                                    properties:
                                      instanceType:
                                        type: string
                                        description: |
                                          The instance type to customize its weight
                                        example: c4.large
                                      weightedCapacity:
                                        type: integer
                                        description: |
                                          The weight
                                        example: 8
                                    example:
                                      instanceType: c4.large
                                      weightedCapacity: 8
                              example:
                                ondemand: m3.medium
                                onDemandTypes:
                                  - *ref_3
                                spot:
                                  - *ref_4
                                resourceRequirements:
                                  excludedInstanceTypes:
                                    - *ref_0
                                  excludedInstanceFamilies:
                                    - *ref_1
                                  excludedInstanceGenerations:
                                    - *ref_2
                                preferredSpot:
                                  - *ref_5
                                weights:
                                  - instanceType: c4.large
                                    weightedCapacity: 8
                            subnetIds:
                              type: array
                              description: |
                                A comma-separated list of subnet identifiers for your group.
                                When this parameter is set, compute.availabilityZones should be left unused.
                              items:
                                type: string
                                example: &ref_10
                                  - subnet-4c1d1538
                                  - subnet-2791bb61
                                  - subnet-703a6f58
                                  - subnet-c62846fc
                            availabilityZones:
                              type: array
                              description: |
                                One or more availability Zones for the group.
                                When this parameter is set, compute.subnetIds should be left unused.
                              items:
                                type: object
                                required:
                                  - name
                                properties:
                                  name:
                                    type: string
                                    description: |
                                      The Availability Zone name
                                    example: us-west-2a
                                  subnetIds:
                                    type: array
                                    description: |
                                      A comma-separated list of subnet identifiers for your group.
                                    items:
                                      type: string
                                      example: &ref_6
                                        - subnet-4333093a
                                  placementGroupName:
                                    type: string
                                    description: |
                                      specify a Placement Group name, the instances will be launched in the Placement Group for the AZ.
                                example:
                                  name: us-west-2a
                                  subnetIds:
                                    - *ref_6
                            preferredAvailabilityZones:
                              type: array
                              description: |
                                The AZs to prioritize when launching Spot instances.
                                If no markets are available in the Preferred AZs, Spot instances are launched in the non-preferred AZs.
                                * Must be a sublist of compute.AvailabilityZones
                                * strategy.availabilityVsCost must not be equalAzDistribution
                              items:
                                type: string
                                example: &ref_11
                                  - us-east-1a
                                  - us-east-1b
                            launchSpecification:
                              type: object
                              required:
                                - securityGroupIds
                                - monitoring
                              properties:
                                creditSpecification:
                                  type: object
                                  description: |
                                    creditSpecification is a parameter that indicates in what mode t2/t3 instances will be launched with. It consists of one key: cpuCredits (String)
                                  properties:
                                    cpuCredits:
                                      type: string
                                      enum:
                                        - unlimited
                                        - standard
                                      example: unlimited
                                  example:
                                    cpuCredits: unlimited
                                loadBalancersConfig:
                                  type: object
                                  description: |
                                    Elastic Load Balancers configurations
                                  properties:
                                    loadBalancers:
                                      type: array
                                      description: |
                                        List of classic load balancers and/or application load balancer target groups
                                      items:
                                        type: object
                                        properties:
                                          name:
                                            type: string
                                            description: |
                                              The AWS resource name. Required for Classic Load Balancer. Optional for Application Load Balancer.
                                            example: MyTargetGroup
                                          arn:
                                            type: string
                                            description: |
                                              The AWS resource ARN (Required only for ALB target groups)
                                            example: arn:aws:elasticloadbalancing:us-west-2:922761411234:targetgroup/MyTargetGroup/1fe63217f8ff1234
                                          type:
                                            type: string
                                            description: |
                                              The resource type.
                                            enum:
                                              - CLASSIC
                                              - TARGET_GROUP
                                            example: TARGET_GROUP
                                        example:
                                          name: MyTargetGroup
                                          arn: arn:aws:elasticloadbalancing:us-west-2:922761411234:targetgroup/MyTargetGroup/1fe63217f8ff1234
                                          type: TARGET_GROUP
                                  example:
                                    loadBalancers:
                                      - name: MyTargetGroup
                                        arn: arn:aws:elasticloadbalancing:us-west-2:922761411234:targetgroup/MyTargetGroup/1fe63217f8ff1234
                                        type: TARGET_GROUP
                                itf:
                                  title: Intelligent Traffic Flow (ITF) Configuration
                                  type: object
                                  description: |
                                    Contains the configuration details of Intelligent Traffic Flow (ITF).
                                  properties:
                                    fixedTargetGroups:
                                      type: boolean
                                      description: |
                                        Boolean to control whether to keep the set of target groups fixed. When set to true, all target groups will be created in advance upon create/update group, and will not be deleted even when not being used anymore.
                                      default: false
                                      example: false
                                    weightStrategy:
                                      type: string
                                      description: |
                                        Distribution strategy (either 'vcpu' or 'custom'). 'Custom' strategy can be set only when the group is configured with custom weights.
                                      enum:
                                        - vcpu
                                        - custom
                                      default: vcpu
                                      example: custom
                                    migrationHealthinessThreshold:
                                      type: integer
                                      description: |
                                        Threshold for the minimum healthiness level of the target groups that is needed before activating the ITF rules. Integer representing the percentage of healthy instances within the target groups. Valid values: integer between 0-100.
                                      default: 50
                                      example: 80
                                    loadBalancers:
                                      type: array
                                      description: |
                                        The load balancer associated with the ITF. Array with a single element.
                                      items: &ref_22
                                        title: ITF Load Balancer Configuration
                                        type: object
                                        description: |
                                          Contains the configuration details of an ITF load balancer.
                                        required:
                                          - loadBalancerArn
                                          - listenerRules
                                        properties:
                                          loadBalancerArn:
                                            type: string
                                            description: |
                                              Identifier of the load balancer in AWS.
                                            example: arn:aws:elasticloadbalancing:us-west-2:123456789012:loadbalancer/app/my-load-balancer/50dc6c495c0c9188
                                          listenerRules:
                                            type: array
                                            description: |
                                              The listener rules that should be maintained by ITF. Array with a minimum of 1 element.
                                            items:
                                              title: ITF Listener Rule Configuration
                                              type: object
                                              description: |
                                                Contains the configuration details of an ITF listener rule.
                                              required:
                                                - ruleArn
                                              properties:
                                                ruleArn:
                                                  type: string
                                                  description: |
                                                    Identifier of the listener rule in AWS.
                                                  example: arn:aws:elasticloadbalancing:us-west-2:123456789012:listener-rule/app/0123456789012345/1234567890123456/234567890123456
                                                staticTargetGroups:
                                                  type: array
                                                  description: Listener rule target group whose percentage should remain static (unchanged). Array with a single element.
                                                  items: &ref_8
                                                    title: ITF Static Target Group Configuration
                                                    type: object
                                                    description: |
                                                      Contains the configuration details of an ITF static target group.
                                                    required:
                                                      - arn
                                                      - percentage
                                                    properties:
                                                      arn:
                                                        type: string
                                                        description: |
                                                          Identifier of the target group in AWS.
                                                        example: arn:aws:elasticloadbalancing:us-west-2:123456789012:targetgroup/blue-targets/73e2d6bc24d8a067
                                                      percentage:
                                                        type: number
                                                        description: |
                                                          A float number in the range of 0.1-10.
                                                        example: 0.4
                                                    example:
                                                      arn: arn:aws:elasticloadbalancing:us-west-2:123456789012:targetgroup/blue-targets/73e2d6bc24d8a067
                                                      percentage: 0.4
                                                  example: &ref_7
                                                    - arn: arn:aws:elasticloadbalancing:us-west-2:123456789012:targetgroup/blue-targets/73e2d6bc24d8a068
                                                      percentage: 0.5
                                              example:
                                                ruleArn: arn:aws:elasticloadbalancing:us-west-2:123456789012:listener-rule/app/0123456789012345/1234567890123456/234567890123456
                                                staticTargetGroups: *ref_7
                                          defaultStaticTargetGroups:
                                            type: array
                                            description: A default static target group on the rule. Array with a single element.
                                            items: *ref_8
                                        example: &ref_24
                                          loadBalancerArn: arn:aws:elasticloadbalancing:us-west-2:123456789012:loadbalancer/app/my-load-balancer/50dc6c495c0c9188
                                          listenerRules:
                                            - ruleArn: arn:aws:elasticloadbalancing:us-west-2:123456789012:listener-rule/app/0123456789012345/1234567890123456/234567890123456
                                              staticTargetGroups: *ref_7
                                          defaultStaticTargetGroups:
                                            - arn: arn:aws:elasticloadbalancing:us-west-2:123456789012:targetgroup/blue-targets/73e2d6bc24d8a067
                                              percentage: 0.4
                                    targetGroupConfig:
                                      title: ITF Target Group Configuration
                                      type: object
