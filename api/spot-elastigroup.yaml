                        batchSizePercentage: 20
                        comment: This is why I deployed my cluster.
                        batchMinHealthyPercentage: 100
      responses:
        '200': &ref_210
          description: Elastigroup Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_63
