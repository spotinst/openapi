    get:
      summary: List All Elastigroups
      description: |
        List all AWS Elastigroups for a Spot Account
      operationId: elastigroupAwsListAll
      tags:
        - Elastigroup AWS
      parameters:
        - *ref_14
      responses:
        '200':
          description: List All Groups Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          id:
                            type: string
                            example: 67582d0c-108b-4ef7-9fdc-d39678a30844
                            description: |
                              Unique ID associated with this request
                          url:
                            type: string
                            example: /aws/ec2/group
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: GET
                            description: |
                              The HTTP **METHOD** used for the request
                          timestamp:
                            type: string
                            example: '2018-01-07T07:30:58.622Z'
                            description: |
                              When the request was received by Spot
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
