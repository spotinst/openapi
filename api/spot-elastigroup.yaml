                                  example: 1234
                                  description: |
                                    Docker swarm master port number
                                autoScale:
                                  type: object
                                  description: |
                                    autoScale configuration
                                  properties:
                                    isEnabled:
                                      type: boolean
                                      example: 'true'
                                      description: |
                                        Specifies whether the scaling policy described in this block is enabled.
                                      default: true
                                    cooldown:
                                      type: integer
                                      example: 300
                                      description: |
                                        The amount of time, in seconds, after a scaling activity completes before any further trigger-related scaling activities can start.
                                    down:
                                      type: object
                                      properties:
                                        evaluationPeriods:
                                          type: integer
                                          example: 4
                                          description: |
                                            The number of periods over which data is compared to the specified threshold.
                                        maxScaleDownPercentage:
                                          type: integer
                                          example: 20
                                          description: |
                                            Would represent the maximum % to scale-down.
                                          minimum: 1
                                          maximum: 100
                                    headroom:
                                      type: object
                                      description: |
                                        Set custom headroom per Virtual Node Group. provide list of launchSpec.autoScale.headrooms object
                                      properties:
                                        cpuPerUnit:
                                          type: integer
                                          description: |
                                            configure the number of CPUs to allocate the headroom. CPUs are denoted in millicores, where 1000 millicores = 1 vCPU
                                          example: 1000
                                        memoryPerUnit:
                                          type: integer
                                          description: |
                                            Configure the amount of memory (MiB) to allocate the headroom.
                                          example: 2048
                                        numOfUnits:
                                          type: integer
                                          description: |
                                            The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                          example: 3
                                    tlsConfig:
                                      type: object
                                      properties:
                                        tlsEnabled:
                                          type: boolean
                                          example: true
                                        privateKey:
                                          type: string
                                          example: PRIVATE KEY CERTIFICATE STR
                                        certificate:
                                          type: string
                                          example: PUBLIC KEY CERTIFICATE STR
                            jenkins: &ref_12
                              title: Jenkins ThirdPartiesIntegration Object
                              type: object
                              description: |
                                Jenkins integration object.
                              properties:
                                connectionMethod:
                                  type: object
                                  description: |
                                    Connection method configuration, define how Jenkins orchestrator and elastigroup with Jenkins integration will connect and communicate
                                  properties:
                                    jnlp:
                                      type: object
                                      properties:
                                        masterIP:
                                          type: string
                                          example: 210.4.5.1
                                          description: |
                                            Jenkins orchestrator ip adress
                                        masterPort:
                                          type: string
                                          example: '8080'
                                          description: |
                                            Jenkins orchestrator listening port (usually 8080)
                                        password:
                                          type: string
                                          example: foo
                                          description: |
                                            Jenkins orchestrator password, when set, `userName` is required
                                        userName:
                                          type: string
                                          example: foo
                                          description: |
                                            Jenkins orchestrator userName, when set, `password` is required
                                        token:
                                          type: string
                                          example: '1234'
                                          description: |
                                            Jenkins orchestrator authentication token. Set both `token` and `password` is not allowed
                                    ssh:
                                      type: object
                                      properties:
                                        sshPublicKey:
                                          type: string
                                          example: ssh-rsa AAAAB3NzaC1y...
                                          description: |
                                            public key for SSH connection
                                    manuallyConnection:
                                      type: boolean
                                      example: 'true'
                                      description: |
                                        When set to `true`, startup-script for elsatigroup with jenkins integration need to be define manually by the user in `compute.launchSpecification.userData`
                        logging: &ref_13
                          type: object
                          title: Logging configuration
                          properties:
                            export:
                              type: object
                              title: Logging Export Configuration.
                              properties:
                                s3:
                                  type: object
                                  title: Logging S3 Export configuration.
                                  description: |
                                    Exports Elastigroup logs to the S3 bucket and subdir configured on the S3 [data integration](/#operation/DataIntegrationCreate) given.
                                    Each file contains logs of 3 minutes where each log is separated by a new line and saved as a JSON.
                                    The file formats are `subdir/accountId_groupId_groupName_startTime.log`.
                                    If no subdir was configured, the files will be saved in the root of the bucket.
                                  required:
                                    - id
                                  properties:
                                    id:
                                      type: string
                                      description: The identifier of The S3 data integration to export the logs to.
                                      example: di-123
      responses:
        '200': &ref_16
          description: Elastigroup Response
          content:
            application/json:
              schema:
                allOf:
                  - &ref_18
                    type: object
                    allOf:
                      - &ref_20
                        type: object
                        properties:
                          request:
                            type: object
                            description: |
                              Original request properties.
                            properties:
                              id:
                                type: string
                                example: e593ff58-067d-4340-92f9-8b1c0bad70d7
                                description: |
                                  Unique identifier associated with this request.
                              url:
                                type: string
                                description: |
                                  The URL that was used for the request.
                              method:
                                type: string
                                description: |
                                  The HTTP **METHOD** used for the request.
                              timestamp:
                                type: string
                                example: '2018-06-20T11:35:01.745Z'
                                description: |
                                  When the request was received by Spot.
                          response:
                            type: object
                            description: |
                              Response package that includes status, type, and any relevant data.
                            properties:
                              status:
                                type: object
                                properties:
                                  code:
                                    type: integer
                                    example: 200
                                    description: |
                                      HTTP status code assigned to this response.
                                  message:
                                    type: string
                                    example: OK
                                    description: |
                                      HTTP status message for the respective status code.
                      - type: object
                        properties:
                          response:
                            type: object
                            properties:
                              count:
                                type: integer
                                example: 1
                                description: |
                                  Size of the data object array.
                              kind:
                                type: string
                                description: |
                                  The data type of each item in the response.
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:aws:ec2:group
                          items:
                            type: array
                            items: &ref_15
                              type: object
                              title: AWS Elastigroup
                              required:
                                - group
                              properties:
                                group:
                                  type: object
                                  description: Group
                                  required:
                                    - name
                                  properties:
                                    name:
                                      type: string
                                      description: |
                                        AWS Elastigroup Name
                                      example: my-Elastigroup
                                    description:
                                      type: string
                                      description: |
                                        Describe your AWS Elastigroup
                                      example: This Elastigroup is used for Development
                                    region:
                                      type: string
                                      description: |
                                        The AWS region your group will be created in.
                                         This parameter is required if you specify subnets (through compute.subnetIds).
                                         This parameter is optional if you specify Availability Zones (through compute.availabilityZones).
                                      example: us-east-1
                                    capacity:
                                      type: object
                                      title: Elastigroup Capacity
                                      properties:
                                        target:
                                          type: integer
                                          description: |
                                            The number of instances to launch
                                          example: 1
                                        minimum:
                                          type: integer
                                          description: |
                                            The lower limit number of instances that you can scale down to
                                          example: 0
                                        maximum:
                                          type: integer
                                          description: |
                                            The upper limit number of instances that you can scale up to
                                          example: 10
                                        unit:
                                          type: string
                                          enum:
                                            - instance
                                            - weight
                                          readOnly: true
                                          description: |
                                            The capacity unit to launch instances by.
                                            Note: for groups with integration to K8S / ECS weight option is not supported.
                                          example: instance
                                    strategy:
                                      type: object
                                      title: Elastigroup Strategy
                                      properties:
                                        risk:
                                          type: integer
                                          minimum: 0
                                          maximum: 100
                                          example: 100
                                          default: 0
                                          description: |
                                            The percentage of Elastigroup that will run with spot market capacity
                                        onDemandCount:
                                          type: integer
                                          minimum: 0
                                          example: 0
                                          description: |
                                            Minimum number of instances that will always be on-demand
                                        availabilityVsCost:
                                          type: string
                                          enum:
                                            - costOriented
                                            - availabilityOriented
                                            - balanced
                                            - cheapest
                                            - equalAzDistribution
                                          default: balanced
                                          description: |
                                            How Elastigroup determines which instances to add and replace.
                                            (please read this article before using [Equal AZ Instance Distribution](https://docs.flexera.com/spot/elastigroup-for-aws/concepts/general-concepts/equal-az-distribution))
                                        fallbackToOd:
                                          type: boolean
                                          default: true
                                          example: true
                                          description: |
                                            When set to `true` Elastigroup will launch On Demand instances if no spot market is available
                                        considerODPricing:
                                          type: boolean
                                          default: false
                                          example: false
                                          description: |
                                            When the value is set to `true`, Elastigroup will prioritize launching On-Demand instances if they are found to be more cost-effective than available Spot markets.
                                        utilizeReservedInstances:
                                          type: boolean
                                          description: |
                                            In case of any available Reserved Instances, Elastigroup will utilize them before purchasing Spot instances
                                          example: false
                                        utilizeCommitments:
                                          type: boolean
                                          description: |
                                            If there are available Reserved Instances or Savings Plans, Elastigroup will utilize them before using Spot instances
                                          example: false
                                        restrictSingleAz:
                                          type: boolean
                                          description: |
                                            Elastigroup will automatically scale your instances in the most available and cost efficient availability zone. Every evaluation will be done when there are no active instances in the group.
                                        drainingTimeout:
                                          type: integer
                                          example: 120
                                          description: |
                                            The time in seconds to allow the instance be drained from incoming TCP connections and detached from ELB before terminating it, during a scale down operation
                                        maxReplacementsPercentage:
                                          type: integer
                                          minimum: 0
                                          maximum: 100
                                          example: 15
                                          description: |
                                            The percentage of active instances that can be replaced in parallel
                                        signals:
                                          type: array
                                          description: |
                                            The signals defined for this group. For more information refer the below article: [Signals](https://docs.flexera.com/spot/elastigroup-for-aws/concepts/compute-concepts/using-signals-in-elastigroups)
                                          items:
                                            type: object
                                            properties:
                                              name:
                                                type: string
                                                description: |
                                                  The name of the signal defined for the group.
                                                enum:
                                                  - INSTANCE_READY
                                                  - INSTANCE_READY_TO_SHUTDOWN
                                              timeout:
                                                type: integer
                                                minimum: 60
                                                maximum: 1800
                                                description: |
                                                  The timeout in seconds to hold the instance until a signal is sent.
                                                  If no signal is sent the instance will be replaced (INSTANCE_READY) or we will terminate the instance (INSTANCE_READY_TO_SHUTDOWN) after the timeout.
                                                default: 1800
                                                example: 120
                                        persistence:
                                          type: array
                                          description: |
                                            You can register persistence (Stateful) recovery arguments
                                          items:
                                            type: object
                                            properties:
                                              shouldPersistPrivateIp:
                                                type: boolean
                                                description: |
                                                  Should the instance maintain its private IP
                                                example: true
                                              shouldPersistRootDevice:
                                                type: boolean
                                                description: |
                                                  Should the instance maintain its root device volumes
                                                example: true
                                              shouldPersistBlockDevices:
                                                type: boolean
                                                description: |
                                                  Should the instance maintain its Data volumes
                                                example: true
                                              blockDevicesMode:
                                                type: string
                                                description: |
                                                  Determine the way we attach the data volumes to the data devices
                                                enum:
                                                  - reattach
                                                  - onLaunch
                                                example: reattach
                                        revertToSpot:
                                          type: object
                                          description: |
                                            Hold settings for strategy correction - replacing On-Demand for Spot instances
                                          properties:
                                            performAt:
                                              type: string
                                              description: |
                                                Settings for maintenance strategy - possible values: timeWindow, never, always.
                                                performAt of type: 'never' OR 'timeWindow' can only be applied to groups with "availabilityOriented" OR groups with "persistence",
                                                other groups allow either 'always' type or nothing which also means always.
                                              enum:
                                                - never
                                                - always
                                                - timeWindow
                                              example: timeWindow
                                              default: always
                                            timeWindows:
                                              type: array
                                              description: |
                                                When performAt is 'timeWindow': must specify a list of 'timeWindows' with at least one time window Each string is in the format of - ddd:hh:mm-ddd:hh:mm
                                                ddd = day of week = Sun | Mon | Tue | Wed | Thu | Fri | Sat
                                                hh = hour 24 = 0 -23
                                                mm = minute = 0 - 59
                                              items:
                                                type: string
                                                example: Mon:03:00-Wed:02:30
                                        scalingStrategy:
                                          type: object
                                          description: |
                                            Set termination policy
                                          properties:
                                            terminationPolicy:
                                              type: string
                                              enum:
                                                - default
                                                - newestInstance
                                              example: default
                                    compute:
                                      type: object
                                      title: Elastigroup Compute
                                      properties:
                                        product:
                                          type: string
                                          description: |
                                            Operation system type.
                                          enum:
                                            - Linux/UNIX (Amazon VPC)
                                            - SUSE Linux (Amazon VPC)
                                            - Windows (Amazon VPC)
                                            - Red Hat Enterprise Linux (Amazon VPC)
                                          readOnly: true
                                          example: Linux/UNIX
                                        elasticIps:
                                          type: array
                                          description: |
                                            List of ElasticIPs Allocation Ids to associate to the group instances
                                          items:
                                            type: string
                                            example: eipalloc-9d4e16f8
                                        privateIps:
                                          type: array
                                          description: |
                                            List of Private IPs to associate to the group instances.
                                            Please note: This setting will only apply if strategy.persistence.shouldPersistPrivateIp is set to true.
                                          items:
                                            type: string
                                            default: 172.1.1.1
                                        instanceTypes:
                                          type: object
                                          description: |
                                            Instance Types
                                          properties:
                                            ondemand:
                                              type: string
                                              description: |
                                                Available on demand instance type.
                                                Note: Either ondemand or onDemandTypes can be defined, but not both.
                                              example: m3.medium
                                            onDemandTypes:
                                              type: array
                                              description: |
                                                Available on demand instance types.
                                                Note: Either ondemand or onDemandTypes can be defined, but not both.
                                              items:
                                                type: string
                                                example:
                                                  - c3.large
                                                  - c4.large
                                                  - m3.large
                                                  - r3.large
                                            spot:
                                              type: array
                                              description: |
                                                Available Spot Instance types.  
                                                Note: Cannot be defined if 'resourceRequirements' is defined.
                                              items:
                                                type: string
                                                example:
                                                  - c3.large
                                                  - c4.large
                                                  - m3.large
                                                  - r3.large
                                            resourceRequirements: *ref_1
                                            preferredSpot:
                                              type: array
                                              description: |
                                                Prioritized subset of spot instance types. The list must be a subset of the selected spot instance types or 
                                                meet the resource requirements if defined.
                                              items:
                                                type: string
                                                example:
                                                  - c4.large
                                            weights:
                                              type: array
                                              description: |
                                                Custom weight for each instance type (only valid in weight capacity unit)
                                              items:
                                                type: object
                                                properties:
                                                  instanceType:
                                                    type: string
                                                    description: |
                                                      The instance type to customize its weight
                                                    example: c4.large
                                                  weightedCapacity:
                                                    type: integer
                                                    description: |
                                                      The weight
                                                    example: 8
                                        subnetIds:
                                          type: array
                                          description: |
                                            A comma-separated list of subnet identifiers for your group.
                                            When this parameter is set, compute.availabilityZones should be left unused.
                                          items:
                                            type: string
                                            example:
                                              - subnet-4c1d1538
                                              - subnet-2791bb61
                                              - subnet-703a6f58
                                              - subnet-c62846fc
                                        availabilityZones:
                                          type: array
                                          description: |
                                            One or more availability Zones for the group.
                                            When this parameter is set, compute.subnetIds should be left unused.
                                          items:
                                            type: object
                                            properties:
                                              name:
                                                type: string
                                                description: |
                                                  The Availability Zone name
                                                example: us-west-2a
                                              subnetIds:
                                                type: array
                                                description: |
                                                  A comma-separated list of subnet identifiers for your group.
                                                items:
                                                  type: string
                                                  example:
                                                    - subnet-4333093a
                                              placementGroupName:
                                                type: string
                                                description: |
                                                  specify a Placement Group name, the instances will be launched in the Placement Group for the AZ.
                                        preferredAvailabilityZones:
                                          type: array
                                          description: |
                                            The AZs to prioritize when launching Spot instances.
                                            If no markets are available in the Preferred AZs, Spot instances are launched in the non-preferred AZs.
                                            * Must be a sublist of compute.AvailabilityZones
                                            * strategy.availabilityVsCost must not be equalAzDistribution
                                          items:
                                            type: string
                                            example:
                                              - us-east-1a
                                              - us-east-1b
                                        volumeAttachments: *ref_2
                                        launchSpecification:
                                          type: object
                                          properties:
                                            creditSpecification:
                                              type: object
                                              description: |
                                                creditSpecification is a parameter that indicates in what mode t2/t3 instances will be launched with. It consists of one key: cpuCredits (String)
                                              properties:
                                                cpuCredits:
                                                  type: string
                                                  enum:
                                                    - unlimited
                                                    - standard
                                                  example: unlimited
                                            loadBalancersConfig:
                                              type: object
                                              description: |
                                                Elastic Load Balancers configurations
                                              properties:
                                                loadBalancers:
                                                  type: array
                                                  description: |
                                                    List of classic load balancers and/or application load balancer target groups
                                                  items:
                                                    type: object
                                                    properties:
                                                      name:
                                                        type: string
                                                        description: |
                                                          The AWS resource name. Required for Classic Load Balancer. Optional for Application Load Balancer.
                                                        example: MyTargetGroup
                                                      arn:
                                                        type: string
                                                        description: |
                                                          The AWS resource ARN (Required only for ALB target groups)
                                                        example: arn:aws:elasticloadbalancing:us-west-2:922761411234:targetgroup/MyTargetGroup/1fe63217f8ff1234
                                                      type:
                                                        type: string
                                                        description: |
                                                          The resource type.
                                                        enum:
                                                          - CLASSIC
                                                          - TARGET_GROUP
                                                        example: TARGET_GROUP
                                            itf:
                                              title: Intelligent Traffic Flow (ITF) Configuration
                                              type: object
                                              description: |
                                                Contains the configuration details of Intelligent Traffic Flow (ITF).
                                              properties:
                                                fixedTargetGroups:
                                                  type: boolean
                                                  description: |
                                                    Boolean to control whether to keep the set of target groups fixed. When set to true, all target groups will be created in advance upon create/update group, and will not be deleted even when not being used anymore.
                                                  default: false
                                                  example: false
