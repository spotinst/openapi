                                          example: OpenLogic
                                        offer:
                                          type: string
                                          description: |
                                            Name of image to use.
                                          example: CentOS
                                        sku:
                                          type: string
                                          description: |
                                            Image's Stock Keeping Unit, which is the specific version of the image.
                                          example: '7.3'
                                        version:
                                          type: string
                                          description: |
                                            Image's version. if version not provided we use "latest"
                                          default: lastest
                                          example: 7.3-1611
                                      example:
                                        publisher: OpenLogic
                                        offer: CentOS
                                        sku: '7.3'
                                        version: 7.3-1611
                                    custom:
                                      type: object
                                      description: |
                                        Custom image to launch Stateful Node with.
                                      required:
                                        - resourceGroupName
                                        - name
                                      properties:
                                        resourceGroupName:
                                          type: string
                                          description: |
                                            Name of Resource Group for custom image.
                                          example: spotinst-azure
                                        name:
                                          type: string
                                          description: |
                                            Name of the custom image.
                                          example: custom-image-name
                                      example:
                                        resourceGroupName: spotinst-azure
                                        name: custom-image-name
                                    gallery:
                                      title: Gallery
