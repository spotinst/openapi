                                      type: string
                                      description: |
                                        user name for admin access to VMs.\
                                        Login can be set:
                                        * for windows: compute.launchSpecification.login.password
                                        * for linux: compute.launchSpecification.login.sshPublicKey

                                        Just user name, without pwd or SSH key
                                      example: spotinst
                                    sshPublicKey:
                                      type: string
                                      description: |
                                        SSH for admin access to Linux VMs.\
                                        Optional for Linux.
                                      example: ssh-rsa
                                    password:
                                      type: string
                                      writeOnly: true
                                      description: |
                                        Password for admin access to Windows VMs.\
                                        Required for Windows.
                                  example:
                                    userName: spotinst
                                    sshPublicKey: ssh-rsa
                                loadBalancersConfig:
                                  type: object
                                  description: |
                                    Configure a Load Balancer.
                                  properties:
                                    loadBalancers:
                                      type: array
                                      description: |
                                        Add a load balancer. For Azure Gateway, each Backend Pool is a separate load balancer.
                                      items:
                                        type: object
                                        required:
                                          - type
                                          - resourceGroupName
                                          - name
                                          - backendPoolNames
                                        properties:
                                          type:
                                            type: string
                                            description: |
                                              The type of load balancer.
                                            enum:
                                              - loadBalancer
                                              - applicationGateway
                                            example: loadBalancer
                                          resourceGroupName:
                                            type: string
                                            description: |
                                              The Resource Group name of the Load Balancer.
                                            example: testResourceGroup
                                          name:
                                            type: string
                                            description: |
                                              Name of the Application Gateway/Load Balancer
                                            example: testLoadBalancer
                                          loadBalancerSku:
                                            type: string
                                            description: |
                                              * if type is LoadBalancer then possible values are:
                                               * “Standard"
                                               * Basic”
                                              * if ApplicationGateway then possible values are:
                                               * “Standard_Large”
                                               * “Standard_Medium”
                                               * “Standard_Small”
                                               * “Standard_v2
                                               * “WAF_Large”
                                               * “WAF_Medium"
                                               * “WAF_v2"
                                            example: Standard
                                          backendPoolNames:
                                            type: array
                                            items:
                                              type: string
                                            description: |
                                              Name of the Backend Pool to register the Stateful Node VMs to.\
                                              Each Backend Pool is a separate load balancer.\
                                              Required if Type is APPLICATION_GATEWAY.
                                            example: &ref_174
                                              - testBackendPool1
                                              - testBackendPool2
                                        example:
                                          type: loadBalancer
                                          resourceGroupName: testResourceGroup
                                          name: testLoadBalancer
                                          loadBalancerSku: Standard
                                          backendPoolNames: *ref_174
                                  example:
                                    loadBalancers:
                                      - type: loadBalancer
                                        resourceGroupName: testResourceGroup
                                        name: testLoadBalancer
                                        loadBalancerSku: Standard
                                        backendPoolNames: *ref_174
