                                    - FAILED
                                    - STOPPED
                                currentBatch:
                                  type: integer
                                  example: 1
                                numOfBatches:
                                  type: integer
                                  example: 5
                                comment:
                                  type: string
                                  example: This is why I deployed my cluster.
                                batchMinHealthyPercentage:
                                  type: integer
                                  example: 100
                                progress:
                                  type: object
                                  properties:
                                    unit:
