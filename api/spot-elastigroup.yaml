                                extensions:
                                  type: array
                                  description: |
                                    List of objects for azure extensions
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - type
                                      - publisher
                                      - apiVersion
                                      - minorVersionAutoUpgrade
                                    properties:
