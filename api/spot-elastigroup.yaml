                            down:
                              type: object
                              title: Scale Down Policies
                              description: Provide the ability to scale down to maximize cost efficiency.
                              required:
                                - policyName
                                - metricName
                                - statistic
                                - threshold
                                - period
                                - evaluationPeriods
                                - isEnabled
                                - cooldown
                                - action
                                - operator
                                - namespace
                              properties:
                                isEnabled:
                                  type: boolean
                                  example: 'true'
                                  description: |
                                    Specifies whether the scaling policy is enabled.
                                  default: true
                                source:
                                  type: string
                                  description: |
                                    The metric source.
                                  example: azureMonitor
                                  enum:
                                    - azureMonitor
                                    - spotMetrics
                                policyName:
                                  title: Policy Name
                                  description: Name of scaling policy
                                  type: string
                                  example: cpuScale
                                metricName:
                                  title: Metric Name
                                  description: Metric to monitor by Azure metric display name
                                  type: string
                                  example: Percentage CPU
                                statistic:
                                  title: Statistics
                                  description: Statistic by which to evaluate the selected metric.
                                  type: string
                                  example: average
                                  enum:
                                    - average
                                    - sampleCount
                                    - sum
                                    - minimum
                                    - maximum
                                unit:
                                  title: Unit
                                  description: |-
                                    Unit to measure to evaluate the selected metric:  Valid Values:
                                    + Count
                                    + Bytes
                                    + Percent<
                                    + CountPerSecond
                                    + Milliseconds
                                    + BytesPerSecond
                                    + Seconds
                                  type: string
                                  example: Count
                                threshold:
                                  title: Threshold
                                  description: The value at which the scaling action is triggered.
                                  type: number
                                  format: float
                                  example: 0.75
                                period:
                                  title: Period
                                  description: Amount of time (seconds) for which the threshold must be met in order to trigger the scaling action.
                                  type: integer
                                  example: 60
                                evaluationPeriods:
                                  title: Evaluation Periods
                                  description: Number of consecutive periods in which the threshold must be met in order to trigger the scaling action.
                                  type: integer
                                  example: 3
                                cooldown:
                                  title: Cooldown
                                  description: Time (seconds) to wait after a scaling action before resuming monitoring.
                                  type: integer
                                  example: 300
                                namespace:
                                  title: Namespace
                                  description: Select one of the next namespaces presented in Azure configurator - https://docs.microsoft.com/en-us/azure/templates/
                                  type: string
                                  example: Microsoft.Network/applicationGateways
                                operator:
                                  title: Operator
                                  description: |-
                                    The operator used to evaluate the threshold against the current metric value.
                                    + gt (Greater Than)
                                    + gte (Greater Than or Equal)
                                    + lt (Less Than)
                                    + lte (Less Than or Equal) 
                                  type: string
                                  default: lte
                                  example: gte
                                  enum:
                                    - gt
                                    - gte
                                    - lt
                                    - lte
                                action:
                                  type: object
                                  description: |
                                    The action to take when scale down is needed.
                                  oneOf:
                                    - type: object
                                      title: updateCapacity
                                      properties:
                                        type:
                                          type: string
                                          description: |
                                            Type of scaling action to take when the scaling policy is triggered.
                                          example: updateCapacity
                                          enum:
                                            - adjustment
                                            - updateCapacity
                                        target:
                                          type: integer
                                          title: Target
                                          description: |
                                            The desired amount of instances. Must be defined along with the ‘minimum’ and ‘maximum’ amounts.
                                            Required if selection as action type is:
                                             + updateCapacity
                                          example: 1
                                        minimum:
                                          type: integer
                                          title: Minimum
                                          description: |
                                            The lower limit of instances that you can scale down to. Must be defined along with the ‘maximum’ and ‘target’ amounts.
                                            Required if selection as action type is:
                                            + updateCapacity
                                          example: 1
                                        maximum:
                                          type: integer
                                          title: Maximum
                                          description: |
                                            The upper limit of instances that you can scale down to. Must be defined along with the ‘minimum’ and ‘target’ amounts.
                                            Required if selection as action type is:
                                            + updateCapacity
                                          example: 1
                                    - type: object
                                      title: adjustment
                                      properties:
                                        type:
                                          type: string
                                          description: |
                                            Type of scaling action to take when the scaling policy is triggered.
                                          example: adjustment
                                          enum:
                                            - adjustment
                                            - updateCapacity
                                        adjustment:
                                          title: Adjustment
                                          description: |
                                            Value to which the action type will be adjusted. Required if using the next action types:
                                            + adjustment
                                          type: string
                                          example: '2'
                                dimensions:
                                  type: array
                                  description: |
                                    Required if scaling.up.namespace is different from "Microsoft.Compute".\
                                    2 dimensions are required.
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                        description: |
                                          Azure resource group for the scaling.down.dimensions. Required if using namespace different from "Microsoft.Compute".
                                        example: resourceName
                                      value:
                                        type: string
                                        description: |
                                          Azure resource for the scaling.down.dimensions. Required if using namespace different from "Microsoft.Compute".
                                        example: testApplicationGateway
                                    example:
                                      name: resourceName
                                      value: testApplicationGateway
                                  example: &ref_149
                                    - name: resourceName
                                      value: testApplicationGateway
                                    - name: resourceGroupName
                                      value: testResourceGroup
                              example:
                                isEnabled: 'true'
                                source: azureMonitor
                                policyName: cpuScale
                                metricName: Percentage CPU
                                statistic: average
                                unit: Count
                                threshold: 0.75
                                period: 60
                                evaluationPeriods: 3
                                cooldown: 300
                                namespace: Microsoft.Network/applicationGateways
                                operator: gte
                                dimensions: *ref_149
                          example:
                            up:
                              isEnabled: 'true'
                              source: azureMonitor
                              policyName: cpuScale
                              metricName: Percentage CPU
                              statistic: average
                              unit: Count
                              threshold: 0.75
                              period: 60
                              evaluationPeriods: 3
                              cooldown: 300
                              namespace: Microsoft.Network/applicationGateways
                              operator: gte
                              dimensions: *ref_148
                            down:
                              isEnabled: 'true'
                              source: azureMonitor
                              policyName: cpuScale
                              metricName: Percentage CPU
                              statistic: average
                              unit: Count
                              threshold: 0.75
                              period: 60
                              evaluationPeriods: 3
                              cooldown: 300
                              namespace: Microsoft.Network/applicationGateways
                              operator: gte
                              dimensions: *ref_149
                        strategy:
                          type: object
                          title: Scaling Strategy
                          properties:
                            shouldUtilizeCommitments:
                              type: boolean
                              description: |
                                Determines whether to utilize any existing Azure Savings Plans or Reserved Instances associated with the subscription for On-Demand VMs.
                              example: true
                              default: false
                            spotPercentage:
                              title: Spot Percentage
                              description: Percentage of Spot-VMs to maintain.  <a style=color:red>Required if odCount isn't specified.</a>
                              type: integer
                              default: 100
                              example: 100
                            onDemandCount:
                              title: On Demand Count
                              type: integer
                              description: Number of On-Demand VMs to maintain.  <a style=color:red>Required if spotPercentage isn't specified.</a>
                              example: 3
                            drainingTimeout:
                              title: Draining Timeout
                              type: integer
                              description: Time (seconds) to allow the VM be drained from incoming TCP connections and detached from MLB before terminating it during a scale down operation.
                              default: 120
                            revertToSpot:
                              title: Revert To Spot
                              type: object
                              description: Hold settings for strategy correction - replacing On-Demand for Spot VMs
                              properties:
                                performAt:
                                  title: Perform At
                                  type: string
                                  description: |-
                                    Settings for maintenance strategy - possible values:
                                    + timeWindow
                                    + never
                                    + always
                                  default: always
                            optimizationWindows:
                              title: Optimization Windows
                              description: |-
                                Valid format:
                                + ddd:hh:mm-ddd:hh:mm (day:hour(0-23):minute(0-59))
                                + not empty if revertToSpot.performAt = timeWindow
                              type: array
                              items:
                                type: string
                            signals:
                              title: Signals
                              description: The signals defined for this group.
                              type: array
                              items:
                                type: object
                                properties:
                                  timeout:
                                    title: Timeout
                                    description: The timeout in seconds to hold the vm until a signal is sent. If no signal is sent the vm will be replaced (vmReady) or we will terminate the vm (vmReadyToShutdown) after the timeout. (Maximum is 1800 seconds, Minimum is 60 seconds)
                                    default: 30
                                    type: integer
                                    example: 50
                                  type:
                                    title: Type
                                    description: 'The type of the signal defined for the group. Valid Values: vmReady, vmReadyToShutdown'
                                    type: string
                                    example: vmReady
                                example:
                                  timeout: 50
                                  type: vmReady
                            availabilityVsCost:
                              title: Elastigroup Availability VS Cost
                              description: |
                                Set the desired preference for the Spot market VM selection. (100-  Availability, 0- cost)
                              type: integer
                              example: 100
                            capacityReservation:
                              type: object
                              description: |
                                On-demand Capacity Reservation group enables you to reserve Compute capacity in an Azure region or an Availability Zone for any duration of time.
                                [CRG can only be created on the Azure end.](https://learn.microsoft.com/en-us/azure/virtual-machines/capacity-reservation-create)
                              required:
                                - shouldUtilize
                                - utilizationStrategy
                              properties:
                                shouldUtilize:
                                  type: boolean
                                  description: |
                                    Determines whether capacity reservations should be utilized.
                                  example: true
                                utilizationStrategy:
                                  type: string
                                  description: |
                                    The priority requested for using CRG. This value will determine if CRG is used ahead of spot VMs or On-demand VMs.
                                    * utilizeOverOD- If picked, we will use CRG only in case On-demand should be launched.
                                    * utilizeOverSpot- CRG will be preferred over Spot. Only after CRG is fully used, spot VMs can be used.
                                  enum:
                                    - utilizeOverSpot
                                    - utilizeOverOD
                                  example: utilizeOverSpot
                                capacityReservationGroups:
                                  type: array
                                  description: |
                                    List of the desired CRGs to use under the associated Azure subscription.
                                    When null we will utilize any available reservation that matches the Virtual Node Group.
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - resourceGroupName
                                    properties:
                                      name:
                                        type: string
                                        description: |
                                          The name of the CRG.
                                        example: capacityReservationGroupName
                                      resourceGroupName:
                                        type: string
                                        description: |
                                          Azure resource group name
                                        example: resourceGroupName
                                      shouldPrioritize:
                                        type: boolean
                                        description: |
                                          The desired CRG to utilize ahead of other CRGs in the subscription.
                                        example: true
                                    example:
                                      name: capacityReservationGroupName
                                      resourceGroupName: resourceGroupName
                                      shouldPrioritize: true
                              example:
                                shouldUtilize: true
                                utilizationStrategy: utilizeOverSpot
                                capacityReservationGroups:
                                  - name: capacityReservationGroupName
                                    resourceGroupName: resourceGroupName
                                    shouldPrioritize: true
                            fallbackToOd:
                              type: boolean
                              default: true
                              example: true
                              description: |
                                When set to `true` Elastigroup will launch On Demand instances if no spot market is available
                          example:
                            shouldUtilizeCommitments: true
                            spotPercentage: 100
                            onDemandCount: 3
                            signals:
                              - timeout: 50
                                type: vmReady
                            availabilityVsCost: 100
                            capacityReservation:
                              shouldUtilize: true
                              utilizationStrategy: utilizeOverSpot
                              capacityReservationGroups:
                                - name: capacityReservationGroupName
                                  resourceGroupName: resourceGroupName
                                  shouldPrioritize: true
                            fallbackToOd: true
