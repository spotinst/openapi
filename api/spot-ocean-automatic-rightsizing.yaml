                        - ALL_MANIFEST
                        - NO_RESTART
                      example: ALL_MANIFEST
                    excludePreliminaryRecommendations:
                      type: boolean
                      description: Exclude preliminary recommendations (recommendations based on less than 4 full days of data).
                      example: false
                    recommendationApplicationIntervals:
                      description: Determines the Ocean Rightsizing rule recommendation application intervals
                      type: array
                      example:
                        - repetitionBasis: WEEKLY
                          weeklyRepetitionBasis:
                            intervalDays:
                              - MONDAY
                              - WEDNESDAY
                            intervalHours:
                              startTime: '12:00'
                              endTime: '14:00'
                        - repetitionBasis: MONTHLY
                          monthlyRepetitionBasis:
                            intervalMonths:
                              - 2
                              - 4
                              - 6
                            weekOfTheMonth:
                              - FIRST
                              - LAST
                            weeklyRepetitionBasis:
                              intervalDays:
                                - MONDAY
                              intervalHours:
                                startTime: '03:00'
                                endTime: '04:00'
                      items: *ref_3
                    recommendationApplicationMinThreshold: *ref_4
                    recommendationApplicationBoundaries: *ref_5
                    recommendationApplicationOverheadValues: *ref_6
                    recommendationApplicationHPA: *ref_7
                    autoApplyDefinition: *ref_8
                    downsideOnly:
                      type: boolean
                      description: When set to 'true', only downscale recommendations will be applied.
                      default: false
      responses:
        '200':
          description: Ocean Rightsizing Rule Update Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_17
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /ocean/{oceanId}/rightSizing/rule/{ruleName]
                          method:
                            example: PUT
                        example:
                          url: /ocean/{oceanId}/rightSizing/rule/{ruleName]
                          method: PUT
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items: *ref_18
                          kind:
                            example: mcs:ocean:rightsizing:rule
                        example:
                          items:
                            - *ref_19
                          kind: mcs:ocean:rightsizing:rule
        '400':
          description: Bad Request
  /ocean/{oceanId}/rightSizing/rule/{ruleName}/attachment:
    post:
      summary: Attach Ocean Rightsizing Rule
      description: ''
      operationId: oceanRightsizingRuleMatchingAttachment
      tags:
        - Ocean Automatic Rightsizing
      parameters:
        - *ref_15
        - *ref_22
        - *ref_16
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - &ref_25
                  type: object
                  properties:
                    namespaces:
                      type: array
                      items:
                        type: object
                        properties:
                          namespaceName:
                            type: string
                            description: List of namespaces
                            example: kube-system
                          workloads:
                            type: array
                            description: List of workloads
                            items:
                              type: object
                              properties:
                                name:
                                  type: string
                                  description: The name of the workload
                                  example: kube-proxy
                                workloadType:
                                  type: string
                                  description: The type of the workload
                                  example: Deployment
                                regexName:
                                  type: string
                                  description: The regex for the workload name
                                  example: spotinst*
                              example:
                                name: kube-proxy
                                workloadType: Deployment
                                regexName: spotinst*
                            example: &ref_23
                              - name: kube-proxy
                                workloadType: DaemonSet
                              - regexName: spotinst*
                                workloadType: Deployment
                        example:
                          namespaceName: kube-system
                          workloads: *ref_23
      responses:
        '200':
          description: Ocean Rightsizing Rule Attachment Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_17
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /ocean/{oceanId}/rightSizing/rule/{ruleName}/attachment
                          method:
                            example: POST
                        example:
                          url: /ocean/{oceanId}/rightSizing/rule/{ruleName}/attachment
                          method: POST
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: mcs:ocean:rightsizing:ruleMatching
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                rulesMatchings:
                                  type: array
                                  example: &ref_24
                                    - oceanId: o-6ea3032a
                                      clusterIdentifier: dev-cluster
                                      namespace: kube-system
                                      resourceType: Deployment
                                      name: kube-proxy
                                      ruleName: dev-rule
                                      ruleMatching: workloadName:kube-proxy
                                    - oceanId: o-6ea3032a
                                      clusterIdentifier: dev-cluster
                                      namespace: kube-system
                                      resourceType: Deployment
                                      name: spotinst-controller
                                      ruleName: dev-rule
                                      ruleMatching: regexName:spotinst*
                                  items:
                                    description: Rightsizing rule matching of rule to workload
                                    type: object
                                    properties:
                                      oceanId:
                                        type: string
                                      clusterIdentifier:
