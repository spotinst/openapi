openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Ocean Automatic Rightsizing
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@spot.io
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags:
  - name: Ocean Automatic Rightsizing
    description: |
      New Automatic Rightsizing version available for EKS and AKS only.

      If you wish to learn more about it reach out to our support team.
paths:
  /ocean/{oceanId}/rightSizing/rule:
    post:
      summary: Create Ocean Rightsizing Rule
      description: ''
      operationId: oceanRightsizingRuleCreate
      tags:
        - Ocean Automatic Rightsizing
      parameters:
        - &ref_15
          in: path
          name: oceanId
          schema:
            type: string
          required: true
          example: o-abcd1234
          description: |
            Identifier of the Ocean cluster.
        - &ref_16
          in: query
          name: accountId
          example: act-123456789
          description: |
            The ID of the account associated with your token.
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: Ocean Rightsizing Rule
                  description: |
                    Determines the Ocean Rightsizing rule
                  required:
                    - recommendationApplicationIntervals
                  properties:
                    ruleName:
                      type: string
                      description: The unique name of the rule
                      example: dev-rule
                    restartReplicas:
                      type: string
                      description: Enable to sequentially restart pod batches according to recommendations, for all pods, only more than 1 replica, or not any pod.
                      enum:
                        - MORE_THAN_ONE_REPLICA
                        - ALL_MANIFEST
                        - NO_RESTART
                      example: ALL_MANIFEST
                    excludePreliminaryRecommendations:
                      type: boolean
                      description: Exclude preliminary recommendations (recommendations based on less than 4 full days of data).
                      example: false
                    recommendationApplicationIntervals:
                      description: Determines the Ocean Rightsizing rule recommendation application intervals
                      type: array
                      example:
                        - repetitionBasis: WEEKLY
                          weeklyRepetitionBasis:
                            intervalDays:
                              - MONDAY
                              - WEDNESDAY
                            intervalHours:
                              startTime: '12:00'
                              endTime: '14:00'
                        - repetitionBasis: MONTHLY
                          monthlyRepetitionBasis:
                            intervalMonths:
                              - 2
                              - 4
                              - 6
                            weekOfTheMonth:
                              - FIRST
                              - LAST
                            weeklyRepetitionBasis:
                              intervalDays:
                                - MONDAY
                              intervalHours:
                                startTime: '03:00'
                                endTime: '04:00'
                      items: &ref_3
                        type: object
                        title: Ocean Rightsizing Rule Recommendation Application Interval
                        description: |
                          Determines the Ocean Rightsizing rule recommendation application interval
                        properties:
                          repetitionBasis:
                            type: string
                            description: The repetition basis
                            enum:
                              - WEEKLY
                              - MONTHLY
                          monthlyRepetitionBasis:
                            type: object
                            title: Ocean Rightsizing Rule Monthly Repetition Basis
                            description: |
                              Determines the Ocean Rightsizing rule monthly repetition basis
                            properties:
                              intervalMonths:
                                type: array
                                description: |
                                  Array of the months (in number), when we want to trigger the apply recommendations.
                                items:
                                  type: integer
                                  example: 2
                              weekOfTheMonth:
                                type: string
                                description: |
                                  Array of the weeks in the month, when we want to trigger the apply recommendations.
                                enum:
                                  - FIRST
                                  - SECOND
                                  - THIRD
                                  - FOURTH
                                  - LAST
                              weeklyRepetitionBasis: &ref_0
                                type: object
                                title: Ocean Rightsizing Rule Weekly Repetition Basis
                                description: |
                                  Determines the Ocean Rightsizing rule weekly repetition basis
                                properties:
                                  intervalDays:
                                    type: array
                                    description: |
                                      Array of the days of the week, when we want to trigger the apply recommendations.
                                    items:
                                      type: string
                                      enum:
                                        - SUNDAY
                                        - MONDAY
                                        - TUESDAY
                                        - WEDNESDAY
                                        - THURSDAY
                                        - FRIDAY
                                        - SATURDAY
                                      example: MONDAY
                                  intervalHours:
                                    type: object
                                    properties:
                                      startTime:
                                        type: string
                                        example: '12:00'
                                      endTime:
                                        type: string
                                        example: '14:00'
                                    example:
                                      startTime: '12:00'
                                      endTime: '14:00'
                                example:
                                  intervalDays:
                                    - MONDAY
                                  intervalHours:
                                    startTime: '12:00'
                                    endTime: '14:00'
                            example:
                              intervalMonths:
                                - 2
                              weeklyRepetitionBasis:
                                intervalDays:
                                  - MONDAY
                                intervalHours:
                                  startTime: '12:00'
                                  endTime: '14:00'
                          weeklyRepetitionBasis: *ref_0
                        example:
                          monthlyRepetitionBasis:
                            intervalMonths:
                              - 2
                            weeklyRepetitionBasis:
                              intervalDays:
                                - MONDAY
                              intervalHours:
                                startTime: '12:00'
                                endTime: '14:00'
                          weeklyRepetitionBasis:
                            intervalDays:
                              - MONDAY
                            intervalHours:
                              startTime: '12:00'
                              endTime: '14:00'
                    recommendationApplicationMinThreshold: &ref_4
                      type: object
                      title: Ocean Rightsizing Rule Recommendation Application Min Threshold
                      description: |
                        Determines the extent of difference between current request and recommendation to trigger a change in percentage
                      properties:
                        cpuPercentage:
                          type: number
                          minimum: 0.05
                          maximum: 1
                          default: 0.05
                          example: 0.412
                        memoryPercentage:
                          type: number
                          minimum: 0.05
                          maximum: 1
                          default: 0.05
                          example: 0.36
                      example: &ref_10
                        cpuPercentage: 0.412
                        memoryPercentage: 0.36
                    recommendationApplicationBoundaries: &ref_5
                      type: object
                      title: Ocean Rightsizing Rule Recommendation Application Boundaries
                      description: |
                        Determines the Ocean Rightsizing rule recommendation application boundaries.
                      properties:
                        cpu:
                          type: object
                          properties:
                            min:
                              type: integer
                              description: the minimal value of cpu in vCpu
                              example: 0
                            max:
                              type: integer
                              description: the maximal value of cpu in vCpu
                              example: 100
                          example:
                            min: 0
                            max: 100
                        memory:
                          type: object
                          properties:
                            min:
                              type: integer
                              description: the minimal value of memory in Gib
                              minimum: 0
                              example: 1
                            max:
                              type: integer
                              description: the maximal value of memory in Gib
                              minimum: 0
                              example: 80
                          example:
                            min: 1
                            max: 80
                      example: &ref_11
                        cpu:
                          min: 0
                          max: 100
                        memory:
                          min: 1
                          max: 80
                    recommendationApplicationOverheadValues: &ref_6
                      type: object
                      title: Ocean Rightsizing Rule Recommendation Application Overhead Values
                      description: |
                        Determines the Ocean Rightsizing rule recommendation application overhead values
                      properties:
                        cpuPercentage:
                          type: number
                          minimum: 0.1
                          maximum: 1
                          default: 0.1
                          example: 0.8
                        memoryPercentage:
                          type: number
                          minimum: 0.1
                          maximum: 1
                          default: 0.1
                          example: 0.5
                      example: &ref_12
                        cpuPercentage: 0.8
                        memoryPercentage: 0.5
                    recommendationApplicationHPA: &ref_7
                      type: object
                      title: Ocean Rightsizing Rule Recommendation Application For HPA
                      description: HPA Rightsizing Rule Recommendation Configuration
                      properties:
                        allowHPARecommendations:
                          type: boolean
                          description: Determines by the rule if recommendation application is allowed for workloads with HPA definition.
                          example: true
                      example: &ref_13
                        allowHPARecommendations: true
                    autoApplyDefinition: &ref_8
                      type: object
                      title: Ocean Rightsizing Rule Auto Apply Definition
                      description: Ocean Rightsizing Rule Auto Apply Configuration
                      properties:
                        enabled:
                          type: boolean
                          description: Determines if auto apply is enabled.
                          example: true
                        namespaces:
                          type: array
                          description: A list of namespaces that match the auto-apply rule.
                          items:
                            type: string
                          example: &ref_1
                            - namespace1
                            - namespace2
                            - namespace3
                        labels:
                          type: object
                          description: |
                            A set of key-value label pairs used to automatically apply this rule to all workloads in the cluster that match these labels.
                          example: &ref_2
                            app: my-app
                            environment: production
                      example: &ref_14
                        enabled: true
                        namespaces: *ref_1
                        labels: *ref_2
                    downsideOnly:
                      type: boolean
                      description: When set to 'true', only downscale recommendations will be applied.
                      default: false
      responses:
        '200': &ref_21
          description: Ocean Rightsizing Rule Create Response
          content:
            application/json:
              schema:
                allOf:
                  - &ref_17
                    type: object
                    allOf:
                      - &ref_28
                        type: object
                        properties:
                          request:
                            type: object
                            description: |
                              Original request properties.
                            properties:
                              id:
                                type: string
                                example: e593ff58-067d-4340-92f9-8b1c0bad70d7
                                description: |
                                  Unique identifier associated with this request.
                              url:
                                type: string
                                description: |
                                  The URL that was used for the request.
                              method:
                                type: string
                                description: |
                                  The HTTP **METHOD** used for the request.
                              timestamp:
                                type: string
                                example: '2018-06-20T11:35:01.745Z'
                                description: |
                                  When the request was received by Spot.
                            example:
                              id: e593ff58-067d-4340-92f9-8b1c0bad70d7
                              timestamp: '2018-06-20T11:35:01.745Z'
                          response:
                            type: object
                            description: |
                              Response package that includes status, type, and any relevant data.
                            properties:
                              status:
                                type: object
                                properties:
                                  code:
                                    type: integer
                                    example: 200
                                    description: |
                                      HTTP status code assigned to this response.
                                  message:
                                    type: string
                                    example: OK
                                    description: |
                                      HTTP status message for the respective status code.
                                example:
                                  code: 200
                                  message: OK
                            example:
                              status:
                                code: 200
                                message: OK
                      - type: object
                        properties:
                          response:
                            type: object
                            properties:
                              kind:
                                type: string
                                description: |
                                  The data type of each item in the response.
                              items:
                                type: array
                                description: |
                                  Array of data objects.
                                items:
                                  type: object
                              count:
                                type: integer
                                example: 1
                                description: |
                                  Size of the data object array.
                            example:
                              count: 1
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /ocean/{oceanId}/rightSizing/rule
                          method:
                            example: POST
                        example:
                          url: /ocean/{oceanId}/rightSizing/rule
                          method: POST
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items: &ref_18
                              description: Rightsizing rule
                              type: object
                              properties:
                                oceanId:
                                  type: string
                                  example: o-482d9d26
                                clusterIdentifier:
                                  type: string
                                  example: dev-cluster
                                ruleName:
                                  type: string
                                  example: dev-rule
                                restartReplicas:
                                  type: string
                                  description: Enable to sequentially restart pod batches according to recommendations, for all pods, only more than 1 replica, or not any pod.
                                  enum:
                                    - MORE_THAN_ONE_REPLICA
                                    - ALL_MANIFEST
                                    - NO_RESTART
                                  example: ALL_MANIFEST
                                excludePreliminaryRecommendations:
                                  type: boolean
                                  description: Exclude preliminary recommendations (recommendations based on less than 4 full days of data).
                                  example: false
                                recommendationApplicationIntervals:
                                  type: array
                                  example: &ref_9
                                    - repetitionBasis: WEEKLY
                                      weeklyRepetitionBasis:
                                        intervalDays:
                                          - MONDAY
                                          - WEDNESDAY
                                        intervalHours:
                                          startTime: '12:00'
                                          endTime: '14:00'
                                    - repetitionBasis: MONTHLY
                                      monthlyRepetitionBasis:
                                        intervalMonths:
                                          - 2
                                          - 4
                                          - 6
                                        weekOfTheMonth:
                                          - FIRST
                                          - LAST
                                        weeklyRepetitionBasis:
                                          intervalDays:
                                            - MONDAY
                                          intervalHours:
                                            startTime: '03:00'
                                            endTime: '04:00'
                                  items: *ref_3
                                recommendationApplicationMinThreshold: *ref_4
                                recommendationApplicationBoundaries: *ref_5
                                recommendationApplicationOverheadValues: *ref_6
                                recommendationApplicationHPA: *ref_7
                                autoApplyDefinition: *ref_8
                                downsideOnly:
                                  type: boolean
                                  description: When set to 'true', only downscale recommendations will be applied.
                                  example: false
                              example: &ref_19
                                oceanId: o-482d9d26
                                clusterIdentifier: dev-cluster
                                ruleName: dev-rule
                                restartReplicas: ALL_MANIFEST
                                excludePreliminaryRecommendations: false
                                recommendationApplicationIntervals: *ref_9
                                recommendationApplicationMinThreshold: *ref_10
                                recommendationApplicationBoundaries: *ref_11
                                recommendationApplicationOverheadValues: *ref_12
                                recommendationApplicationHPA: *ref_13
                                autoApplyDefinition: *ref_14
                                downsideOnly: false
                          kind:
                            example: mcs:ocean:rightsizing:rule
                        example:
                          items:
                            - oceanId: o-482d9d26
                              clusterIdentifier: dev-cluster
                              ruleName: dev-rule
                              restartReplicas: ALL_MANIFEST
                              excludePreliminaryRecommendations: false
                              recommendationApplicationIntervals: *ref_9
                              recommendationApplicationMinThreshold: *ref_10
                              recommendationApplicationBoundaries: *ref_11
                              recommendationApplicationOverheadValues: *ref_12
                              recommendationApplicationHPA: *ref_13
                              autoApplyDefinition: *ref_14
                              downsideOnly: false
                          kind: mcs:ocean:rightsizing:rule
        '400':
          description: Bad Request
    get:
      summary: List Ocean Rightsizing Rules
      description: ''
      operationId: oceanRightsizingRulesList
      tags:
        - Ocean Automatic Rightsizing
      parameters:
        - *ref_15
        - *ref_16
      responses:
        '200':
          description: Ocean Rightsizing Rules Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_17
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /ocean/{oceanId}/rightSizing/rule
                          method:
                            example: GET
                        example:
                          url: /ocean/{oceanId}/rightSizing/rule
                          method: GET
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items: *ref_18
                          kind:
                            example: mcs:ocean:rightsizing:rule
                        example:
                          items:
                            - *ref_19
                          kind: mcs:ocean:rightsizing:rule
        '400':
          description: Bad Request
    delete:
      summary: Delete Ocean Rightsizing Rules
      description: ''
      operationId: oceanRightsizingRuleDelete
      tags:
        - Ocean Automatic Rightsizing
      parameters:
        - *ref_15
        - *ref_16
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: Ocean Rightsizing Rule Names
                  description: |
                    Rightsizing Rule Names to delete.
                  properties:
                    ruleNames:
                      type: array
                      items:
                        type: string
                      example:
                        - dev-rule
                        - test-rule
      responses:
        '200':
          description: Ocean Rightsizing Deleted Rule Names Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_17
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /ocean/{oceanId}/rightSizing/rule
                          method:
                            example: DELETE
                        example:
                          url: /ocean/{oceanId}/rightSizing/rule
                          method: DELETE
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                ruleNames:
                                  type: array
                                  example: &ref_20
                                    - dev-rule
                                    - test-rule
                                  items:
                                    type: string
                              example:
                                ruleNames: *ref_20
                          kind:
                            example: mcs:ocean:rightsizing:rule
                        example:
                          items:
                            - ruleNames: *ref_20
                          kind: mcs:ocean:rightsizing:rule
        '400':
