openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Stateful Node
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@spot.io
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags:
  - name: Stateful Node AWS
    description: |
      Stateful Node is a Spot solution for launching and managing a single compute instance.
      On the AWS cloud, for a standard single instance workload, an On-Demand EC2 instance is launched.
      The instance is expected to be highly available, easily manageable, and integrate well with additional services and monitoring tools.
      For more information please review the concepts section.
    externalDocs:
      description: Stateful Node for AWS Concepts and Tutorials
      url: https://docs.flexera.com/spot/managed-instance/
paths:
  /aws/ec2/managedInstance:
    post:
      summary: Create Stateful Node
      description: |
        Create a new Stateful Node resource.
      operationId: AWSManagedInstanceCreate
      tags:
        - Stateful Node AWS
      parameters:
        - &ref_8
          in: query
          name: accountId
          example: act-123456789
          description: |
            The ID of the account associated with your token.
          schema:
            type: string
          required: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              allOf:
                - &ref_7
                  type: object
                  properties:
                    managedInstance:
                      type: object
                      required:
                        - name
                        - region
                      properties:
                        name:
                          type: string
                          example: mi-test
                          description: |
                            Stateful Node name
                        description:
                          type: string
                          example: This is my Stateful Node
                          description: |
                            Describe your Stateful Node resource
                        region:
                          type: string
                          example: us-east-1
                          description: |
                            The AWS region your resource will be created in.
                        strategy: &ref_10
                          type: object
                          title: MI Strategy
                          properties:
                            lifeCycle:
                              type: string
                              example: spot
                              description: |
                                Set lifecycle, valid values: `spot`, `on_demand` Default: spot
                            orientation:
                              type: string
                              example: availabilityOriented
                              description: |
                                The strategy orientation. valid values: `costOriented`, `availabilityOriented`, `balanced`, `cheapest` Default: availabilityOriented
                            drainingTimeout:
                              type: integer
                              description: |
                                The time in seconds to allow the instance be drained from incoming TCP connections and detached from ELB before terminating it, during a scale down operation
                            fallbackToOd:
                              type: boolean
                              example: true
                              description: |
                                In case of no spots available, Stateful Node will launch an On-demand instance instead Default: true
                            utilizeReservedInstances:
                              type: boolean
                              default: false
                              example: true
                              description: |
                                In case of any available Reserved Instances, Stateful Node will utilize them before purchasing Spot instances Default: false
                            utilizeCommitments:
                              type: boolean
                              description: |
                                If there are available Reserved Instances or Savings Plans, Elastigroup will utilize them before using Spot instances
                              example: false
                            optimizationWindows:
                              type: array
                              description: |
                                When performAt is 'timeWindow': must specify a list of 'timeWindows' with at least one time window Each string is in the format of - ddd:hh:mm-ddd:hh:mm ddd = day of week = Sun | Mon | Tue | Wed | Thu | Fri | Sat hh = hour 24 = 0 -23 mm = minute = 0 - 59
                              items:
                                type: string
                                example: Mon:03:00-Wed:02:30
                            revertToSpot:
                              type: object
                              title: When Elastigroup moves from OnDemand back to Spot capacity
                              properties:
                                performAt:
                                  type: string
                                  example: timeWindow
                                  enum:
                                    - never
                                    - always
                                    - timeWindow
                                  description: |
                                    Valid values: `always`, `never`, "timeWindow" Example: never Default: never
                              example:
                                performAt: timeWindow
                          example: &ref_14
                            lifeCycle: spot
                            orientation: availabilityOriented
                            fallbackToOd: true
                            utilizeReservedInstances: true
                            utilizeCommitments: false
                            optimizationWindows:
                              - Mon:03:00-Wed:02:30
                            revertToSpot:
                              performAt: timeWindow
                        compute: &ref_11
                          type: object
                          title: MI Compute
                          required:
                            - subnetIds
                            - vpcId
                          properties:
                            subnetIds:
                              type: array
                              description: |
                                A comma-separated list of subnet identifiers for your instance.
                              items:
                                type: string
                                example: subnet-79da021e
                            vpcId:
                              type: string
                              example: vpc-111
                              description: |
                                VPC ID for your instance.
                            elasticIp:
                              type: string
                              example: ip
                              description: |
                                Elastic IP Allocation Id to associate to the instance
                            privateIp:
                              type: string
                              example: ip
                              description: |
                                Private IP Allocation Id to associate to the instance
                            product:
                              type: string
                              example: Linux/UNIX
                              description: |
                                Operation system type. Possible values: Linux/UNIX, SUSE Linux, Windows, Red Hat Enterprise Linux In case of EC2 classic: Linux/UNIX (Amazon VPC), SUSE Linux (Amazon VPC), Windows (Amazon VPC), Red Hat Enterprise Linux (Amazon VPC)
                            volumeAttachments:
                              type: object
                              title: AWS Volume Attachments
                              description: |
                                Any volumes specified in this field will be automatically attached to every instance launched in the group.
                                All volumes must be located within the availability zone of the group. 
                                Additionally, the group must have at least one persistence configuration.
                                If your group has more than one instance or you want to share the same volume between several instances,
                                it's important to use [Amazon EBS Multi-Attach supported volumes](https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ebs-volumes-multi.html)
                                to enable concurrent attachment of the volumes to multiple instances. This ensures that your volumes can be effectively
                                shared among instances in your group.
                              required:
                                - volumes
                              properties:
                                volumes:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - volumeId
                                      - deviceName
                                    properties:
                                      volumeId:
                                        type: string
                                        description: |
                                          The volume id to attach
                                        example: vol-1234567
                                      deviceName:
                                        type: string
                                        description: |
                                          The device name to attach. When you attach a volume to your instance, you include a device name for the volume.
                                          Do not use a device name that is reserved for the root volume (for example - `/dev/sda1` or `/dev/xvda`).
                                        example: /dev/sdb
                                    example:
                                      volumeId: vol-1234567
                                      deviceName: /dev/sdb
                              example:
                                volumes:
                                  - volumeId: vol-1234567
                                    deviceName: /dev/sdb
                            launchSpecification:
                              type: object
                              properties:
                                instanceTypes:
                                  type: object
                                  properties:
                                    preferredType:
                                      type: string
                                      example: t2.micro
                                      description: |
                                        Prioritized instance type. The instance type must be included in the selected instance types or  meet the resource requirements if defined. Note: Either preferredType or preferredTypes can be defined,  but not both.
                                    preferredTypes:
                                      type: array
                                      description: |
                                        Prioritized subset of instance types. The list must be a subset of the selected instance types or meet the  resource requirements if defined. Note: Either preferredType or preferredTypes can be defined, but not  both.
                                      items:
                                        type: string
                                        example: &ref_3
                                          - t2.micro
                                          - t3.micro
                                          - t2.medium
                                          - t3.medium
                                    types:
                                      type: array
                                      description: |
                                        Set instance types settings.  
                                        Note: Cannot be defined if 'resourceRequirements' is defined.
                                      items:
                                        type: string
                                        example: t2.micro
                                    resourceRequirements:
                                      type: object
                                      title: Resource Requirements
                                      description: |
                                        Required instance attributes. Instance types will be selected based on these requirements.
                                      required:
                                        - requiredVCpu
                                        - requiredMemory
                                      properties:
                                        requiredGpu:
                                          type: object
                                          description: Required instance GPU
                                          properties:
                                            minimum:
                                              type: integer
                                              minimum: 1
                                            maximum:
                                              type: integer
                                              maximum: 16
                                        requiredVCpu:
                                          type: object
                                          description: Required instance vCPU
                                          properties:
                                            minimum:
                                              type: integer
                                              minimum: 1
                                            maximum:
                                              type: integer
                                              maximum: 64
                                        requiredMemory:
                                          type: object
                                          description: Required instance memory (GiB)
                                          properties:
                                            minimum:
                                              type: integer
                                              minimum: 1
                                            maximum:
                                              type: integer
                                              maximum: 512
                                        excludedInstanceTypes:
                                          type: array
                                          description: Instance types to exclude
                                          items:
                                            type: string
                                            example: &ref_0
                                              - c4.large
                                        excludedInstanceFamilies:
                                          type: array
                                          description: Instance families to exclude
                                          items:
                                            type: string
                                            example: &ref_1
                                              - A
                                              - C
                                              - D
                                        excludedInstanceGenerations:
                                          type: array
                                          description: Instance generations to exclude
                                          items:
                                            type: string
                                            example: &ref_2
                                              - '1'
                                              - '2'
                                              - '3'
                                      example:
                                        excludedInstanceTypes:
                                          - *ref_0
                                        excludedInstanceFamilies:
                                          - *ref_1
                                        excludedInstanceGenerations:
                                          - *ref_2
                                  example:
                                    preferredType: t2.micro
                                    preferredTypes:
                                      - *ref_3
                                    types:
                                      - t2.micro
                                    resourceRequirements:
                                      excludedInstanceTypes:
                                        - *ref_0
                                      excludedInstanceFamilies:
                                        - *ref_1
                                      excludedInstanceGenerations:
                                        - *ref_2
                                ebsOptimized:
                                  type: boolean
                                  example: false
                                  description: |
                                    Enable EBS optimization for supported instance which is not enabled by default. Note - additional charges will be applied. Default: false
                                monitoring:
                                  type: boolean
                                  example: false
                                  description: |
                                    Describes whether instance Enhanced Monitoring is enabled. Default: false
                                tenancy:
                                  type: string
                                  example: default
                                  description: |
                                    Valid values: "default", "dedicated" Default: default
                                iamRole:
                                  type: object
                                  properties:
                                    name:
                                      type: string
                                      example: name
                                    arn:
                                      type: string
                                      example: arn
                                  example:
                                    name: name
                                    arn: arn
                                securityGroupIds:
                                  type: array
                                  items:
                                    type: string
                                    example: sg-0dfc2c8760df6fec7
                                imageId:
                                  type: string
                                  example: ami-01e24be29428c15b2
                                keyPair:
                                  type: string
                                  example: labs-oregon
                                tags:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      tagKey:
                                        type: string
                                        example: Creator
                                      tagValue:
                                        type: string
                                        example: test1@spot.io
                                    example:
                                      tagKey: Creator
                                      tagValue: test1@spot.io
                                resourceTagSpecification:
                                  type: object
                                  description: Optional field. User will specified which resources should be tagged with group tags.
                                  properties:
                                    volumes:
                                      type: object
                                      description: Optional field. Tag specification for Volume resources.
                                      properties:
                                        shouldTag:
                                          type: boolean
                                          description: Optional field. Volume resources will be tagged with group tags.
                                          default: false
                                          example: false
                                      example:
                                        shouldTag: false
                                    snapshots:
                                      type: object
                                      description: Optional field. Tag specification for Snapshot resources.
                                      properties:
                                        shouldTag:
                                          type: boolean
                                          description: Optional field. Snapshot resources will be tagged with group tags.
                                          default: true
                                          example: true
                                      example:
                                        shouldTag: true
                                    enis:
                                      type: object
                                      description: Optional field. Tag specification for ENI resources.
                                      properties:
                                        shouldTag:
                                          type: boolean
                                          description: Optional field. ENI resources will be tagged with group tags.
                                          default: false
                                          example: false
                                      example:
                                        shouldTag: false
                                    amis:
                                      type: object
                                      description: Optional field. Tag specification for AMI resources.
                                      properties:
                                        shouldTag:
                                          type: boolean
                                          description: Optional field. AMI resources will be tagged with group tags.
                                          default: true
                                          example: true
                                      example:
                                        shouldTag: true
                                  example:
                                    volumes:
                                      shouldTag: false
                                    snapshots:
                                      shouldTag: true
                                    enis:
                                      shouldTag: false
                                    amis:
                                      shouldTag: true
                                userData:
                                  type: string
                                  example: dXNlcmJhc2g2NGVuY29kZWQ=
                                shutdownScript:
                                  type: string
                                  example: dXNlcmJhc2g2NGVuY29kZWQ=
                                creditSpecification:
                                  type: object
                                  properties:
                                    cpuCredits:
                                      type: string
                                      example: unlimited
                                  example:
                                    cpuCredits: unlimited
                                networkInterfaces:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      deviceIndex:
                                        type: integer
                                        example: 0
                                      associatePublicIpAddress:
                                        type: boolean
                                        example: true
                                      associateIpv6Address:
                                        type: boolean
                                        example: true
                                    example:
                                      deviceIndex: 0
                                      associatePublicIpAddress: true
                                      associateIpv6Address: true
                                blockDeviceMappings:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      deviceName:
                                        type: string
                                        example: /dev/xvdcz
                                      ebs:
                                        type: object
                                        properties:
                                          iops:
                                            type: integer
                                            minimum: 0
                                            description: |
                                              Must be greater than or equal to 0
                                            example: 0
                                          throughput:
                                            type: integer
                                            minimum: 125
                                            maximum: 1000
                                            example: 125
                                            description: |
                                              The amount of data transferred to or from a storage device per second, you can use this param just in a case that volumetype=‘gp3’.
                                          deleteOnTermination:
                                            type: boolean
                                            example: true
                                          encrypted:
                                            type: boolean
                                            example: true
                                          volumeSize:
                                            type: integer
                                            example: 12
                                          volumeType:
                                            type: string
                                            example: gp2
                                          kmsKeyId:
                                            type: string
                                          snapshotId:
                                            type: string
                                        example:
                                          iops: 0
                                          throughput: 125
                                          deleteOnTermination: true
                                          encrypted: true
                                          volumeSize: 12
                                          volumeType: gp2
                                    example:
                                      deviceName: /dev/xvdcz
                                      ebs:
                                        iops: 0
                                        throughput: 125
                                        deleteOnTermination: true
                                        encrypted: true
                                        volumeSize: 12
                                        volumeType: gp2
                                metadataOptions:
                                  title: Metadata Options
                                  type: object
                                  description: Optional field. Used for IMDSv2.
                                  required:
                                    - httpTokens
                                  properties:
                                    httpTokens:
                                      title: HTTP Tokens
                                      type: string
                                      description: Required for IMDSv2. Can’t be null in Create or Update. Values can be "optional" or "required".
                                      example: optional
                                    httpPutResponseHopLimit:
                                      type: integer
                                      example: '33'
                                      description: |
                                        An integer within 1,64 range (including).
                                        The desired HTTP PUT response hop limit for instance metadata requests.
                                        The larger the number, the further instance metadata requests can travel.
                                    instanceMetadataTags:
                                      title: Instance Metadata Tags
                                      type: string
                                      enum:
                                        - Enabled
                                        - Disabled
                                      description: |
                                        Indicates whether access to instance tags from the instance metadata is enabled or disabled.
                                        Can’t be null.
                                      example: Enabled
                                  example:
                                    httpTokens: optional
                                    httpPutResponseHopLimit: '33'
                                    instanceMetadataTags: Enabled
                              example:
                                instanceTypes:
                                  preferredType: t2.micro
                                  preferredTypes:
                                    - *ref_3
                                  types:
                                    - t2.micro
                                  resourceRequirements:
                                    excludedInstanceTypes:
                                      - *ref_0
                                    excludedInstanceFamilies:
                                      - *ref_1
                                    excludedInstanceGenerations:
                                      - *ref_2
                                ebsOptimized: false
                                monitoring: false
                                tenancy: default
                                iamRole:
                                  name: name
                                  arn: arn
                                securityGroupIds:
                                  - sg-0dfc2c8760df6fec7
                                imageId: ami-01e24be29428c15b2
                                keyPair: labs-oregon
                                tags:
                                  - tagKey: Creator
                                    tagValue: test1@spot.io
                                resourceTagSpecification:
                                  volumes:
                                    shouldTag: false
                                  snapshots:
                                    shouldTag: true
                                  enis:
                                    shouldTag: false
                                  amis:
                                    shouldTag: true
                                userData: dXNlcmJhc2g2NGVuY29kZWQ=
                                shutdownScript: dXNlcmJhc2g2NGVuY29kZWQ=
                                creditSpecification:
                                  cpuCredits: unlimited
                                networkInterfaces:
                                  - deviceIndex: 0
                                    associatePublicIpAddress: true
                                    associateIpv6Address: true
                                blockDeviceMappings:
                                  - deviceName: /dev/xvdcz
                                    ebs:
                                      iops: 0
                                      throughput: 125
                                      deleteOnTermination: true
                                      encrypted: true
                                      volumeSize: 12
                                      volumeType: gp2
                                metadataOptions:
                                  httpTokens: optional
                                  httpPutResponseHopLimit: '33'
                                  instanceMetadataTags: Enabled
                          example: &ref_15
                            subnetIds:
                              - subnet-79da021e
                            vpcId: vpc-111
                            elasticIp: ip
                            privateIp: ip
                            product: Linux/UNIX
                            volumeAttachments:
                              volumes:
                                - volumeId: vol-1234567
                                  deviceName: /dev/sdb
                            launchSpecification:
                              instanceTypes:
                                preferredType: t2.micro
                                preferredTypes:
                                  - *ref_3
                                types:
                                  - t2.micro
                                resourceRequirements:
                                  excludedInstanceTypes:
                                    - *ref_0
                                  excludedInstanceFamilies:
                                    - *ref_1
                                  excludedInstanceGenerations:
                                    - *ref_2
                              ebsOptimized: false
                              monitoring: false
                              tenancy: default
                              iamRole:
                                name: name
                                arn: arn
                              securityGroupIds:
                                - sg-0dfc2c8760df6fec7
                              imageId: ami-01e24be29428c15b2
                              keyPair: labs-oregon
                              tags:
                                - tagKey: Creator
                                  tagValue: test1@spot.io
                              resourceTagSpecification:
                                volumes:
                                  shouldTag: false
                                snapshots:
                                  shouldTag: true
                                enis:
                                  shouldTag: false
                                amis:
                                  shouldTag: true
                              userData: dXNlcmJhc2g2NGVuY29kZWQ=
                              shutdownScript: dXNlcmJhc2g2NGVuY29kZWQ=
                              creditSpecification:
                                cpuCredits: unlimited
                              networkInterfaces:
                                - deviceIndex: 0
                                  associatePublicIpAddress: true
                                  associateIpv6Address: true
                              blockDeviceMappings:
                                - deviceName: /dev/xvdcz
                                  ebs:
                                    iops: 0
                                    throughput: 125
                                    deleteOnTermination: true
                                    encrypted: true
                                    volumeSize: 12
                                    volumeType: gp2
                              metadataOptions:
                                httpTokens: optional
                                httpPutResponseHopLimit: '33'
                                instanceMetadataTags: Enabled
                        integrations: &ref_12
                          type: object
                          title: MI integrations
                          properties:
                            loadBalancersConfig:
                              type: object
                              properties:
                                loadBalancers:
                                  type: array
                                  items:
                                    anyOf:
                                      - type: object
                                        properties:
                                          name:
                                            type: string
                                            example: name
                                          arn:
                                            type: string
                                            example: arn
                                          type:
                                            type: string
                                            example: CLASSIC
                                            description: |
                                              The resource type. Valid Values: CLASSIC, TARGET_GROUP
                            route53:
                              type: object
                              properties:
                                domains:
                                  type: array
                                  items:
                                    anyOf:
                                      - type: object
                                        properties:
                                          hostedZoneId:
                                            type: string
                                            example: Z00275642KS5ZZJFIQBCA
                                          recordSetType:
                                            type: string
                                            example: a
                                          spotinstAccountId:
                                            type: string
                                            example: act-1234
                                          recordSets:
                                            type: array
                                            items:
                                              anyOf:
                                                - type: object
                                                  properties:
                                                    usePublicIp:
                                                      type: boolean
                                                      example: true
                                                    name:
                                                      type: string
                                                      example: testa.spot.io
                        scheduling: &ref_13
                          type: object
                          title: MI Scheduling
                          properties:
                            tasks:
                              type: array
                              items:
                                type: object
                                title: Task Definition
                                properties:
                                  taskType:
                                    type: string
                                    example: recycle
                                    enum:
                                      - pause
                                      - resume
                                      - recycle
                                    description: |
                                      The task type to run.
                                  startTime:
                                    type: string
                                    example: '2018-05-23T10:55:09Z'
                                    description: |
                                      DATETIME in ISO-8601 format. Sets a start time for scheduled actions. If `frequency` or `cronExpression` are not used - the task will run only once at the start time and will then be deleted from the group configuration
                                  cronExpression:
                                    type: string
                                    example: 0 1 * * *
                                    description: |
                                      A valid cron expression. For example : " * * * * * ". The cron is running in UTC time zone and is in Unix cron format Cron Expression Validator Script. Only one of ‘frequency' or ‘cronExpression' should be used at a time.
                                  isEnabled:
                                    type: boolean
                                    default: true
                                    example: true
                                    description: |
                                      Describes whether the task is enabled. When true the task should run when false it should not run.
                                  frequency:
                                    type: string
                                    enum:
                                      - hourly
                                      - daily
                                      - weekly
                                    description: |
                                      The recurrence frequency to run this task. Only one of `frequency` or `cronExpression` should be used at a time
                                example:
                                  taskType: recycle
                                  startTime: '2018-05-23T10:55:09Z'
                                  cronExpression: 0 1 * * *
                                  isEnabled: true
                          example: &ref_16
                            tasks:
                              - taskType: recycle
                                startTime: '2018-05-23T10:55:09Z'
                                cronExpression: 0 1 * * *
                                isEnabled: true
                        persistence:
                          type: object
                          description: |
                            Persistence settings. Should omit at least one of the persist options below.
                          properties:
                            blockDevicesMode:
                              type: string
                              example: reattach
                              description: |
                                Determine the way we attach the data volumes to the data devices.
                              enum:
                                - reattach
                                - onLaunch
                              default: onLaunch
                            persistRootDevice:
                              type: boolean
                              example: true
                              description: |
                                Should the instance maintain its root device volumes
                            persistBlockDevices:
                              type: boolean
                              example: true
                              description: |
                                Should the instance maintain its Data volumes
                            persistPrivateIp:
                              type: boolean
                              example: true
                              description: |
