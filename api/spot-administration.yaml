openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Administration
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@spot.io
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags:
  - name: Organizations
    description: Manage your Spot organizations.
    externalDocs:
      description: Organizations Documentation
      url: https://docs.flexera.com/spot/administration/
  - name: Accounts
    description: Manage your Spot accounts.
    externalDocs:
      description: Accounts Documentation
      url: https://docs.flexera.com/spot/administration/
paths:
  /setup/account/{accountId}:
    put:
      summary: Update Account
      description: |
        Update information in an account such as the account name and slack channel. To use this command, permissions for organization admin are required. Granular permissions will require access policies with the following actions: setup:updateAccount
      operationId: OrganizationsAndAccountsUpdateAccount
      tags:
        - Accounts
      parameters:
        - in: path
          name: accountId
          example: act-123456789
          description: |
            The ID of the account you want to update.
          schema:
            type: string
          required: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - account
                  properties:
                    account:
                      type: object
                      description: Used for updating items in an account.
                      properties:
                        slackNotificationChannels:
                          type: array
                          description: List of strings containing the URLs of the slack channels to be added.
                          items:
                            type: string
                            example: &ref_0
                              - https://hooks.slack.com/services/SLACK_ID
                              - https://hooks.slack.com/services/SLACK_ID
                        name:
                          type: string
                          description: The new name of the account. Cannot be null or empty.
                          example: ACCOUNT_NAME
                      example:
                        slackNotificationChannels:
                          - *ref_0
                        name: ACCOUNT_NAME
      responses:
        '200':
          description: Update Account Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          id:
                            type: string
                            example: 46642c7d-bc29-417d-8ce4-79626f00c63c
                            description: |
                              Unique ID associated with this request
                          url:
                            type: string
                            example: /setup/account/act-4fb595c6?accountId=act-4fb595c6
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: PUT
                            description: |
                              The HTTP **METHOD** used for the request
                          timestamp:
                            type: string
                            example: '2018-11-19T13:49:11.911Z'
                            description: |
                              When the request was received by Spot
                        example:
                          id: 46642c7d-bc29-417d-8ce4-79626f00c63c
                          url: /setup/account/act-4fb595c6?accountId=act-4fb595c6
                          method: PUT
                          timestamp: '2018-11-19T13:49:11.911Z'
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code
                            example:
                              code: 200
                              message: OK
                        example:
                          status:
                            code: 200
                            message: OK
        '400':
          description: Bad Request
    delete:
      summary: Delete Account
      description: |
        Delete a Spot Account. The Spot Account ID can be obtained from your Spot console via the following link: https://console.spotinst.com/#/settings/account/general . Note This cannot be undone – take caution. Only Organization Admins can perform this action. In case you want to delete your default Spot account which is the account visible when you first log in please contact Support.
      operationId: OrganizationsAndAccountsDeleteAccount
      tags:
        - Accounts
      parameters:
        - in: path
          name: accountId
          example: act-123456789
          description: |
            The ID of the account you want to delete.
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Delete Account Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          id:
                            type: string
                            example: 46642c7d-bc29-417d-8ce4-79626f00c63c
                            description: |
                              Unique ID associated with this request
                          url:
                            type: string
                            example: /setup/account/act-123456
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: DELETE
                            description: |
                              The HTTP **METHOD** used for the request
                          timestamp:
                            type: string
                            example: '2018-11-19T13:49:11.911Z'
                            description: |
                              When the request was received by Spot
                        example:
                          id: 46642c7d-bc29-417d-8ce4-79626f00c63c
                          url: /setup/account/act-123456
                          method: DELETE
                          timestamp: '2018-11-19T13:49:11.911Z'
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code
                            example:
                              code: 200
                              message: OK
                        example:
                          status:
                            code: 200
                            message: OK
        '400':
          description: Bad Request
  /setup/user:
    get:
      summary: Get Users
      description: |
        Get all users in the organization, their details, and mapped accounts. Providing the optional account ID parameter will filter out all users not mapped to that account.
      operationId: GetAccountsUsers
      tags:
        - Accounts
      parameters:
        - in: query
          name: accountId
          example: act-123abc
          description: |
            ID of the account you would like to get retrieve users from
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Get Account Users Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          id:
                            type: string
                            example: 46642c7d-bc29-417d-8ce4-79626f00c63c
                            description: |
                              Unique ID associated with this request
                          url:
                            type: string
                            example: /setup/user?accountId=act-123456789
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: GET
                            description: |
                              The HTTP **METHOD** used for the request
                          timestamp:
                            type: string
                            example: '2018-11-19T13:49:11.911Z'
                            description: |
                              When the request was received by Spot
                        example:
                          id: 46642c7d-bc29-417d-8ce4-79626f00c63c
                          url: /setup/user?accountId=act-123456789
                          method: GET
                          timestamp: '2018-11-19T13:49:11.911Z'
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code
                            example:
                              code: 200
                              message: OK
                        example:
                          status:
                            code: 200
                            message: OK
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:aws:ec2:group:log
                            description: |
                              The data type of each item in the response
                          items:
                            type: array
                            description: |
                              Array of data objects
                            items:
                              anyOf:
                                - type: object
                                  properties:
                                    mappedAccountIds:
                                      type: string
                                      description: A list of account IDs
                                      example:
                                        - act-0b18f123
                                        - act-0b18f124
                                        - act-0b18f125
                                    userId:
                                      type: string
                                      description: User ID
                                      example: u-19265
                                    displayName:
                                      type: string
                                      description: The name
                                      example: test
                                    email:
                                      type: string
                                      description: Email
                                      example: test@spot.io
                                - type: object
                                  properties:
                                    mappedAccountIds:
                                      type: string
                                      description: A list of account IDs
                                      example:
                                        - act-0b18f123
                                        - act-0b18f124
                                        - act-0b18f125
                                    userId:
                                      type: string
                                      description: User ID
                                      example: u-19266
                                    displayName:
                                      type: string
                                      description: The name
                                      example: test
                                    email:
                                      type: string
                                      description: Email
                                      example: abc@google.com
                            example: &ref_1
                              - mappedAccountIds:
                                  - act-0b18f123
                                  - act-0b18f124
                                  - act-0b18f125
                                userId: u-19265
                                displayName: test
                                email: test@spot.io
                              - mappedAccountIds:
                                  - act-0b18f123
                                  - act-0b18f124
                                  - act-0b18f125
                                userId: u-19266
                                displayName: test
                                email: abc@google.com
                          count:
                            type: integer
                            example: 2
                            description: |
                              Size of the data object array
                        example:
                          kind: spotinst:aws:ec2:group:log
                          items: *ref_1
                          count: 2
        '400':
          description: Bad Request
    post:
      summary: Create User
      description: Create a new user and link it to the creator's organization (the organization ID from the personal token attached to the API call). If the role is a viewer, the user is also linked to the default account for the organization.
      operationId: OrganizationsAndAccountsCreateUser
      tags:
        - Organizations
      parameters:
        - in: query
          name: generateToken
          example: true
          description: |
            If `true`, then the response will include `personalAccessToken` string
          schema:
            type: boolean
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  properties:
                    firstName:
                      type: string
                      description: |
                        The first name of the user. Note: names cannot include these characters: + = @
                      example: Test
                    lastName:
                      type: string
                      description: |
                        The last name of the user. Note: names cannot include these characters: + = @
                      example: Test
                    email:
                      type: string
                      description: Email
                      example: test@spot.io
                    password:
                      type: string
                      description: Password
                      example: password1234
                    role:
                      type: string
                      description: User's role
                      example: viewer
      responses:
        '200':
          description: Create User Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          id:
                            type: string
                            example: 46642c7d-bc29-417d-8ce4-79626f00c63c
                            description: |
                              Unique ID associated with this request
                          url:
                            type: string
                            example: /setup/user/?generateToken=true
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: POST
                            description: |
                              The HTTP **METHOD** used for the request
                          timestamp:
                            type: string
                            example: '2018-11-19T13:49:11.911Z'
                            description: |
                              When the request was received by Spot
                        example:
                          id: 46642c7d-bc29-417d-8ce4-79626f00c63c
                          url: /setup/user/?generateToken=true
                          method: POST
                          timestamp: '2018-11-19T13:49:11.911Z'
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code
                            example:
                              code: 200
                              message: OK
                        example:
                          status:
                            code: 200
                            message: OK
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:setup:user
                            description: |
                              The data type of each item in the response
                          items:
                            type: array
                            description: |
                              Array of data objects
                            items:
                              type: object
                              title: spotinst:setup:user
                              properties:
                                id:
                                  type: integer
                                  description: User's old ID (DEPRECATED)
                                  example: 9056
                                firstName:
                                  type: string
                                  description: First Name
                                  example: Test
                                lastName:
                                  type: string
                                  description: Last Name
                                  example: Test
                                displayName:
                                  type: string
                                  description: First Name + Last Name
                                  example: Test Test
                                email:
                                  type: string
                                  description: Email
                                  example: test@gmail.com
                                organizationId:
                                  type: integer
                                  description: ID of Organization in Spot Console
                                  example: 606079860000
                                personalAccessToken:
                                  type: integer
                                  description: ID of Organization in Spot Console
                                  example: ...
                                userId:
                                  type: string
                                  description: User's ID
                                  example: u-1a2b3c4d
                              example:
                                id: 9056
                                firstName: Test
                                lastName: Test
                                displayName: Test Test
                                email: test@gmail.com
                                organizationId: 606079860000
                                personalAccessToken: ...
                                userId: u-1a2b3c4d
                          count:
                            type: integer
                            example: 1
                            description: |
                              Size of the data object array
                        example:
                          kind: spotinst:setup:user
                          items:
                            - id: 9056
                              firstName: Test
                              lastName: Test
                              displayName: Test Test
                              email: test@gmail.com
                              organizationId: 606079860000
                              personalAccessToken: ...
                              userId: u-1a2b3c4d
                          count: 1
        '400':
          description: Bad Request
  /setup/organization/user:
