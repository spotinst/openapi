        - &ref_14
          in: query
          name: accountId
          example: act-123456789
          description: |
            The ID of the account associated with your token.
          schema:
            type: string
          required: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Assign role based users
                  properties:
                    mappings:
                      type: array
                      description: Mappings objects include user, accountID and role.
                      items:
                        anyOf:
                          - type: object
                            properties:
                              userId:
                                type: string
                                description: One of userEmail / userId is required. identify user by its user ID
                                example: u-1234
                              accountId:
                                type: string
                                description: Account for which to provide the specified user with the specified role.
                                example: act-123abc
                              role:
                                type: string
                                description: Valid values "viewer", "editor". Required on permissionStrategy = ROLE_BASED
                                example: editor
                          - type: object
                            properties:
                              userId:
                                type: string
                                description: One of userEmail / userId is required. identify user by its user ID
                                example: u-1234
                              accountId:
                                type: string
                                description: Account for which to provide the specified user with the specified role.
                                example: act-123abc
                              permissionStrategy:
                                type: string
                                description: Set the user permissions type, by role or by access policy. Valid values "ROLE_BASED", "POLICY_BASED"
                                example: ROLE_BASED
                              role:
                                type: string
                                description: Valid values "viewer", "editor". Required on permissionStrategy = ROLE_BASED
                                example: editor
                      example:
                        - userId: u-1234
                          accountId: act-123abc
                          role: editor
                        - userId: u-1234
                          accountId: act-123abc
                          permissionStrategy: ROLE_BASED
                          role: editor
                - type: object
                  title: Assign policy based users
                  properties:
                    mappings:
                      type: array
                      description: Mappings objects include user, accountID and role.
                      items:
                        allOf:
                          - type: object
                            properties:
                              userId:
