openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Ocean Spark
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@spot.io
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags:
  - name: Ocean Spark
    description: |
      Ocean for Apache Spark is a managed cloud-native Spark platform that can be deployed in your cloud account.

      Running on top of Ocean, Spot’s serverless infrastructure engine for containers, Ocean Spark makes it easy for your data teams to be successful with Apache Spark on Kubernetes, without dealing with the complexity of managing servers.
    externalDocs:
      description: Ocean Spark
      url: https://docs.flexera.com/spot/ocean-spark/
paths:
  /ocean/spark/cluster:
    summary: Ocean Spark
    post:
      summary: Create Cluster
      description: |
        Create Ocean Spark Cluster
      operationId: OceanSparkClusterCreate
      tags:
        - Ocean Spark
      parameters:
        - &ref_10
          in: query
          name: accountId
          example: act-123456789
          description: |
            The ID of the account associated with your token.
          schema:
            type: string
          required: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - cluster
                  properties:
                    cluster:
                      type: object
                      description: |
                        The object specifying the configuration of the Ocean Spark cluster.
                      title: Ocean Spark Cluster
                      required:
                        - oceanClusterId
                      allOf:
                        - type: object
                          description: |
                            The description of an Ocean Spark cluster
                          properties:
                            oceanClusterId: &ref_0
                              type: string
                              example: o-d3a2908e
                              description: A unique identifier for the Ocean cluster
                            config: &ref_1
                              type: object
                              description: |
                                The object specifying the configuration of the Ocean Spark cluster.
                              properties:
                                ingress:
                                  type: object
                                  description: |
                                    The object specifying the Ocean Spark Ingress configuration.
                                  properties:
                                    serviceAnnotations:
                                      type: object
                                      additionalProperties:
                                        type: string
                                      description: |
                                        DEPRECATED: Use `loadBalancer.serviceAnnotations` instead. 
                                        Annotations to add to the ingress load balancer service. This is useful to configure properties of the managed load balancer, 
                                        like the nature of the load balancer (e.g. ELB, NLB, ALB on AWS), 
                                        the security groups, or various timeouts.
                                      example:
                                        service.beta.kubernetes.io/aws-load-balancer-security-groups: sg-03ba056e31f183482
                                    controller:
                                      type: object
                                      description: |
                                        The object specifying the Ocean Spark Ingress Controller configuration.
                                      properties:
                                        managed:
                                          type: boolean
                                          default: true
                                          example: true
                                          description: |
                                            Should an ingress controller managed by Ocean for Apache Spark be installed on the cluster.
                                    loadBalancer:
                                      type: object
                                      description: |
                                        The object specifying the Ocean Spark Ingress Load Balancer configuration.
                                      properties:
                                        managed:
                                          type: boolean
                                          default: true
                                          example: true
                                          description: |
                                            Should a load balancer managed by Ocean for Apache Spark be provisioned for the cluster. 
                                            Set this to false if you want to use an existing load balancer (only available on AWS).
                                        targetGroupArn:
                                          type: string
                                          description: |
                                            The ARN of a target group that the Ocean for Apache Spark ingress controller will be bound to.
                                            Set this to use an existing load balancer with Ocean for Apache Spark.
                                            Has no effect if using a managed load balancer. Only available on AWS.
                                          example: arn:aws:elasticloadbalancing:us-east-1:XXXXXXXXXXXX:targetgroup/my-spark-cluster-tg/XXXXXXXXXXXXXXXX
                                        serviceAnnotations:
                                          type: object
                                          additionalProperties:
                                            type: string
                                          description: |
                                            Annotations to add to the ingress controller load balancer service. This is useful to configure properties 
                                            of the managed load balancer, like the nature of the load balancer (e.g. ELB, NLB, ALB on AWS), 
                                            the security groups, or various timeouts.
                                          example:
                                            service.beta.kubernetes.io/aws-load-balancer-security-groups: sg-XXXXXXXXXXXXXXXXX
                                    customEndpoint:
                                      type: object
                                      description: |
                                        The object specifying the Ocean Spark Ingress Custom Endpoint configuration.
                                      properties:
                                        enabled:
                                          type: boolean
                                          default: false
                                          example: false
                                          description: |
                                            Should the Ocean for Apache Spark control plane address the cluster using a custom address.
                                            Use this to specify the DNS address of an externally provisioned (unmanaged) load balancer.
                                        address:
                                          type: string
                                          description: |
                                            The address the Ocean for Apache Spark control plane will use when addressing the cluster.
                                          example: my-spark-cluster-nlb-8cbb8da7XXXXXXXX.elb.us-east-1.amazonaws.com
                                    privateLink:
                                      type: object
                                      description: |
                                        The object specifying the Ocean Spark Ingress Private Link configuration. Only available on AWS.
                                      properties:
                                        enabled:
                                          type: boolean
                                          default: false
                                          example: false
                                          description: |
                                            Should the Ocean for Apache Spark control plane address the cluster via an AWS Private Link.
                                        vpcEndpointService:
                                          type: string
                                          description: |
                                            The name of the VPC Endpoint Service the Ocean for Apache Spark control plane should bind to.
                                          example: com.amazonaws.vpce.eu-north-1.vpce-svc-XXXXXXXXXXXXXXXXX
                                webhook:
                                  type: object
                                  description: |
                                    The object specifying the Ocean Spark Webhook configuration.
                                  properties:
                                    useHostNetwork:
                                      type: boolean
                                      default: false
                                      example: true
                                      description: |
                                        Enable/Disable host networking on the Spark Operator. Host networking can be useful when using custom CNI plugins 
                                        like Calico.
                                    hostNetworkPorts:
                                      type: array
                                      items:
                                        type: integer
                                        example: 1234
                                      description: |
                                        List of ports allowed to use on the host network - if empty default is **25554**
                                compute:
                                  type: object
                                  description: |
                                    The object specifying the Ocean Spark Compute configuration.
                                  properties:
                                    useTaints:
                                      type: boolean
                                      default: true
                                      example: false
                                      description: |
                                        Enable/Disable **ocean-spark** taints on the Ocean Spark VNGs. By default, Spark uses taints to prevent 
                                        non-Spark pods to run on Ocean Spark VNGs.
                                    createVngs:
                                      type: boolean
                                      default: true
                                      example: false
                                      description: |
                                        Enable/Disable creating **ocean-spark** VNGs
                                logCollection:
                                  type: object
                                  description: |
                                    The object specifying the Ocean Spark Log Collection configuration.
                                  properties:
                                    collectDriverLogs:
                                      type: boolean
                                      default: true
                                      example: false
                                      deprecated: true
                                      description: |
                                        Deprecated. Use `collectAppLogs` instead, effect is the same.
                                    collectAppLogs:
                                      type: boolean
                                      default: true
                                      description: |
                                        Enable/Disable collecting driver and executor logs. When enabled, logs are stored by Flexera and can be downloaded from 
                                        the Spot console web interface. The logs are deleted after 30 days.
                                spark:
                                  type: object
                                  description: |
                                    The object specifying the Ocean Spark Spark configuration.
                                  properties:
                                    appNamespaces:
                                      type: array
                                      items:
                                        type: string
                                      example:
                                        - spark-apps
                                        - spark-apps-extra-ns-1
                                        - spark-apps-extra-ns-2
                                      description: |
                                        List of Kubernetes namespaces that Spark applications can run in. The default namespace `spark-apps` is always included in the list.
                                workspaces:
                                  type: object
                                  description: |
                                    The object specifying the Ocean Spark Workspaces configuration.
                                  properties:
                                    storageClassOverride:
                                      allOf:
                                        - &ref_14
                                          type: string
                                          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                        - example: my-custom-storage-class
                                          description: |
                                            The storage class to use for Ocean Spark workspaces. If not set, the cluster's default storage class will 
                                            be used.
                - type: object
                  properties:
                    cluster:
                      type: object
                      required:
                        - name
      responses:
        '200':
          description: Ocean Spark Cluster Response
          content:
            application/json:
              schema:
                allOf:
                  - &ref_4
                    type: object
                    allOf:
                      - type: object
                        properties:
                          request:
                            type: object
                            description: |
                              Original request properties.
                            properties:
                              id:
                                type: string
                                example: e593ff58-067d-4340-92f9-8b1c0bad70d7
                                description: |
                                  Unique identifier associated with this request.
                              url:
                                type: string
                                description: |
                                  The URL that was used for the request.
                              method:
                                type: string
                                description: |
                                  The HTTP **METHOD** used for the request.
                              timestamp:
                                type: string
                                example: '2018-06-20T11:35:01.745Z'
                                description: |
                                  When the request was received by Spot.
                          response:
                            type: object
                            description: |
                              Response package that includes status, type, and any relevant data.
                            properties:
                              status:
                                type: object
                                properties:
                                  code:
                                    type: integer
                                    example: 200
                                    description: |
                                      HTTP status code assigned to this response.
                                  message:
                                    type: string
                                    example: OK
                                    description: |
                                      HTTP status message for the respective status code.
                      - type: object
                        properties:
                          response:
                            type: object
                            properties:
                              count:
                                type: integer
                                example: 1
                                description: |
                                  Size of the data object array.
                              kind:
                                type: string
                                description: |
                                  The data type of each item in the response.
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /ocean/spark/cluster
                          method:
                            example: POST
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items: &ref_5
                              type: object
                              description: |
                                The object specifying the Ocean Spark cluster.
                              title: Ocean Spark Cluster
                              required:
                                - controllerClusterId
                                - oceanClusterId
                              allOf:
                                - type: object
                                  description: |
                                    The description of an Ocean Spark cluster
                                  properties:
                                    id: &ref_7
                                      type: string
                                      example: osc-20fac3f1
                                      description: |
                                        A unique identifier for the Ocean Spark cluster
                                    controllerClusterId: &ref_3
                                      type: string
                                      example: my-ocean-cluster
                                      description: |
                                        The reporting identifier of the Ocean controller in the Ocean cluster
                                    oceanClusterId: *ref_0
                                    state: &ref_2
                                      description: |
                                        The current state of the Ocean Spark cluster.
                                        * `PROGRESSING`: The cluster resources are being created.
                                        * `DELETING`: The cluster resources are being deleted.
                                        * `AVAILABLE`: The cluster is available.
                                        * `UNREACHABLE`: The cluster stopped sending heartbeat. This can be caused by the cluster going down or by a networking issue between the cluster and Spot's backend.
                                        * `DEGRADED`: One of the cluster components is unhealthy. Some features may not be available.
                                        * `FAILING`: A critical cluster component is unhealthy.
                                        * `UNKNOWN`: The cluster status API has an unexpected, internal error.
                                      example: AVAILABLE
                                      enum:
                                        - AVAILABLE
                                        - PROGRESSING
                                        - DEGRADED
                                        - FAILING
                                        - UNKNOWN
                                        - UNREACHABLE
                                        - DELETING
                                    config: *ref_1
                                    region:
                                      type: string
                                      example: us-west-2
                                      description: |
                                        The region where the Ocean Spark cluster lives
                                    k8sVersion:
                                      type: string
                                      description: |
                                        The Kubernetes API of the Ocean Spark cluster
                                      example: v1.21.2-eks-0389ca3
                                    operatorVersion:
                                      type: string
                                      description: |
                                        The version of the Ocean Spark operator running in the Ocean Spark cluster
                                      example: 0.1.30
                                    operatorLastHeartbeat:
                                      type: string
                                      format: date-time
                                      description: The last heartbeat received from the Ocean Spark operator running in the Ocean Spark cluster
                                      example: '2021-11-20T13:29:30.000Z'
                                - &ref_17
                                  type: object
                                  title: createdAt & updatedAt object
                                  properties:
                                    createdAt:
                                      type: string
                                      format: date-time
                                      example: 2018-10-10T10:50:29.000+0000
                                    updatedAt:
                                      type: string
                                      format: date-time
                                      example: 2018-11-01T10:50:29.000+0000
                          kind:
                            example: spotinst:ocean:spark:cluster
        '400':
          description: Bad Request
    get:
      summary: List Clusters
      description: |
        List the Ocean Spark clusters in the specified account.
      operationId: OceanSparkClusterList
      tags:
        - Ocean Spark
      parameters:
        - &ref_6
          in: query
          name: accountId
          example: act-123456789
          description: |
            The ID of the account associated with your token. If omitted the oldest account in the organization will be used.
          schema:
            type: string
          required: false
        - in: query
          name: fromDate
          required: false
          description: |
            Get items on or after this date (ISO 8601 or Unix timestamp)
          schema:
            type: string
          example: 2020-09-01 or fromDate=1598918400000
        - in: query
          name: toDate
          required: false
          description: Get items on or before this date (ISO 8601 or Unix timestamp)
          schema:
            type: string
          example: 2020-09-01 or fromDate=1598918400000
        - in: query
          name: state
          required: false
          description: Optionally filter on the current state of the Ocean Spark cluster
          schema: *ref_2
        - in: query
          name: controllerClusterId
          required: false
          schema: *ref_3
          description: |
            Optionally filter on the reporting identifier of the Ocean controller in the Ocean cluster (controllerClusterId)
      responses:
        '200': &ref_8
          description: A list of Ocean Spark clusters (can be a single cluster)
          content:
            application/json:
              schema:
                allOf:
                  - *ref_4
                  - type: object
                    properties:
                      response:
                        type: object
                        description: |
                          response body
                        properties:
                          items:
                            type: array
                            items: *ref_5
        '400':
          description: Bad Request
  /ocean/spark/cluster/{clusterId}:
    summary: Ocean Spark
    get:
      summary: Get Cluster
      description: |
        Describe an Ocean Spark cluster.
      operationId: OceanSparkClusterGet
      tags:
        - Ocean Spark
      parameters:
        - *ref_6
        - &ref_9
          in: path
          name: clusterId
          required: true
          schema: *ref_7
      responses:
        '200': *ref_8
        '400':
          description: Bad Request
    delete:
      summary: Delete Cluster
      description: |
        Delete an Ocean Spark cluster.

        Removing a cluster will disconnect it from Ocean for Spark. This action is permanent and cannot be undone.

        The Ocean for Spark resources will be uninstalled from the cluster, but the Ocean cluster itself (and related Kubernetes resources) will not be deleted.
      operationId: OceanSparkClusterDelete
      tags:
        - Ocean Spark
      parameters:
        - *ref_6
        - *ref_9
      responses:
        '200':
          description: Ok
        '400':
          description: Bad Request
    put:
      summary: Update Cluster
      description: |
        All Ocean Spark configuration parameters are updatable. This API supports partial updates, so specific fields can be updated separately.
      operationId: OceanSparkClusterUpdate
      tags:
        - Ocean Spark
      parameters:
        - *ref_9
        - *ref_10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - cluster
                  properties:
                    cluster:
                      type: object
                      description: |
                        The object specifying the configuration of the Ocean Spark cluster.
                      title: Ocean Spark Cluster
                      allOf:
                        - type: object
                          description: |
                            The description of an Ocean Spark cluster
                          required:
                            - config
                          properties:
                            config: *ref_1
      responses:
        '200':
          description: Ok
        '400':
          description: Bad Request
  /ocean/spark/cluster/sparkCoreHours:
    summary: Ocean Spark
    get:
      summary: Cluster Spark Core Hours
      description: |
        Gets the number of core hours applications have consumed.
      operationId: OceanSparkClusterSparkCoreHours
      tags:
        - Ocean Spark
      parameters:
        - *ref_6
        - name: clusterId
          in: query
          required: false
          schema:
            type: array
            items: *ref_7
        - in: query
          name: period
          required: false
          example: 2021-11
          description: |
            The month to query from.
          schema:
            format: date-time
            type: string
      responses:
        '200':
          description: Number of spark core hours consumed by cluster
          content:
            application/json:
              schema:
                allOf:
                  - *ref_4
                  - type: object
                    properties:
                      response:
                        type: object
                        description: |
                          response body
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - id
                                - coreHours
                              description: |
                                Object that holds a pair of Ocean Spark Cluster ID and core hours that this cluster has consumed.
                              properties:
                                id: *ref_7
                                coreHours:
                                  type: number
                                  description: |
                                    Number of core hours that the cluster has consumed.
                                  example: 99
        '400':
          description: Bad Request
  /ocean/spark/cluster/{clusterId}/appCompletionTrend:
    summary: Ocean Spark
    get:
      summary: Cluster application completion trend
      description: |
        Aggregates the number of apps reaching a terminal state (completed, failed, killed, ...)  within time buckets.
      operationId: OceanSparkClusterAppCompletionTrend
      tags:
        - Ocean Spark
      parameters:
        - *ref_6
        - *ref_9
        - &ref_11
          in: query
          name: since
          required: true
          example: '2021-11-22'
          description: |
            Date at which to start the analysis. If the time range up to now is less or equal to a day, values are reported grouped per hours. Otherwise, values are reported grouped per days.
          schema:
            format: date-time
            type: string
      responses:
        '200':
          description: |
            Number of applications reaching a terminal state, grouped by the terminal state and a time bucket.
          content:
            application/json:
              schema:
                allOf:
                  - *ref_4
                  - type: object
                    properties:
                      response:
                        type: object
                        description: |
                          response body
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - start
                                - end
                                - completed
                                - failed
                                - killed
                                - timed_out
                              description: |
                                The number of applications that ended in a given time range, grouped by the terminal state they reached.
                              properties:
                                start:
                                  type: string
                                  format: date-time
                                  description: |
                                    Start of the time range
                                  example: '2021-11-18T17:09:37+00:00'
                                end:
                                  type: string
                                  format: date-time
                                  description: |
                                    End of the time range
                                  example: '2021-11-18T17:09:37+00:00'
                                completed:
                                  type: number
                                  description: |
                                    The number of apps successfully completed between >= start and < end
                                failed:
                                  type: number
                                  description: |
                                    The number of apps that failed between >= start and < end
                                killed:
                                  type: number
                                  description: |
                                    The number of apps killed between >= start and <end
                                timedOut:
                                  type: number
                                  description: |
                                    The number of apps that timed-out between >= start and < end
        '400':
          description: Bad Request
  /ocean/spark/cluster/{clusterId}/appLoadHistory:
    summary: Ocean Spark
    get:
      summary: Cluster application load history
      description: |
        Reports the number of applications in pending and running state within time buckets.
      operationId: OceanSparkClusterAppLoadHistory
      tags:
        - Ocean Spark
      parameters:
        - *ref_6
        - *ref_9
        - *ref_11
      responses:
        '200':
          description: Number of pending or running apps, within time buckets.
          content:
            application/json:
              schema:
                allOf:
                  - *ref_4
                  - type: object
                    properties:
                      response:
                        type: object
                        description: |
                          response body
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - time
                                - pending
                                - running
                              description: |
                                Number of apps pending or running at a given point in time
                              properties:
                                time:
                                  type: string
                                  format: date-time
                                  description: |
                                    Polling time
                                  example: '2021-11-18T17:09:37+00:00'
                                pending:
                                  type: number
                                  description: |
                                    Number of applications that were pending at the polling time. 
                                  example: 0
                                running:
                                  type: number
                                  description: |
                                    Number of applications that were running at the polling time. 
                                  example: 0
        '400':
          description: Bad Request
  /ocean/spark/cluster/{clusterId}/statistics:
    summary: Ocean Spark
    get:
      summary: Cluster runtime statistics
      description: |
        Returns a summary of the cluster usage since a given date in the past.
      operationId: OceanSparkClusterStatistics
      tags:
        - Ocean Spark
      parameters:
        - *ref_6
        - *ref_9
        - *ref_11
      responses:
        '200':
          description: Runtime statistics for a given cluster.
          content:
            application/json:
              schema:
                allOf:
                  - *ref_4
                  - type: object
                    properties:
                      response:
                        type: object
                        description: |
                          response body
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - time
                                - pending
                                - running
                              description: |
                                Summary of a cluster's usage statistics.
                              properties:
                                id: *ref_7
                                metrics: &ref_23
                                  type: object
                                  description: Computed statistics about the performance and cost of Spark applications
                                  required:
                                    - cost
                                    - spark
                                  properties:
                                    cost:
                                      type: object
                                      description: The cloud cost of the Spark application. Updated every hour
                                      required:
                                        - total
                                        - createdAt
                                        - updatedAt
                                      properties:
                                        createdAt: &ref_12
                                          type: string
                                          format: date-time
                                          example: 2018-10-10T10:50:29.000+0000
                                          description: The field on which to sort. For now, we only support filtering on CREATED_AT.
                                        updatedAt: &ref_13
                                          type: string
                                          format: date-time
                                          example: 2018-10-10T10:50:29.000+0000
                                          description: The time when the entity was last updated
                                        total:
                                          type: integer
                                          description: The total cost of the Spark application in USD cents
                                          example: 0
                                    spark:
                                      type: object
                                      description: Computed statistics about the performance of the Spark application
                                      required:
                                        - inputDataBytes
                                        - outputDataBytes
                                        - sparkCoresDurationSeconds
                                        - efficiencyPercent
                                        - createdAt
                                        - updatedAt
                                      properties:
                                        createdAt: *ref_12
                                        updatedAt: *ref_13
                                        sparkCoresDurationSeconds:
                                          format: time-delta
                                          type: number
                                          description: |
                                            The total core resources used by the application. This metric is calculated as the sum over each container (driver or executor) of its uptime duration multiplied by the number of cores allocated to it.
                                        inputDataBytes:
                                          type: integer
                                          description: |
                                            The number of bytes read by Spark, typically from an object store.
                                        outputDataBytes:
                                          type: integer
                                          description: |
