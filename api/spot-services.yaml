openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Services
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@spot.io
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags:
  - name: Audit Service
    externalDocs:
      url: https://spec.dev.spot.io/#tag/Audit-Service
  - name: Health Check Service
    externalDocs:
      url: https://docs.flexera.com/spot/elastigroup/tools-integrations/custom-health-check-service
  - name: Notification Subscription Service
    description: |
      The Spot notification service enables you a fast, flexible, fully managed push notification service that lets you know about major events that happened in your Spot account.ֿ Spot Notifications makes it simple and cost-effective to get push notifications to your email address, HTTP, HTTPS or AWS SNS (Simple Notifications Service).

      > **Note**: This service is deprecated. Use the
      [Notification Center Service](https://spec.dev.spot.io/#tag/Notification-Center-Service).
  - name: Notification Center Service
    description: |
      Manage your compute notification policies. You can create new policies, apply updates, or delete the policy entirely.
  - name: Insights Service
paths:
  /aws/potentialSavings:
    get:
      summary: Potential Savings
      description: Describe Potential Savings for AWS resources like - ASG (Auto-scaling groups), Beanstalk, ELB, ECS, EMR and tagged instances. The response will provide Potential monthly savings in USD
      operationId: elastigroupAwsPotentialSavings
      tags:
        - Insights Service
      parameters:
        - in: query
          name: accountId
          example: act-123456789
          description: |
            ID of the account associated with your token
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Potential Savings Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          url:
                            type: string
                            example: /aws/ec2/group/sig-12345/suspension
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: GET
                            description: |
                              The HTTP **METHOD** used for the request
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:cs:aws:potentialSavings
                            description: |
                              The data type of each item in the response
                          items:
                            type: array
                            description: |
                              Array of data objects
                            items:
                              type: array
                              title: spotinst:cs:aws:potentialSavings
                              items:
                                type: object
                                properties:
                                  resourceType:
                                    type: string
                                    example: Auto Scaling Group
                                  name:
                                    type: string
                                    example: Prod_ASG
                                  region:
                                    type: string
                                    example: us-west-1
                                  instances:
                                    type: integer
                                    example: 5
                                  instanceTypes:
                                    type: string
                                    example:
                                      - c4.4xlarge
                                  potentialSavings:
                                    type: integer
                                    example: 2700
                          count:
                            type: integer
                            example: 1
                            description: |
                              Size of the data object array
        '400':
          description: Bad Request
  /aws/instancePotentialSavings:
    get:
      summary: Instances Potential Savings
      description: Describe potential savings for the listed instances. You can provide multiple instance IDs separated by a comma. The response will provide potential monthly savings in USD.
      operationId: elastigroupAwsInstancesPotentialSavings
      tags:
        - Insights Service
      parameters:
        - &ref_0
          in: query
          name: accountId
          example: act-123456789
          description: |
            The ID of the account associated with your token.
          schema:
            type: string
          required: true
        - in: query
          name: region
          example: us-east-1
          description: |
            The AWS Region
          schema:
            type: string
          required: true
        - in: query
          name: instanceIds
          example: i-1234567
          description: |
            The instance ID
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Instances Potential Savings Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          id:
                            type: string
                            example: ff3e1e5b-91b8-42fa-8267-b988efc7f662
                            description: |
                              Unique ID associated with this request
                          url:
                            type: string
                            example: /aws/instancePotentialSavings?instanceIds=i-08674ba9a6ddb73f4%2Ci-0973dc7a755d34894®ion=us-west-2
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: GET
                            description: |
                              The HTTP **METHOD** used for the request
                          timestamp:
                            type: string
                            example: '2015-06-29T13:01:55.060Z'
                            description: |
                              When the request was received by Spot
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:cs:aws:potentialSavings
                            description: |
                              The data type of each item in the response
                          items:
                            type: array
                            description: |
                              Array of data objects
                            items:
                              type: object
                              title: spotinst:cs:aws:potentialSavings
                              properties:
                                newSpotRequests:
                                  type: array
                                  items:
                                    type: object
                                  description: New Spot Requests
                                  example:
                                    - resourceType: EC2Instance
                                      name: i-12345abcde12345
                                      instances: 1
                                      instanceTypes:
                                        - t2.medium
                                      potentialSavings: 28
                                    - resourceType: EC2Instance
                                      name: i-0973dc7a755d34894
                                      instances: 1
                                      instanceTypes:
                                        - m4.large
                                      potentialSavings: 60
                          count:
                            type: integer
                            example: 2
                            description: |
                              Size of the data object array
        '400':
          description: Bad Request
  /aws/costs:
    get:
      summary: Get Costs per Account
      description: Retrieve costs up to one year back per specified account over a specified time period.
      operationId: awsCostsPerAccount
      tags:
        - Insights Service
      parameters:
        - in: query
          name: accountId
          example: act-123456789
          description: |
            ID of the account associated with your token
          schema:
            type: string
          required: false
        - in: query
          name: fromDate
          example: '2018-06-20'
          description: |
            Date can be either in ISO-8601 date format (yyyy-mm-dd) or in Unix Timestamp format (e.g. 1494751821472).
            *Minimum from date can be one year ago.
          schema:
            type: string
          required: false
        - in: query
          name: toDate
          example: '2018-11-20'
          description: |
            Date can be either in ISO-8601 date format (yyyy-mm-dd) or in Unix Timestamp format (e.g. 1494751821472).
            *Data is shown until the past day (Does not include today's costs)
          schema:
            type: string
          required: false
        - in: query
          name: aggregationPeriod
          example: daily
          description: |
            Optional. The time period over which data is aggregated. Can only be "daily". For example, the figures in each data set are per day
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Costs Per Account Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          id:
                            type: string
                            example: 67582d0c-108b-4ef7-9fdc-d39678a30844
                            description: |
                              Unique ID associated with this request
                          url:
                            type: string
                            example: /aws/costs
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: GET
                            description: |
                              The HTTP **METHOD** used for the request
                          timestamp:
                            type: string
                            example: '2018-01-07T07:30:58.622Z'
                            description: |
                              When the request was received by Spot
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:aws:costs
                            description: |
                              The data type of each item in the response
                          items:
                            type: array
                            description: |
                              Array of data objects
                            items:
                              type: array
                              title: spotinst:aws:ec2:group
                              items:
                                type: object
                                properties:
                                  timestamp:
                                    type: string
                                    example: '2020-03-06T00:00:00.000Z'
                                    description: Time
                                  spot:
                                    type: object
                                    properties:
                                      runningHours:
                                        type: number
                                        format: float
                                        example: 1470.8
                                      actualCosts:
                                        type: number
                                        format: float
                                        example: 107.3
                                      potentialCosts:
                                        type: number
                                        format: float
                                        example: 378.41
                                      savingsPercentage:
                                        type: number
                                        format: float
                                        example: 71.64
                          count:
                            type: integer
                            example: 1
                            description: |
                              Size of the data object array
        '400':
          description: Bad Request
  /aws/ec2/instanceTypeRecommendation:
    post:
      summary: Suggested Instance Type
      description: |-
        Get suggested instance types by required resources.
        Note that request must include region, and at least one of the following values - baselineInstanceType, requiredVCpu, requiredMemoryGib
      operationId: elastigroupAwsSuggestedInstanceType
      tags:
        - Insights Service
      parameters:
        - in: query
          name: accountId
          example: act-123abc
          description: |
            ID of the account associated with your token
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  title: spotinst:aws:ec2:instanceTypeRecommendation
                  properties:
                    requirements:
                      type: object
                      title: AWS Elastigroup
                      properties:
                        region:
                          type: string
                          description: Set valid AWS region
                          example: us-east-1
                        baselineInstanceType:
                          type: string
                          description: Set valid AWS instance type as baseline
                          example: m5.large
                        requiredVCpu:
                          type: object
                          description: Set required CPU resources by min / max
                          properties:
                            minimum:
                              type: integer
                              description: Minimum amount of VCpu
                              example: 2
                            maximum:
                              type: integer
                              description: Maximum amount of VCpu
                              example: 4
                        requiredMemoryGib:
                          type: object
                          description: Set required Memory (in Gib) resources by min / max
                          properties:
                            minimum:
                              type: integer
                              description: Minimum amount of Gib
                              example: 16
                            maximum:
                              type: integer
                              description: Maximum amount of Gib
                              example: 64
      responses:
        '200':
          description: Suggested Instance Type Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        description: |
                          Original request properties
                        properties:
                          id:
                            type: string
                            example: 0bb5db74-2457-4a34-b8f3-174e6bf5578e
                            description: |
                              Unique ID associated with this request
                          url:
                            type: string
                            example: /aws/ec2/instanceTypeRecommendation
                            description: |
                              The URL that was used for the request
                          method:
                            type: string
                            example: POST
                            description: |
                              The HTTP **METHOD** used for the request
                          timestamp:
                            type: string
                            example: '2016-06-19T08:41:57.516Z'
                            description: |
                              When the request was received by Spot
                      response:
                        type: object
                        description: |
                          Response package that includes, status, type and any relevant data.
                        properties:
                          status:
                            type: object
                            properties:
                              code:
                                type: integer
                                example: 200
                                description: |
                                  HTTP status code assigned to this response
                              message:
                                type: string
                                example: OK
                                description: |
                                  HTTP status message for the respective status code
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:aws:ec2:instanceTypeRecommendation
                            description: |
                              The data type of each item in the response
                          items:
                            type: array
                            description: |
                              Array of data objects
                            items:
                              type: object
                              example:
                                - instanceType: m4.large
                                - instanceType: m5.large
                          count:
                            type: integer
                            example: 2
                            description: |
                              Size of the data object array
        '400':
          description: Bad Request
  /azure/costs:
    get:
      summary: Get Costs Per Account
      description: |
        Get costs per time filter.
      operationId: azureCostsPerAccount
      tags:
        - Elastigroup Azure Scale Set VMs
      parameters:
        - *ref_0
        - in: query
          name: fromDate
          required: true
          description: |
            Get items on or after this date (ISO 8601 or Unix timestamp)
          schema:
            type: string
          example: 2020-09-01 or fromDate=1598918400000
        - in: query
          name: toDate
          required: true
          description: Get items on or before this date (ISO 8601 or Unix timestamp)
          schema:
            type: string
          example: 2020-09-01 or fromDate=1598918400000
      responses:
        '200':
          description: Costs Per Account Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 67582d0c-108b-4ef7-9fdc-d39678a30844
                          url:
                            type: string
                            example: /azure/costs
                          method:
                            type: string
                            example: GET
                          timestamp:
                            type: string
                            example: '2018-01-07T07:30:58.622Z'
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:azure:costs
                          items:
                            type: array
                            items:
                              type: object
                              title: spotinst:azure:costs
                              properties:
                                lowPriority:
                                  type: object
                                  properties:
                                    runningHours:
                                      type: number
                                      format: number
                                      example: 1470.8
                                    actualCosts:
                                      type: number
                                      format: number
                                      example: 107.3
                                    potentialCosts:
                                      type: number
                                      format: number
                                      example: 378.41
                                    savingsPercentage:
                                      type: number
                                      format: number
                                      example: 71.64
                          count:
                            type: integer
                            example: 1
        '400':
          description: Bad Request
  /gcp/gce/costs:
    get:
      summary: Get Costs Per Account
      description: Retrieve costs up to one year back per specified account over a specified time period.
      operationId: gcpCostsPerAccount
      tags:
        - Insights Service
      parameters:
        - in: query
          name: accountId
          example: act-12345678
          description: |
            The Spot account ID for which the cost information should be returned.
          schema:
            type: string
          required: false
        - in: query
          name: fromDate
          example: '2016-01-10T00:00:00.000Z'
          description: |
            * The start date of the requested time period. 
            * Date values following either a date format (YYYY-MM-DDTHH:mm:ss.SSSZ) or Unix milliseconds timestamp (1668078050004).
            * <a style=color:red>The value cannot be earlier than 1 year back.</a>
          schema:
            type: string
          required: false
        - in: query
          name: toDate
          example: '2016-01-10T01:00:00.000Z'
          description: |
            * The end date of the requested time period. 
            * Date values following either a date format (YYYY-MM-DDTHH:mm:ss.SSSZ) or Unix milliseconds timestamp (1668078050004).
            * <a style=color:red>The maximum of time period length is 90 days.</a>
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Costs Per Account Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 67582d0c-108b-4ef7-9fdc-d39678a30844
                          url:
                            type: string
                            example: /gcp/gce/costs
                          method:
                            type: string
                            example: GET
                          timestamp:
                            type: string
                            example: '2016-01-10T01:00:00.000Z'
                      response:
                        type: object
                        properties:
                          kind:
                            type: string
                            example: spotinst:gcp:costs
                          items:
                            type: array
                            items:
                              type: object
                              title: spotinst:gcp:costs
                              properties:
                                preemptible:
                                  type: object
                                  properties:
                                    runningHours:
                                      description: The sum of preemptible running hours.
                                      type: number
                                      format: number
                                      example: 1470.8
                                    actualCosts:
                                      description: The actual cost of the preemptible instances.
                                      type: number
                                      format: number
                                      example: 107.3
                                    potentialCosts:
                                      description: The OD cost of the running preemptible instances.
                                      type: number
                                      format: number
                                      example: 378.41
                                    savingsPercentage:
                                      description: The total savings percentage.
                                      type: number
                                      format: number
                                      example: 71.64
                          count:
                            type: integer
                            example: 1
        '400':
          description: Bad Request
  /audit/events:
    get:
      summary: List Audit Log Events
      description: |
        Gets audit events that have response status of 200. This is the default when the responseStatus parameter is not included in the query. When you use responseStatus in the query, you can get all audit events without regard to status.

        The API requires one of the following permissions to be defined in Spot:

        * Permission: Organization Viewer (See User Roles) or
        * Action: setup:describeAllAuditEvents (See Access Policies)
      operationId: AuditServiceListAll
      tags:
        - Audit Service
      parameters:
        - in: query
          name: fromDate
          required: true
          description: Get items on or after this date (Unix timestamp)
          example: '1598918400000'
          schema:
            type: string
            format: string
        - in: query
          name: toDate
          required: true
          description: Get items on or before this date (Unix timestamp)
          example: '1598918400000'
          schema:
            type: string
            format: string
        - in: query
          name: accountId
          example: act-123abc
          description: |
            ID of the account associated with your token
          schema:
            type: string
          required: false
        - in: query
          name: responseStatus
          example: all
          description: |
            Determines whether the audit events should be filtered by their response status code or not. Valid values: "success": Gets only events with status 200. "all": Audit events will not be filtered by response status codes, and all the events will be returned. Default: success
          schema:
            type: string
          required: false
      responses:
        '200':
          description: All Response Statuses (responseStatus=all)
          content:
            application/json:
              schema:
                allOf:
                  - &ref_1
                    type: object
                    allOf:
                      - &ref_3
                        type: object
                        properties:
                          request:
                            type: object
                            description: |
                              Original request properties.
                            properties:
                              id:
                                type: string
                                example: e593ff58-067d-4340-92f9-8b1c0bad70d7
                                description: |
                                  Unique identifier associated with this request.
                              url:
                                type: string
                                description: |
                                  The URL that was used for the request.
                              method:
                                type: string
                                description: |
                                  The HTTP **METHOD** used for the request.
                              timestamp:
                                type: string
                                example: '2018-06-20T11:35:01.745Z'
                                description: |
                                  When the request was received by Spot.
                          response:
                            type: object
                            description: |
                              Response package that includes status, type, and any relevant data.
                            properties:
                              status:
                                type: object
                                properties:
                                  code:
                                    type: integer
                                    example: 200
                                    description: |
                                      HTTP status code assigned to this response.
                                  message:
                                    type: string
                                    example: OK
                                    description: |
                                      HTTP status message for the respective status code.
                      - type: object
                        properties:
                          response:
                            type: object
                            properties:
                              count:
                                type: integer
                                example: 1
                                description: |
                                  Size of the data object array.
                              kind:
                                type: string
                                description: |
                                  The data type of each item in the response.
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                user:
                                  type: string
                                  example: test@spot.io
                                namespace:
                                  type: string
                                  example: GENERAL
                                actionType:
                                  type: string
                                  example: Sign in with SSO
                                resourceType:
                                  type: string
                                  example: User
                                resourceId:
                                  type: string
                                  example: 21126
                                createdAt:
                                  type: string
                                  example: '2020-06-01T12:17:51.000Z'
                                context:
                                  type: string
                                  example: '{"body":{"email":"test@spot.io","isMarketplaceCustomer":false},"url":"/signIn/sso","query":{}}'
                                source:
                                  type: string
                                  example: UI
                                agent:
                                  type: string
                                  example: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_13_6) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/33.9.1667.012 Safari/537.36
                                responseStatus:
                                  type: integer
                                  example: 200
                          kind:
                            example: spotinst:audit
        '400':
