                              items:
                                type: string
                              example: &ref_83
                                - c3.2xlarge
                                - c4.2xlarge
                            rootVolumeSize:
                              type: integer
                              description: |
                                Set root volume size (in GB). This field and blockDeviceMappings cannot be used in the same specification.
                              example: 8
