                  title: Roll with instance ids
                  properties:
                    roll:
                      allOf:
                        - *ref_50
                        - *ref_51
                        - *ref_52
                        - *ref_53
                        - type: object
                          properties:
                            instanceIds:
                              type: array
                              description: |
                                List of instance identifiers to be rolled. Each identifier is a string. InstanceIds can be null, and cannot be used together with launchSpecIds.
                              items:
