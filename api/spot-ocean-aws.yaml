    summary: Ocean for AWS
    post:
      summary: Initiate Roll
      description: |
        Roll an entire Ocean cluster or roll subsets of the cluster by specifying launchSpecIds or instanceIds. Performing this request will start the roll immediately and run it in defined batches.
        Note that the first response for a successful request will indicate the start of a roll. In order to check the status of a roll, you can use the GET Roll API.
      operationId: oceanAwsRollInit
      tags:
        - Ocean AWS
      parameters:
        - *ref_22
        - *ref_25
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Roll
                  properties:
                    roll:
                      allOf:
                        - &ref_50
                          type: object
                          properties:
                            batchSizePercentage:
                              type: integer
                              description: |
                                Value as a percent to set the size of a batch in a roll. Valid values are 0-100.
                              example: 20
                        - &ref_51
                          type: object
                          properties:
                            comment:
                              type: string
                              description: |
                                Add a comment description for the roll. The comment is limited to 256 chars.
                              example: This is why I deployed my cluster.
                        - &ref_52
                          type: object
                          properties:
                            respectPdb:
                              type: boolean
                              description: |
                                During the roll, if the parameter is set to true we honor PDB during the instance replacement.
                              example: true
                              default: false
                        - &ref_53
                          type: object
                          properties:
                            batchMinHealthyPercentage:
                              type: integer
                              description: |
                                Indicates the threshold of minimum healthy instances in single batch. If the amount of healthy instances in single batch is under the threshold, the cluster roll will fail. If exists, the parameter value will be in range of 1-100. In case of null as value, the default value in the backend will be 50%. Value of param should represent the number in percentage (%) of the batch.
                              example: 100
                              default: 50
