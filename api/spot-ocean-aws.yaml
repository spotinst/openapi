openapi: 3.0.0
info:
  version: '1.0'
  description: |
    Welcome to the Spot by Flexera OpenAPI Specification.
    Here you will find REST definitions for all Spot products and platform administration tasks.

    The API is hosted at `https://api.spotinst.io` and requires Bearer Token
    Authentication.

    For more information on how to use the Spot platform, including user guides,
    developer guides, concepts, and tutorials, see the external [Spot Documentation](https://docs.flexera.com/spot/).
  title: Spot by Flexera API - Ocean AWS
  x-logo:
    url: https://spec.dev.spot.io/flexera-spot.png
    altText: SpotByFlexeraLogo
    href: https://spec.dev.spot.io
  contact:
    email: support@spot.io
servers:
  - url: https://api.spotinst.io
security:
  - auth: []
components:
  securitySchemes:
    auth:
      description: |
        To generate bearer tokens and understand more about Spot by Flexera
        authentication see the howto for
        [token creation](https://docs.flexera.com/spot/administration/api/create-api-token)
        on the Spot Help site.

        ### Organizations and Accounts

        Each Spot account is assigned to an organization and a set of environment Accounts.
        An account is then linked to a specific cloud provider account.

        Spot accounts are given an ID in the format `act-123abcd` that is sent as a query parameter while performing API calls.

        To locate the account ID navigate to Settings -> Account in the Spot console.

        ### Organizations with a Single Account
        Each API call you make can be used with or without the account ID.

        ### Organizations with Multiple Accounts
        Each API call you make should be appended to the account ID. For example:

        GET `https://api.spotinst.io/aws/ec2/group?accountId=act-123de678`
        This call will return the list of Elastigroups for the specific Account used.

        > NOTE: If no `accountId` is provided, the default (dldest) account for the Organization will be used.
      type: http
      scheme: bearer
    authWithoutAccount:
      description: |
        To generate bearer tokens and learn more about Spot by Flexera
        authentication, see [token creation](https://docs-spot.flexera.com/administration/api/create-api-token).
      type: http
      scheme: bearer
tags:
  - name: Ocean AWS
    description: Ocean - Serverless containers for Amazon Web Services (AWS)
    externalDocs:
      description: Ocean Concepts and Tutorials
      url: https://docs.flexera.com/spot/ocean/
paths:
  /ocean/aws/k8s/cluster:
    summary: Ocean for AWS
    post:
      summary: Create Cluster
      description: |
        **Prerequisites**

        The Ocean Controller is used to monitor the cluster resources and report back to Ocean. The Ocean Controller is required for Ocean Cloud.<br />

        To install the Ocean Controller, complete and run the following script on a machine with the kubectl command line tool installed and configured:

        ```
        #!/usr/bin/env bash
        curl -fsSL http://spotinst-public.s3.amazonaws.com/integrations/kubernetes/cluster-controller/scripts/init.sh | \
        SPOTINST_TOKEN=<ENTER YOUR TOKEN HERE> \
        SPOTINST_ACCOUNT=<ENTER YOUR SPOTINST ACCOUNT ID HERE> \
        SPOTINST_CLUSTER_IDENTIFIER=<ENTER YOUR CLUSTER IDENTIFIER HERE> \
        bash
        ```
      operationId: OceanAWSClusterCreate
      tags:
        - Ocean AWS
      parameters:
        - &ref_1
          in: query
          name: accountId
          example: act-123456789
          description: |
            The ID of the account associated with your token.
          schema:
            type: string
          required: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - cluster
                  properties:
                    cluster: &ref_0
                      type: object
                      description: |
                        The object specifying the configuration of the Ocean cluster.
                      title: AWS Cluster
                      required:
                        - name
                        - region
                        - controllerClusterId
                        - compute
                      properties:
                        id:
                          type: string
                          readOnly: true
                          description: |
                            The Ocean cluster identifier.
                          example: o-abcd1234
                        name:
                          type: string
                          example: oceanName
                          description: |
                            Add a name for the Ocean cluster.
                        controllerClusterId:
                          type: string
                          example: ocean.k8s
                          description: |
                            Enter the reporting identifier for the Ocean Controller.
                        region:
                          type: string
                          example: us-east-1
                          description: |
                            Select the region for the Ocean cluster to run in.
                        autoScaler:
                          type: object
                          title: auto-scaler
                          description: The automatic scaling mechanism used in Ocean for Kubernetes.
                          properties:
                            isEnabled:
                              type: boolean
                              description: Enable the Ocean Kubernetes autoscaler.
                              default: true
                              example: true
                            cooldown:
                              type: integer
                              description: A period of time (in seconds) that Ocean waits from the end of a scaling action until starting another scaling action.
                              default: null
                              example: 180
                            resourceLimits:
                              type: object
                              description: Option to set upper and lower bounds on the resource usage of the cluster.
                              properties:
                                maxMemoryGib:
                                  type: integer
                                  description: The maximum memory (in GiB) that can be allocated to the cluster.
                                  example: 1500
                                maxVCpu:
                                  type: integer
                                  description: The maximum CPU (in vCPU units) that can be allocated to the cluster.
                                  example: 750
                            down:
                              type: object
                              description: Autoscaling scale down operations.
                              properties:
                                evaluationPeriods:
                                  type: integer
                                  deprecated: true
                                  description: |
                                    Deprecated — no longer used.
                                maxScaleDownPercentage:
                                  type: integer
                                  description: Represents the maximum percent of your instances to scale down in a single scale-down action. Number between 1-100.
                                  example: 60
                                aggressiveScaleDown:
                                  type: object
                                  description: Enable and configure the Accelerated Scale Down feature to allow the Ocean autoscaler to immediately scale down eligible nodes without any waiting period.
                                  properties:
                                    isEnabled:
                                      type: boolean
                                      description: When set to 'true', Accelerated Scale Down is enabled.
                                      default: false
                            headroom:
                              type: object
                              description: Spare resource capacity management enabling fast assignment of pods without waiting for new resources to launch.
                              properties:
                                cpuPerUnit:
                                  type: integer
                                  description: Option to configure the number of CPUs to allocate the headroom. CPUs are denoted in millicores, where 1000 millicores = 1 vCPU.
                                  example: 2000
                                memoryPerUnit:
                                  type: integer
                                  description: Option to configure the amount of memory (MiB) to allocate the headroom.
                                  example: 0
                                gpuPerUnit:
                                  type: integer
                                  description: Amount of GPU to allocate for headroom.
                                  example: 0
                                numOfUnits:
                                  type: integer
                                  description: The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                  example: 4
                            isAutoConfig:
                              type: boolean
                              description: Use automatic headroom. When set to true, the values under cluster.autoScaler.headroom are not effective, as Ocean configures and optimizes headroom automatically.
                              default: true
                              example: false
                            autoHeadroomPercentage:
                              type: integer
                              description: Dynamic (automatic) buffer of spare capacity, i.e., vCPU, memory, and GPU resources. Expressed as a percent of the overall cluster capacity with valid values from 0-200. Optional. Relevant when isAutoConfig=true.
                              example: null
                            enableAutomaticAndManualHeadroom:
                              type: boolean
                              description: |
                                When set to true, both automatic and per-VNG manual headroom to be saved concurrently and independently in the cluster. prerequisite: isAutoConfig must be true
                              example: true
                            extendedResourceDefinitions:
                              type: array
                              description: |
                                List of Ocean extended resource definitions to use in this cluster.
                              items:
                                type: string
                              example:
                                - erd-123
                                - erd-456
                        capacity:
                          type: object
                          title: Capacity Units
                          description: The overall capability of the Ocean cluster expressed as number of instances and specified with a minimum, a maximum, and a target number of running instances.
                          properties:
                            minimum:
                              type: integer
                              example: 0
                              description: |
                                The lower limit of instances that the cluster can scale down to.
                            maximum:
                              type: integer
                              default: 1000
                              example: 1000
                              description: |
                                The upper limit of instances that the cluster can scale up to.
                            target:
                              type: integer
                              example: 1
                              description: |
                                Number of instances to launch and maintain in the cluster.
                        strategy: &ref_5
                          type: object
                          title: Ocean Cluster Strategy
                          description: |
                            An object defining the cluster strategy with regard to waiting periods and utilization of on-demand and reserved instances.
                          properties:
                            utilizeReservedInstances:
                              type: boolean
                              default: true
                              example: true
                              description: |
                                If reserved instances exist, Ocean will utilize them before launching spot instances.
                            fallbackToOd:
                              type: boolean
                              default: true
                              example: true
                              description: |
                                If no spot instance markets are available, enable Ocean to launch on-demand instances instead.
                            spotPercentage:
                              type: integer
                              default: 100
                              minimum: 0
                              maximum: 100
                              description: |
                                The desired percentage of Spot instances out of all running instances.\
                                Only available when the field is **not** set in any VNG directly (launchSpec.strategy.spotPercentage).
                              example: 100
                            maxReplacementLimitPercentage:
                              type: integer
                              default: 10
                              minimum: 1
                              maximum: 100
                              description: |
                                Limits the percentage of instances that can be replaced at once during a run cycle.
                              example: 25
                            gracePeriod:
                              type: integer
                              default: 300
                              example: 300
                              description: |
                                The amount of time, in seconds, from the time the instance has launched to the time its first health check starts.
                            drainingTimeout:
                              type: integer
                              example: 60
                              description: |
                                The configurable amount of time that Ocean will wait for the draining process to complete before terminating an instance. If you have not defined a draining timeout, the default of 300 seconds will be used.
                            utilizeCommitments:
                              type: boolean
                              description: |
                                If savings plans commitment has available capacity, Ocean will utilize them alongside RIs (if exist) to maximize cost efficiency.
                              example: false
                              default: false
                            clusterOrientation:
                              type: object
                              properties:
                                availabilityVsCost:
                                  type: string
                                  description: |
                                    You can control the approach that Ocean takes while launching nodes by configuring this value.
                                  enum:
                                    - costOriented
                                    - balanced
                                    - cheapest
                                  example: balanced
                                  default: balanced
                            spreadNodesBy:
                              type: string
                              description: |
                                Ocean will spread the nodes across markets by this value.
                              enum:
                                - vcpu
                                - count
                              example: count
                              default: count
                        scheduling: &ref_6
                          type: object
                          description: |
                            An object used to define times for a task such as a shutdown to be activated.
                          title: Elastigroup Scheduling
                          properties:
                            tasks:
                              type: array
                              items:
                                type: object
                                title: Task Definition
                                required:
                                  - isEnabled
                                  - taskType
                                  - parameters
                                properties:
                                  isEnabled:
                                    type: boolean
                                    example: true
                                    description: |
                                      Describes whether the task is enabled. When True, the task runs. When False, it does not run. Required for cluster.scheduling.tasks.
                                  cronExpression:
                                    type: string
                                    example: 0 1 * * *
                                    description: |
                                      A valid cron expression. For example : " * * * * * ". The cron job runs in UTC time and is in Unix cron format (See the Cron Expression Validator Script). Required field for taskType "clusterRoll", optional field for taskType "amiAutoUpdate" (if Cron Expression is not provided for amiAutoUpdate task, the task will run once a day).
                                  taskType:
                                    type: string
                                    example: clusterRoll
                                    enum:
                                      - clusterRoll
                                      - amiAutoUpdate
                                    description: |
                                      The activity that you are scheduling. Valid values: "clusterRoll", "amiAutoUpdate". Required for cluster.scheduling.tasks.
                                  parameters:
                                    type: object
                                    description: |
                                      This field will be compatible to the task type field. 
                                      If taskType is defined as "clusterRoll", use cluster roll object in parameters.
                                    properties:
                                      clusterRoll:
                                        type: object
                                        properties:
                                          batchSizePercentage:
                                            type: integer
                                            minimum: 0
                                            maximum: 100
                                            example: 20
                                            description: |
                                              Value as a percent to set the size of a batch in a roll. Valid values are 0-100.
                                          comment:
                                            type: string
                                            example: This is why I deployed my cluster.
                                            description: |
                                              Add a comment description for the roll. The comment is limited to 256 chars
                                          batchMinHealthyPercentage:
                                            type: integer
                                            minimum: 1
                                            maximum: 100
                                            default: 50
                                            example: 100
                                            description: |
                                              Indicates the threshold of minimum healthy instances in single batch. If the amount of healthy instances in single batch is under the threshold, the cluster roll will fail. If exists, the parameter value will be in range of 1-100. In case of null as value, the default value in the backend will be 50%. Value of param should represent the number in percentage (%) of the batch.
                                          respectPdb:
                                            type: boolean
                                            description: |
                                              During the roll, if the parameter is set to true we honor PDB during the instance replacement.
                                            example: true
                                            default: false
                                      amiAutoUpdate:
                                        type: object
                                        properties:
                                          patch:
                                            type: boolean
                                            description: |
                                              When set to 'true', the auto-update process will update the VNGs’ images with the latest security patches. either "patch" or "minorVersion" must be true.
                                            example: true
                                            default: false
                                          minorVersion:
                                            type: boolean
                                            example: true
                                            default: false
                                            description: |
                                              When set to 'true', the auto-update process will update the VNGs’ AMI with the AMI to match the Kubernetes control plane version. either "patch" or "minorVersion" must be true.
                                          applyRoll:
                                            type: boolean
                                            example: true
                                            default: false
                                            description: |
                                              This parameter is optional. When the AMI is updated according to the configuration set, a cluster roll can be triggered.
                                          clusterRoll:
                                            type: object
                                            properties:
                                              batchSizePercentage:
                                                type: integer
                                                minimum: 0
                                                maximum: 100
                                                example: 20
                                                description: |
                                                  Value as a percent to set the size of a batch in a roll. Valid values are 0-100.
                                              comment:
                                                type: string
                                                example: This is why I deployed my cluster.
                                                description: |
                                                  Add a comment description for the roll. The comment is limited to 256 chars
                                              batchMinHealthyPercentage:
                                                type: integer
                                                minimum: 1
                                                maximum: 100
                                                default: 50
                                                example: 100
                                                description: |
                                                  Indicates the threshold of minimum healthy instances in single batch. If the amount of healthy instances in single batch is under the threshold, the cluster roll will fail. If exists, the parameter value will be in range of 1-100. In case of null as value, the default value in the backend will be 50%. Value of param should represent the number in percentage (%) of the batch.
                                              respectPdb:
                                                type: boolean
                                                description: |
                                                  During the roll, if the parameter is set to true we honor PDB during the instance replacement.
                                                example: true
                                                default: false
                            shutdownHours:
                              type: object
                              description: |
                                An object used to specify times that the nodes in the cluster will be taken down.
                              title: Shutdown Hours
                              required:
                                - timeWindows
                              properties:
                                timeWindows:
                                  type: array
                                  description: |
                                    The times that the shutdown hours will apply.
                                  items:
                                    type: string
                                    example: Sat:08:00-Sun:08:00
                                isEnabled:
                                  type: boolean
                                  example: true
                                  description: |
                                    Flag to enable or disable the shutdown hours mechanism. When False, the mechanism is deactivated, and the cluster remains in its current state.
                            optimizationWindows: &ref_20
                              type: object
                              description: |
                                An object used to specify time windows during which certain optimization constraints can be eased.
                              title: Optimization Windows
                              required:
                                - isEnabled
                              properties:
                                isEnabled:
                                  type: boolean
                                  example: true
                                  description: |
                                    Used to enable or disable the optimization windows mechanism. Must be a boolean (null is invalid). When true, at least one window must be defined. When false, windows can be empty or omitted.
                                windows:
                                  type: array
                                  description: |
                                    The times when the optimization windows will apply. Required if isEnabled is true.
                                  items:
                                    type: object
                                    title: Optimization Window Definition
                                    required:
                                      - cronExpression
                                      - duration
                                      - effects
                                    properties:
                                      cronExpression:
                                        type: string
                                        example: 0 0 * * *
                                        description: |
                                          A valid cron expression defining when the optimization window starts. For example: "0 0 * * *" (daily at midnight). The cron job runs in UTC time and follows Unix cron format.
                                      duration:
                                        type: string
                                        example: 8h
                                        description: |
                                          The duration of the optimization window. Must be in the format <number><unit> where unit is 'm' (minutes), 'h' (hours), or 'd' (days). Examples: 10m, 5h, 2d.
                                      effects:
                                        type: array
                                        minItems: 1
                                        description: |
                                          The list of effects that will be applied during this optimization window.
                                        items:
                                          type: string
                                          enum:
                                            - ignorePdb
                                            - ignoreRestrictScaleDown
                                        example:
                                          - ignorePdb
                                          - ignoreRestrictScaleDown
                        security: &ref_7
                          type: object
                          title: Security
                          description: |
                            Object for cluster security features.
                          properties:
                            containerImage:
                              type: object
                              properties:
                                approvedImages:
                                  type: array
                                  description: Set a permitted list of repositories for container images.
                                  items:
                                    type: string
                                    example:
                                      - '*.ecr.*.amazonaws.com/*'
                                      - docker.*
                        compute: &ref_8
                          type: object
                          title: Ocean Compute
                          description: |
                            Compute specifications for the Ocean cluster.
                          required:
                            - subnetIds
                            - launchSpecification
                          properties:
                            subnetIds:
                              type: array
                              description: |
                                A comma-separated list of subnet identifiers for the Ocean cluster. Subnet identifiers should be configured with auto-assign public IP.
                              items:
                                type: string
                              example:
                                - subnet-4c1d1538
                                - subnet-2791bb61
                            instanceTypes:
                              type: object
                              description: The type of instances that may or may not be a part of the Ocean cluster.
                              properties:
                                whitelist:
                                  type: array
                                  description: |
                                    Instance types allowed in the Ocean cluster. Cannot be configured if a deny list is configured.
                                  items:
                                    type: string
                                  example:
                                    - c4.xlarge
                                    - c4.2xlarge
                                    - c4.4xlarge
                                    - c4.8xlarge
                                blacklist:
                                  type: array
                                  description: |
                                    Instance types to avoid launching in the Ocean cluster. Cannot be configured if a permit list is configured.
                                  items:
                                    type: string
                                  example:
                                    - r5.large
                                    - r5.xlarge
                                filters: &ref_12
                                  type: object
                                  description: |
                                    List of filters. The Instance types that match with all filters compose the Ocean's whitelist parameter.  Cannot be configured together with whitelist/blacklist.
                                  title: InstanceTypesFilters
                                  properties:
                                    minVcpu:
                                      type: integer
                                      description: |
                                        Minimum number of vcpus available.
                                      minimum: 0
                                      example: 2
                                    maxVcpu:
                                      type: integer
                                      description: |
                                        Maximum number of vcpus available.
                                      minimum: 1
                                      example: 16
                                    minMemoryGiB:
                                      type: number
                                      format: double
                                      description: |
                                        Minimum amount of Memory (GiB).
                                      minimum: 0
                                      example: 8
                                    maxMemoryGiB:
                                      type: number
                                      format: double
                                      description: |
                                        Maximum amount of Memory (GiB).
                                      minimum: 0
                                      example: 16
                                    minGpu:
                                      type: integer
                                      description: |
                                        Minimum total number of GPUs.
                                      minimum: 0
                                      example: 0
                                    maxGpu:
                                      type: integer
                                      description: |
                                        Maximum total number of GPUs.
                                      minimum: 1
                                      example: 4
                                    includeFamilies:
                                      type: array
                                      description: |
                                        Types belonging to a family from the IncludeFamilies will be available for scaling (asterisk wildcard is also supported). For example, C* will include instance types from these families: c5, c4, c4a, etc.
                                      items:
                                        type: string
                                      example:
                                        - c5*
                                        - g5
                                    excludeFamilies:
                                      type: array
                                      description: |
                                        Types belonging to a family from the ExcludeFamilies will not be available for scaling (asterisk wildcard is also supported). For example, C* will exclude instance types from these families: c5, c4, c4a, etc.
                                      items:
                                        type: string
                                      example:
                                        - t2
                                        - R4*
                                    excludeMetal:
                                      type: boolean
                                      default: false
                                      description: |
                                        In case excludeMetal is set to true, metal types will not be available for scaling.
                                      example: true
                                    isEnaSupported:
                                      type: boolean
                                      description: |
                                        Ena is supported or not.
                                      example: true
                                    architectures:
                                      type: array
                                      description: |
                                        The filtered instance types will support at least one of the architectures from this list.
                                      items:
                                        type: string
                                        enum:
                                          - i386
                                          - x86_64
                                          - arm64
                                      example:
                                        - i386
                                        - x86_64
                                    virtualizationTypes:
                                      type: array
                                      description: |
                                        The filtered instance types will support at least one of the virtualization types from this list.
                                      items:
                                        type: string
                                        enum:
                                          - hvm
                                          - paravirtual
                                      example:
                                        - hvm
                                    categories:
                                      type: array
                                      description: |
                                        The filtered instance types will belong to one of the categories types from this list.
                                      items:
                                        type: string
                                        enum:
                                          - Accelerated_computing
                                          - Compute_optimized
                                          - General_purpose
                                          - Memory_optimized
                                          - Storage_optimized
                                      example:
                                        - Accelerated_computing
                                        - Compute_optimized
                                    minEnis:
                                      type: integer
                                      description: |
                                        Minimum number of network interfaces (ENIs).
                                      minimum: 0
                                      example: 2
                                    diskTypes:
                                      type: array
                                      description: |
                                        The filtered instance types will have one of the disk type from this list.
                                      items:
                                        type: string
                                        enum:
                                          - NVMe
                                          - EBS
                                          - SSD
                                          - HDD
                                      example:
                                        - NVMe
                                        - EBS
                                    hypervisor:
                                      type: array
                                      description: |
                                        The filtered instance types will have a hypervisor type from this list.
                                      items:
                                        type: string
                                        enum:
                                          - nitro
                                          - xen
                                      example:
                                        - nitro
                                    rootDeviceTypes:
                                      type: array
                                      description: |
                                        The filtered instance types will have a root device types from this list.
                                      items:
                                        type: string
                                        enum:
                                          - ebs
                                          - instance-store
                                      example:
                                        - ebs
                                    minNetworkPerformance:
                                      type: integer
                                      description: |
                                        Minimum Bandwidth in Gib/s of network performance.
                                      minimum: 0
                                      example: 2
                                    maxNetworkPerformance:
                                      type: integer
                                      description: |
                                        Maximum Bandwidth in Gib/s of network performance.
                                      minimum: 1
                                      example: 20
                                    minInstancePrice:
                                      type: number
                                      format: double
                                      description: |
                                        Minimum Price of On-Demand instance type.
                                      minimum: 0
                                      example: 2
                                    maxInstancePrice:
                                      type: number
                                      format: double
                                      description: |
                                        Maximum Price of On-Demand instance type.
                                      exclusiveMinimum: true
                                      minimum: 0
                                      example: 20
                                    includeGenerations:
                                      type: array
                                      description: |
                                        Types belonging to a Generation from the IncludeGenerations will be available for scaling.
                                      items:
                                        type: string
                                      example:
                                        - '6'
                                        - '7'
                                    excludeGenerations:
                                      type: array
                                      description: |
                                        Types Not belonging to a Generation from the ExcludeGenerations will be available for scaling.
                                      items:
                                        type: string
                                      example:
                                        - '1'
                                        - '2'
                                    encryptionInTransitSupported:
                                      type: boolean
                                      description: |
                                        encryptionInTransitSupported is supported or not.
                                      example: true
                            launchSpecification:
                              type: object
                              description: |
                                The default specification for nodes in the cluster. Used as a template for custom Virtual Node Groups to inherit values which are not explicitly defined in them, and as a default VNG when no other VNGs exist or match the workload requirements.
                              required:
                                - imageId
                                - securityGroupIds
                              properties:
                                useAsTemplateOnly:
                                  type: boolean
                                  description: |
                                    The configuration specified on the Ocean object will function only as a template for virtual node groups.
                                  default: false
                                imageId:
                                  type: string
                                  description: identifier of the image used to launch the instances.
                                userData:
                                  type: string
                                  format: byte
                                  description: The base 64 encoded MIME user data to make available to the instances.
                                securityGroupIds:
                                  type: array
                                  description: One or more security group identifiers.
                                  items:
                                    type: string
                                    example:
                                      - sg-c3d914b0
                                iamInstanceProfile:
                                  type: object
                                  description: The instance profile iamRole.
                                  properties:
                                    arn:
                                      type: string
                                      description: The iamRole ARN.
                                      example: orform
                                blockDeviceMappings:
                                  type: array
                                  description: |
                                    Block devices that are exposed to the instance. You can specify virtual devices and EBS volumes.\
                                    This parameter and rootVolumeSize cannot be in the specification at the same time.\
                                    This parameter can be null. If not null, it must contain at least one block device.
                                  items:
                                    type: object
                                    properties:
