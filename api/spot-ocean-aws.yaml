                                - subnet-123
                                - subnet-456
                            elasticIpPool:
                              type: object
                              description: |
                                Assign an Elastic IP to the instances launched by the Virtual Node Group. Can be null.
                              properties:
                                tagSelector:
                                  type: object
                                  required:
                                    - tagKey
                                  description: |
                                    Key-value object, which defines an Elastic IP from the customer pool. Can be null.
                                  properties:
                                    tagKey:
                                      type: string
                                      description: |
                                        Elastic IP tag key. The Virtual Node Group will consider all elastic IPs tagged with this tag as a part of the elastic IP pool to use.
                                      example: color
                                    tagValue:
                                      type: string
                                      description: |
                                        Elastic IP tag value. Can be null.
                                      example: orange
                                  example:
                                    tagKey: color
                                    tagValue: orange
                              example: &ref_87
                                tagSelector:
                                  tagKey: color
                                  tagValue: orange
                            autoScale:
                              type: object
                              description: |
                                Object specifying the automatic scaling of an Ocean VNG.
                              properties:
                                headrooms:
                                  description: |
                                    Specify the custom headroom per VNG. Provide a list of headroom objects.
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      cpuPerUnit:
                                        description: |
                                          Configure the number of CPUs to allocate the headroom. CPUs are denoted in millicores, where 1000 millicores = 1 vCPU.
                                        type: integer
                                        example: 1024
                                      memoryPerUnit:
                                        description: |
                                          Configure the amount of memory (MiB) to allocate the headroom.
                                        type: integer
                                        example: 512
                                      numOfUnits:
                                        description: |
                                          The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                        type: integer
                                        example: 2
                                      gpuPerUnit:
                                        type: integer
                                        description: |
                                          Amont of GPU to allocate for headroom unit.
                                        example: 0
                                    example:
                                      cpuPerUnit: 1024
                                      memoryPerUnit: 512
                                      numOfUnits: 2
                                      gpuPerUnit: 0
                                autoHeadroomPercentage:
                                  type: integer
                                  minimum: 0
                                  maximum: 200
                                  description: |
                                    Control the headroom % of the specific Virtual Node Group. Effective when cluster.autoScaler.isAutoConfig=true is set on the Ocean cluster.
                                  example: 20
                                down:
                                  type: object
                                  description: |
                                    Autoscaling scale down operations.
                                  properties:
                                    maxScaleDownPercentage:
                                      type: number
                                      format: double
                                      minimum: 0.1
                                      maximum: 100
                                      description: |
                                        The maximum percentage allowed to scale down in a single scaling action on the nodes running in a specific VNG. Allowed only if maxScaleDownPercentage is set to null at the cluster level.
                                      example: 30
                                    aggressiveScaleDown:
                                      type: object
                                      description: Enable and configure the Accelerated Scale Down feature to allow the Ocean autoscaler to immediately scale down eligible nodes without any waiting period.
                                      properties:
                                        isEnabled:
                                          type: boolean
                                          description: When set to 'true', Accelerated Scale Down is enabled.
                                          default: false
                                  example:
                                    maxScaleDownPercentage: 30
                              example: &ref_88
                                headrooms:
                                  - cpuPerUnit: 1024
                                    memoryPerUnit: 512
                                    numOfUnits: 2
                                    gpuPerUnit: 0
                                autoHeadroomPercentage: 20
                                down:
                                  maxScaleDownPercentage: 30
                            tags:
                              type: array
                              description: |
                                List of kay-value pairs of tags.
                              items:
                                type: object
                                properties:
                                  tagKey:
                                    type: string
                                    description: |
                                      Set the tag key.
                                    example: Creator
                                  tagValue:
                                    type: string
                                    description: |
                                      Set the tag value.
                                    example: John Doe
                                example: &ref_89
                                  tagKey: Creator
                                  tagValue: John Doe
                            blockDeviceMappings:
                              type: array
                              description: |
                                Block devices that are exposed to the instance. You can specify virtual devices and EBS volumes.\
                                This parameter and rootVolumeSize cannot be in the spec at the same time.\
                                This parameter can be null, but if not null, it must contain at least one block device.
                              items:
                                type: object
                                properties:
                                  deviceName:
                                    type: string
                                    description: |
                                      Set device name.
                                    example: /dev/xvda
                                  ebs:
                                    type: object
                                    description: |
                                      Set EBS properties.
                                    properties:
                                      throughput:
                                        type: integer
                                        minimum: 125
                                        maximum: 1000
                                        example: 125
                                        description: |
                                          The amount of data transferred to or from a storage device per second. You can use this parameter only if volumetype=‘gp3’.
                                      deleteOnTermination:
                                        type: boolean
                                        description: |
                                          Flag to delete the EBS on instance termination.
                                        example: false
                                      encrypted:
                                        type: boolean
                                        example: false
                                      iops:
                                        type: integer
                                        description: |
                                          Must be greater than or equal to 0.
                                        example: 1
                                      dynamicIops:
                                        type: object
                                        required:
                                          - baseSize
                                          - resource
                                          - sizePerResourceUnit
                                        description: |
                                          Set dynamic IOPS properties. When using this object, you cannot use the `iops` property. You must use one or the other.
                                          When `dynamicIops` is configured, the `volumeType` field must also be set.
                                        properties:
                                          baseSize:
                                            type: integer
                                            description: |
                                              Initial size for IOPS.
                                            example: 50
                                          resource:
                                            type: string
                                            enum:
                                              - CPU
                                              - memory
                                            description: |
                                              Selects which resource is used to calculate the dynamic IOPS (CPU or memory).
                                            example: CPU
                                          sizePerResourceUnit:
                                            type: integer
                                            description: |
                                              Additional size per resource unit (in IOPS).
                                              For example: if baseSize=50, and sizePerResourceUnit=20, and an instance with 2 CPU is launched,
                                              its IOPS size will be 90.
                                            example: 20
                                        example:
                                          baseSize: 50
                                          resource: CPU
                                          sizePerResourceUnit: 20
                                      kmsKeyId:
                                        type: string
                                        example: alias/aws/ebs
                                      snapshotId:
                                        type: string
                                        example: snap-abcdefghi111110
                                      volumeType:
                                        type: string
                                        description: |
                                          Specifies the EBS volume type. This field is required when either `dynamicIops` or `dynamicVolumeSize` is configured.
                                        enum:
                                          - standard
                                          - io1
                                          - io2
                                          - gp2
                                          - gp3
                                          - st1
                                          - sc1
                                        example: gp2
                                      volumeSize:
                                        type: integer
                                        description: |
                                          Set volume size (in GB). When using this property, you cannot use dynamicVolumeSize.\
                                          You must use one or the other. Volume size should be greater than or equal to the size configured in the AMI.
                                      dynamicVolumeSize:
                                        type: object
                                        required:
                                          - baseSize
                                          - resource
                                          - sizePerResourceUnit
                                        description: |
                                          Set dynamic volume size properties. When using this object, you cannot use volumeSize.\
                                          You must use one or the other. When `dynamicVolumeSize` is configured, the `volumeType` field must also be set.
                                        properties:
                                          baseSize:
                                            type: integer
                                            description: |
                                              Initial size per volume.
                                            example: 50
                                          resource:
                                            type: string
                                            example: CPU
                                          sizePerResourceUnit:
                                            type: integer
                                            description: |
                                              Additional size per resource unit (in GB).\
                                              For example: if baseSize=50, and sizePerResourceUnit=20, and an instance with 2 CPU is launched, its disk size will be 90 GB.
                                            example: 20
                                        example:
                                          baseSize: 50
                                          resource: CPU
                                          sizePerResourceUnit: 20
                                    example:
                                      throughput: 125
                                      deleteOnTermination: false
                                      encrypted: false
                                      iops: 1
                                      dynamicIops:
                                        baseSize: 50
                                        resource: CPU
                                        sizePerResourceUnit: 20
                                      kmsKeyId: alias/aws/ebs
                                      snapshotId: snap-abcdefghi111110
                                      volumeType: gp2
                                      dynamicVolumeSize:
                                        baseSize: 50
                                        resource: CPU
                                        sizePerResourceUnit: 20
                                example: &ref_90
                                  deviceName: /dev/xvda
                                  ebs:
                                    throughput: 125
                                    deleteOnTermination: false
                                    encrypted: false
                                    iops: 1
                                    dynamicIops:
                                      baseSize: 50
                                      resource: CPU
                                      sizePerResourceUnit: 20
                                    kmsKeyId: alias/aws/ebs
                                    snapshotId: snap-abcdefghi111110
                                    volumeType: gp2
                                    dynamicVolumeSize:
                                      baseSize: 50
                                      resource: CPU
                                      sizePerResourceUnit: 20
