  /ocean/gcp/k8s/launchSpec:
    summary: Ocean for GKE
    post:
      summary: Create VNG
      description: |
        Create a Virtual Node Group.
      operationId: OceanGKELaunchSpecCreate
      tags:
        - Ocean GKE
      parameters:
        - *ref_24
        - in: query
          name: initialNodes
          example: 1
          description: |
            When set to an integer greater than 0, a corresponding number of nodes will be launched from the  virtual node group created.
          schema:
            type: integer
            default: null
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - launchSpec
                  properties:
                    launchSpec: &ref_46
                      type: object
                      description: |
                        Ocean Cluster Virtual Node Group (VNG).
                      required:
                        - oceanId
                        - sourceImage
                        - metadata
                      properties:
                        oceanId:
                          type: string
                          example: o-1fff54ed
                          description: |
                            The Ocean cluster identifier. Required to create the virtual node group.
                        name:
                          type: string
                          example: lp_name
                          description: |
                            Set the name for the virtual node group.
                        sourceImage:
                          type: string
                          example: https://www.googleapis.com/compute/v1/projects/gke-node-images/global/images/container-v1-3-v20160517
                          description: |
                            Set the image URL. Can be null.
                        serviceAccount:
                          type: string
                          example: 265168459660-compute@developer.gserviceaccount.com
                          description: |
                            The account used by applications running on the VM to call GCP APIs.
                        rootVolumeSizeInGb:
                          type: integer
                          description: Set root volume size (in GB).
                          example: 8
                        rootVolumeType:
                          type: string
                          description: Set the root volume disk type.
                          example: pd-standard
                          enum:
                            - pd-standard
                            - pd-ssd
                            - pd-balanced
                            - pd-extreme
                            - hyperdisk-balanced
                            - hyperdisk-balanced-high-availability
                        metadata:
                          type: array
                          description: |
                            Add metadata to the cluster.
                          items:
                            type: object
                            required:
                              - key
                              - value
                            properties:
                              key:
                                type: string
                                description: Set the metadata key. Required for launchSpec.metadata.
                                example: key1
                              value:
                                type: string
                                description: Set the metadata name. Required for launchSpec.metadata.
                                example: value1
                            example:
                              key: key1
                              value: value1
                          example: &ref_38
                            - key: key1
                              value: value1
                            - key: key2
                              value: value2
                        instanceTypes:
                          type: array
                          description: |
                            An array of supported machine types for the virtual node group. Can be null.
                          items:
                            type: string
                          example: &ref_39
                            - n1-standard-1
                            - n1-standard-2
                        filters: *ref_34
                        preferredTypes: *ref_36
                        availabilityZones:
                          type: array
                          description: |
                            An array holding availability zones, this configures the availability zones the Ocean may launch instances in per VNG. Can be null.
                          items:
                            type: string
                          example: &ref_41
                            - us-central1-a
                            - us-central1-b
                        tags:
                          type: array
                          description: |
                            Every node launched from this VNG will have those tags. If the value is null, the nodes will have the tags configured at the cluster level.
                          items:
                            type: string
                          example: &ref_42
                            - gke-cluster-name-12345-node
                            - network-tag-1
                        taints:
                          type: array
                          description: Add taints to the virtual node group.
                          items:
                            type: object
                            required:
                              - key
                              - value
                              - effect
                            properties:
                              key:
                                type: string
                                description: Set taint key.
                              value:
                                type: string
                                description: Set taint value.
                              effect:
                                type: string
                                description: Set taint effect.
                          example: &ref_43
                            - key: taintKey
                              value: taintValue
                              effect: NoSchedule
                        labels:
                          type: array
                          description: An array of labels to add to the virtual node group. Only custom user labels are allowed, and not Kubernetes built-in labels or Spot internal labels.
                          items:
                            type: object
                            required:
                              - key
                              - value
                            properties:
                              key:
                                type: string
                                description: |
                                  Set label key.\
                                  The following are not allowed:
                                  * "kubernetes.io/hostname"
                                  * "failure-domain.beta.kubernetes.io/zone"
                                  * "topology.kubernetes.io/zone"
                                  * "failure-domain.beta.kubernetes.io/region"
                                  * "topology.kubernetes.io/region"
                                  * "beta.kubernetes.io/instance-type"
                                  * "node.kubernetes.io/instance-type"
                                  * "beta.kubernetes.io/os"
                                  * "kubernetes.io/os"
                                  * "beta.kubernetes.io/arch"
                                  * "kubernetes.io/arch"
                                  * "spotinst.io/node-lifecycle"
                                  * "spotinst.io/gpu-type"
                              value:
                                type: string
                                description: Set label value.
                          example: &ref_44
                            - key: env
                              value: test
                        autoScale:
                          type: object
                          description: |
                            Object specifying the automatic scaling of an Ocean VNG.
                          properties:
                            headrooms:
                              type: array
                              description: |
                                Set custom headroom per virtual node group. Provide a list of launchSpec.autoScale.headroom objects.
                              items:
                                type: object
                                required:
                                  - numOfUnits
                                properties:
                                  cpuPerUnit:
                                    type: integer
                                    description: |
                                      Configure the number of CPUs to allocate the headroom. CPUs are denoted in millicores, where 1000 millicores = 1 vCPU.
                                    example: 1000
                                  memoryPerUnit:
                                    type: integer
                                    description: |
                                      Configure the amount of memory (MiB) to allocate the headroom.
                                    example: 2048
                                  gpuPerUnit:
                                    type: integer
                                    description: |
                                      The amount of GPU to allocate per headroom unit.
                                    example: 0
                                  numOfUnits:
                                    type: integer
                                    description: |
                                      The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                    example: 3
                                example:
                                  cpuPerUnit: 1000
                                  memoryPerUnit: 2048
                                  gpuPerUnit: 0
                                  numOfUnits: 3
                            autoHeadroomPercentage:
                              type: integer
                              description: |
                                Number between 0-200 to control the headroom % of the specific Virtual Node Group. Effective when cluster.autoScaler.isAutoConfig=true is set on the Ocean cluster
                              example: 20
                            down:
                              type: object
                              description: |
                                Autoscaling scale down operations.
                              properties:
                                maxScaleDownPercentage:
                                  type: number
                                  format: double
                                  minimum: 0.1
                                  maximum: 100
                                  description: |
                                    The maximum percentage allowed to scale down in a single scaling action on the nodes running in a specific VNG. Allowed only if maxScaleDownPercentage is set to null at the cluster level.
                                  example: 30
                              example:
                                maxScaleDownPercentage: 30
                          example:
                            headrooms:
                              - cpuPerUnit: 1000
                                memoryPerUnit: 2048
                                gpuPerUnit: 0
                                numOfUnits: 3
                            autoHeadroomPercentage: 20
                            down:
                              maxScaleDownPercentage: 30
                        resourceLimits:
                          type: object
                          properties:
                            maxInstanceCount:
                              description: |
                                Option to set a maximum number of instances per virtual node group. Can be null. If set, the value must be greater than or equal to 0.
                              type: integer
                              example: 5
                            minInstanceCount:
                              description: |
                                Option to set a minimum number of instances per virtual node group.\
                                Can be null. If set, value must be greater than or equal to 0.
                              type: integer
                              example: 2
                          example:
                            maxInstanceCount: 5
                            minInstanceCount: 2
                        restrictScaleDown:
                          type: boolean
                          description: |
                            When set to True, VNG nodes will be treated as if all pods running have the [restrict-scale-down label](https://docs.flexera.com/spot/ocean/features/labels-and-taints).
                            Therefore, Ocean will not scale nodes down unless they are empty.
                          example: false
                        shieldedInstanceConfig: *ref_37
                        strategy: &ref_57
                          type: object
                          title: strategy
                          description: |
                            The Ocean virtual node group strategy object.
                          properties:
                            preemptiblePercentage:
                              type: integer
                              minimum: 0
                              maximum: 100
                              default: 100
                              description: |
                                The desired percentage of Spot/Preemptible instances out of all running instances for this VNG.\
                                Only available when the field is **not** set in the cluster directly (cluster.strategy.preemptiblePercentage).
                              example: 80
                            scalingOrientation:
                              type: string
                              default: BALANCED
                              description: |
                                Set this value to control the approach that Ocean takes when launching nodes.
                              enum:
                                - COST
                                - AVAILABILITY
                                - BALANCED
                            shouldUtilizeCommitments:
                              type: boolean
                              example: true
                              description: |
                                Enable committed use discounts utilization.
                            revertToPreferred:
                              type: object
                              description: |
                                Allow the replacement of instances to Preferred ones if available.
                              properties:
                                shouldPerform:
                                  type: boolean
                                  default: true
                                  description: |
                                    If enabled, replacements will be performed for your VNG. TRUE is the default.
                                maxBatchPercentage:
                                  type: integer
                                  minimum: 0
                                  maximum: 100
                                  default: 10
                                  description: |
                                    Decide on the % of instances that will be replaced simultaneously.
                          example: &ref_65
                            preemptiblePercentage: 80
                            shouldUtilizeCommitments: true
                        storage: &ref_49
                          type: object
                          title: storage
                          description: |
                            The Ocean virtual node group storage object.
                          properties:
                            localSsdCount:
                              type: integer
                              description: |
                                Defines the number of local SSDs to be attached per node for this VNG.

                                If instanceTypes are configured in this VNG, **all of them** must support the value of localSsdCount.
                                Otherwise, if the Ocean cluster has instanceTypes on a permit list, **at least one** must support the value of localSsdCount.

                                For more information about local SSDs, it is recommended to review the GCP documentation:
                                * [GCP Local SSD](https://cloud.google.com/compute/docs/disks#localssds)
                                * [Local SSDs and machine types](https://cloud.google.com/compute/docs/disks#local_ssd_machine_type_restrictions)
                                * [GKE Using local SSDs](https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/local-ssd#use)
                              example: 2
                            localSsdEphemeralStorageCount:
                              type: integer
                              description: |
                                Defines the number of local SSDs to be used as ephemeral storage per node for this VNG.

                                This field is derived from nodes enabled with the `--ephemeral-storage-local-ssd` flag in GKE,
                                which configures ephemeral storage (used for temporary data such as container images and writable layers)
                                backed by local SSDs instead of the boot disk.

                                **All** instanceTypes configured in this VNG must support the value of localSsdEphemeralStorageCount.
                                Otherwise, if the Ocean cluster has instanceTypes on a permit list, **at least one** must support the value of localSsdEphemeralStorageCount.

                                For more information about local SSDs with ephemeral storage, it is recommended to review the GCP documentation:
                                * [GKE ephemeral storage backed by local SSDs](https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/local-ssd#lssd-ephemeral-storage)
                              example: 2
                            localNvmeSsdCount:
                              type: integer
                              description: |
                                Defines the number of local NVMe SSDs to be attached per node in raw block mode for this VNG.

                                This field is derived from nodes enabled with the `--local-nvme-ssd-block` flag in GKE,
                                which attaches local NVMe SSDs as raw block devices, providing the highest possible storage performance.

                                **All** instanceTypes configured in this VNG must support the value of localNvmeSsdCount.
                                Otherwise, if the Ocean cluster has instanceTypes on a permit list, **at least one** must support the value of localNvmeSsdCount.

                                For more information about local NVMe SSDs, it is recommended to review the GCP documentation:
                                * [GKE local NVMe SSD block storage](https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/local-ssd-raw)
                              example: 2
                          example: &ref_55
                            localSsdCount: 2
                            localSsdEphemeralStorageCount: 2
                            localNvmeSsdCount: 2
                        scheduling: &ref_58
                          type: object
                          description: |
                            An object used to define scheduled tasks such as a manual headroom update.
                          title: Ocean Scheduling
                          properties:
                            tasks:
                              type: array
                              items:
                                type: object
                                title: Task Definition
                                required:
                                  - isEnabled
                                  - cronExpression
                                  - taskType
                                properties:
                                  isEnabled:
                                    type: boolean
                                    example: true
                                    description: |
                                      Describes whether the task is enabled. When True, the task runs. When False, it does not run. Required for launchSpec.scheduling.tasks. In case automatic headroom is configured, please make sure to set autoScaler.enableAutomaticAndManualHeadroom on Ocean level to true in order to make sure that the manual headroom would be affective.
                                  cronExpression:
                                    type: string
                                    example: 0 1 * * *
                                    description: |
                                      A valid cron expression. For example : " * * * * * ". The cron job runs in UTC time and is in Unix cron format. (See the Cron Expression Validator Script.)
                                  taskType:
                                    type: string
                                    example: manualHeadroomUpdate
                                    enum:
                                      - manualHeadroomUpdate
                                    description: |
                                      The activity that you are scheduling. Valid values: "manualHeadroomUpdate". Required for launchSpec.scheduling.tasks.
                                  config:
                                    description: The config of this scheduled task. Depends on the value of `taskType`.
                                    oneOf:
                                      - type: object
                                        title: manualHeadroomUpdate
                                        required:
                                          - headrooms
                                        properties:
                                          headrooms:
                                            description: |
                                              Set custom headroom per VNG. Provide a list of launchSpec.autoscale.headroom objects.
                                            type: array
                                            items:
                                              type: object
                                              properties:
                                                cpuPerUnit:
                                                  description: |
                                                    Configure the number of CPUs to allocate the headroom. CPUs are denoted in millicores, where 1000 millicores = 1 vCPU.
                                                  type: integer
                                                memoryPerUnit:
                                                  description: |
                                                    Configure the amount of memory (MiB) to allocate the headroom.
                                                  type: integer
                                                numOfUnits:
                                                  description: |
                                                    The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                                  type: integer
                                                gpuPerUnit:
                                                  type: integer
                                                  description: |
                                                    Amont of GPU to allocate for headroom unit.
                                            example:
                                              - cpuPerUnit: 1024
                                                memoryPerUnit: 512
                                                gpuPerUnit: 0
                                                numOfUnits: 1
                                example:
                                  isEnabled: true
                                  cronExpression: 0 1 * * *
                                  taskType: manualHeadroomUpdate
                          example: &ref_66
                            tasks:
                              - isEnabled: true
                                cronExpression: 0 1 * * *
                                taskType: manualHeadroomUpdate
