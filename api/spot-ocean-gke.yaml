  /ocean/gcp/k8s/cluster/gke/import:
    summary: Ocean for GKE
    post:
      summary: Import GKE Cluster To Ocean
      description: |
        Returns an Ocean Cluster configuration, and optionally Virtual Node Group (VNG) configurations based on a given GKE Cluster and its Node Pools.\
        The returned values ("Imported Cluster/VNGs") can then be used as inputs to the Create Cluster/VNG APIs in order to create the respectful resources.
      operationId: oceanGkeImportGkeToOcean
      tags:
        - Ocean GKE
      parameters:
        - *ref_24
        - in: query
          name: location
          schema:
            type: string
          required: true
          example: us-central1-a
          description: |
            Location GKE Cluster Master.
        - in: query
          name: clusterName
          schema:
            type: string
          required: true
          example: test-gke
          description: |
            Name of the GKE Cluster.
        - in: query
          name: nodePoolName
          schema:
            type: string
          example: test
          description: |
            Name of the Node Pool to use as a default for the Cluster configuration.
        - in: query
          name: includeLaunchSpecs
          example: true
          description: |
            When set to "true", GKE cluster node pools will be imported to Ocean custom VNG ("customLaunchSpec") configurations.
          schema:
            type: boolean
            default: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - cluster
                  properties:
                    cluster:
                      type: object
                      description: The specification of the Ocean cluster.
                      required:
                        - compute
                      properties:
                        name:
                          type: string
                          example: test
                          description: |
                            Add a name for the Ocean cluster.
                        controllerClusterId:
                          type: string
                          example: test-123124
                          description: |
                            Enter the Ocean cluster identifier.
                        capacity: *ref_12
                        instanceTypes:
                          type: object
                          description: The type of instances that may or may not be a part of the Ocean cluster.
                          properties:
                            whitelist:
                              type: array
                              description: |
                                Instance types allowed in the Ocean cluster. Cannot be configured if a deny list is configured.
                              items:
                                type: string
                              example: &ref_86
                                - n1-standard-2
                            blacklist:
                              type: array
                              description: |
                                Instance types to avoid launching in the Ocean cluster. Cannot be configured if a permit list is configured.
                              items:
                                type: string
                              example: &ref_87
                                - n2d-highcpu-96
                          example:
                            whitelist: *ref_86
                            blacklist: *ref_87
                        autoScaler: *ref_10
                        availabilityZones:
                          type: array
                          description: |
                            An array holding availability zones, this configures the availability zones the Ocean may launch instances in per VNG. Can be null.
                          items:
                            type: string
                          example: &ref_89
                            - us-central1-a
                            - us-central1-b
                        backendServices:
                          type: array
                          items:
                            type: object
                            required:
                              - backendServiceName
                            properties:
                              backendServiceName:
                                type: string
                                example: bserv-2
                              locationType:
                                type: string
                                enum:
                                  - regional
                                  - global
                                example: regional
                              scheme:
                                type: string
                                description: |
                                  Required if locationType is set to "regional".
                                enum:
                                  - EXTERNAL
                                  - INTERNAL
                                example: EXTERNAL
                              namedPorts:
                                type: object
                                required:
                                  - name
                                  - ports
                                properties:
                                  name:
                                    type: string
                                    example: https
                                  ports:
                                    type: array
                                    items:
                                      type: integer
                                    example: &ref_88
                                      - 443
                                      - 8443
                                example:
                                  name: https
                                  ports: *ref_88
                            example:
                              backendServiceName: bserv-2
                              locationType: regional
                              scheme: EXTERNAL
                              namedPorts:
                                name: https
                                ports: *ref_88
                      example:
                        name: test
                        controllerClusterId: test-123124
                        capacity: *ref_19
