                                  example: 30
                        resourceLimits:
                          type: object
                          properties:
                            maxInstanceCount:
                              description: |
                                Option to set a maximum number of instances per virtual node group. Can be null. If set, the value must be greater than or equal to 0.
                              type: integer
                              example: 5
                            minInstanceCount:
                              description: |
                                Option to set a minimum number of instances per virtual node group.\
                                Can be null. If set, value must be greater than or equal to 0.
                              type: integer
                              example: 2
                        restrictScaleDown:
                          type: boolean
                          description: |
                            When set to True, VNG nodes will be treated as if all pods running have the [restrict-scale-down label](https://docs.flexera.com/spot/ocean/features/labels-and-taints).
                            Therefore, Ocean will not scale nodes down unless they are empty.
                          example: false
                        shieldedInstanceConfig: *ref_14
                        strategy: &ref_19
