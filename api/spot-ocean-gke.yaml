                                  cronExpression:
                                    type: string
                                    example: 0 1 * * *
                                    description: |
                                      A valid cron expression. For example : " * * * * * ". The cron job runs in UTC time and is in Unix cron format. (See the Cron Expression Validator Script.)
                                  taskType:
                                    type: string
                                    example: manualHeadroomUpdate
                                    enum:
                                      - manualHeadroomUpdate
                                    description: |
                                      The activity that you are scheduling. Valid values: "manualHeadroomUpdate". Required for launchSpec.scheduling.tasks.
                                  config:
                                    description: The config of this scheduled task. Depends on the value of `taskType`.
                                    oneOf:
                                      - type: object
                                        title: manualHeadroomUpdate
                                        required:
                                          - headrooms
                                        properties:
                                          headrooms:
                                            description: |
                                              Set custom headroom per VNG. Provide a list of launchSpec.autoscale.headroom objects.
                                            type: array
                                            items:
                                              type: object
                                              properties:
                                                cpuPerUnit:
                                                  description: |
                                                    Configure the number of CPUs to allocate the headroom. CPUs are denoted in millicores, where 1000 millicores = 1 vCPU.
                                                  type: integer
                                                memoryPerUnit:
                                                  description: |
                                                    Configure the amount of memory (MiB) to allocate the headroom.
                                                  type: integer
                                                numOfUnits:
                                                  description: |
                                                    The number of units to retain as headroom, where each unit has the defined headroom CPU and memory.
                                                  type: integer
                                                gpuPerUnit:
                                                  type: integer
                                                  description: |
                                                    Amont of GPU to allocate for headroom unit.
                                            example:
                                              - cpuPerUnit: 1024
                                                memoryPerUnit: 512
                                                gpuPerUnit: 0
                                                numOfUnits: 1
                        createdAt:
                          type: string
                          readOnly: true
                          format: date-time
                          example: '2019-06-03T08:13:08.000Z'
                        updatedAt:
                          type: string
                          readOnly: true
                          format: date-time
                          example: '2019-06-10T15:06:13.000Z'
                        networkInterfaces:
                          type: array
