                  properties:
                    roll:
                      allOf:
                        - &ref_23
                          type: object
                          properties:
                            batchSizePercentage:
                              type: integer
                              description: |
                                Value is a percentage to set the size of a batch in a roll. Valid values are 0-100.
                              example: 20
                        - &ref_24
                          type: object
                          properties:
                            comment:
                              type: string
                              description: |
                                Add a comment description for the roll. The comment is limited to 256 chars.
                              example: This is why I deployed my cluster.
                        - &ref_25
                          type: object
                          properties:
                            respectPdb:
                              type: boolean
                              description: |
