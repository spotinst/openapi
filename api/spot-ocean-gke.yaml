                                  - INTERNAL
                                example: EXTERNAL
                              namedPorts:
                                type: object
                                required:
                                  - name
                                  - ports
                                properties:
                                  name:
                                    type: string
                                    example: https
                                  ports:
                                    type: array
                                    items:
                                      type: integer
                                    example:
                                      - 443
                                      - 8443
      responses:
