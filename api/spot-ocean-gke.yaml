                                maxBatchPercentage:
                                  type: integer
                                  minimum: 0
                                  maximum: 100
                                  default: 10
                                  description: |
                                    Decide on the % of instances that will be replaced simultaneously.
                        storage: &ref_17
                          type: object
                          title: storage
                          description: |
                            The Ocean virtual node group storage object.
                          properties:
                            localSsdCount:
                              type: integer
                              description: |
                                Defines the number of local SSDs to be attached per node for this VNG.

                                If instanceTypes are configured in this VNG, **all of them** must support the value of localSsdCount.
                                Otherwise, if the Ocean cluster has instanceTypes on a permit list, **at least one** must support the value of localSsdCount.

                                For more information about local SSDs, it is recommended to review the GCP documentation:
                                * [GCP Local SSD](https://cloud.google.com/compute/docs/disks#localssds)
                                * [Local SSDs and machine types](https://cloud.google.com/compute/docs/disks#local_ssd_machine_type_restrictions)
                                * [GKE Using local SSDs](https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/local-ssd#use)
                              example: 2
                            localSsdEphemeralStorageCount:
                              type: integer
                              description: |
                                Defines the number of local SSDs to be used as ephemeral storage per node for this VNG.

                                This field is derived from nodes enabled with the `--ephemeral-storage-local-ssd` flag in GKE,
                                which configures ephemeral storage (used for temporary data such as container images and writable layers)
                                backed by local SSDs instead of the boot disk.

                                **All** instanceTypes configured in this VNG must support the value of localSsdEphemeralStorageCount.
                                Otherwise, if the Ocean cluster has instanceTypes on a permit list, **at least one** must support the value of localSsdEphemeralStorageCount.

                                For more information about local SSDs with ephemeral storage, it is recommended to review the GCP documentation:
                                * [GKE ephemeral storage backed by local SSDs](https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/local-ssd#lssd-ephemeral-storage)
                              example: 2
                            localNvmeSsdCount:
                              type: integer
                              description: |
                                Defines the number of local NVMe SSDs to be attached per node in raw block mode for this VNG.

                                This field is derived from nodes enabled with the `--local-nvme-ssd-block` flag in GKE,
                                which attaches local NVMe SSDs as raw block devices, providing the highest possible storage performance.

                                **All** instanceTypes configured in this VNG must support the value of localNvmeSsdCount.
                                Otherwise, if the Ocean cluster has instanceTypes on a permit list, **at least one** must support the value of localNvmeSsdCount.

                                For more information about local NVMe SSDs, it is recommended to review the GCP documentation:
                                * [GKE local NVMe SSD block storage](https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/local-ssd-raw)
                              example: 2
                        scheduling: &ref_20
                          type: object
                          description: |
