  /ocean/gcp/k8s/cluster/{oceanClusterId}/aggregatedCosts:
    post:
      summary: Get Cluster Aggregated Detailed Costs
      description: |
        Provides Kubernetes cluster resource usage and costs over a time interval which can be grouped and/or filtered by label/annotaion.\
        For example - application name (webapp, backend), environment (production, staging), version etc.\
        The response will contain a breakdown of the cluster resource costs($) in terms of compute (CPU, memory) and storage.
        The response will group the cluster usage costs based on preselected default of application namespace or user selected label or annotation.\
        Within the group, resource costs are broken down per resource kind (Deployment, DaemonSet etc.).

        Time Rounding Down: The CostAnalysis API applies rounding down to the hours provided during the call.\
        For example, the value 1707004799099 (In GMT) representing Saturday, February 3, 2024, 23:59:59.099 is rounded down to Saturday, February 3, 2024, 23:00:00.000, resulting in the omission of one hour of cost.
      operationId: oceanGkeK8sClusterAggregatedDetailedCosts
      tags:
        - Ocean GKE
      parameters:
        - *ref_10
        - *ref_7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - endTime
                    - startTime
                  properties:
                    startTime:
                      type: string
                      example: '2018-06-20T11:35:02.745Z'
                      description: |
                        Beginning date value using either the date format "yyyy-MM-dd'T'HH:mm:ss'Z'" or ms "1494751821472".
                    endTime:
                      type: string
                      example: '2018-06-22T11:30:01.745Z'
                      description: |
                        End date value using either the date format "yyyy-MM-dd'T'HH:mm:ss'Z'" or ms "1494751821472".
                    groupBy:
                      type: string
                      description: |
                        The parameter we want to group the costs by.
                      default: namespace
                      example: namespace.label.env
                      enum:
                        - namespace
                        - namespace.label.${labelKey}
                        - resource.label.${labelKey}
                        - resource.annotation.${annotationKey}
                        - namespace.annotation.${annotationKey}
                    filter:
                      type: object
                      description: Describe how to filter the costs. Optional field.
                      required:
                        - scope
                        - conditions
                      properties:
                        scope:
                          type: string
                          enum:
                            - namespace
                            - resource
                        conditions:
                          type: object
                          required:
                            - anyMatch
                          properties:
                            anyMatch:
                              type: array
                              description: |
                                Array of conditions set that OR operator is applied between them.
                              items:
                                type: object
                                required:
                                  - allMatch
                                properties:
                                  allMatch:
                                    type: array
                                    description: |
                                      Array of conditions that AND operator is applied between them.\
                                      For example, (label env equals prod) AND (label app exists)
                                    items:
                                      type: object
                                      description: The basic expression of a condition
                                      required:
                                        - type
                                        - key
                                        - operator
                                      properties:
                                        type:
                                          type: string
                                          enum:
                                            - label
                                            - annotation
                                        key:
                                          type: string
                                          description: |
                                            May be any string, but shouldn't be empty.
                                          example: env
                                        operator:
                                          type: string
                                          enum:
                                            - equals
                                            - notEquals
                                            - exists
                                            - notExists
                                        value:
                                          type: string
                                          description: |
                                            Required whenever the operator is "equals" or "notEquals".
                                          example: prod
                              example:
                                - allMatch:
                                    - type: label
                                      key: env
                                      operator: equals
                                      value: prod
                                    - type: label
                                      key: app
                                      operator: exists
                                - allMatch:
                                    - type: annotation
                                      key: meta.data
                                      operator: exists
      responses:
        '200':
          description: Ocean Cluster Aggregated Detailed Costs Response
          content:
            application/json:
              schema:
                allOf:
                  - *ref_8
                  - type: object
                    properties:
                      request:
                        type: object
                        properties:
                          url:
                            example: /ocean/gcp/k8s/cluster/o-abcd1234/aggregatedCosts
                          method:
                            example: POST
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                result:
                                  type: object
                                  properties:
                                    totalForDuration:
                                      type: object
                                      properties:
                                        startTime:
                                          type: string
                                          example: '2018-06-20T11:35:01.745Z'
                                          description: |
                                            Beginning date value using either the date format "yyyy-MM-dd'T'HH:mm:ss'Z'" or ms "1494751821472".
                                        endTime:
                                          type: string
                                          example: '2018-06-22T11:30:01.745Z'
                                          description: |
                                            End date value using either the date format "yyyy-MM-dd'T'HH:mm:ss'Z'" or ms "1494751821472".
                                        summary:
                                          type: object
                                          properties:
                                            total:
                                              type: number
                                              example: 41772.882658036
                                              description: The total costs of cluster in a given time range
                                            compute:
                                              type: object
                                              properties:
                                                total:
                                                  type: number
                                                  example: 40668.1299631538
                                                  description: The total compute costs of the cluster in a given time range
                                                workloads:
                                                  type: object
                                                  properties:
                                                    total:
                                                      type: number
                                                      example: 40668.1299631538
                                                headroom:
                                                  type: object
                                                  properties:
                                                    total:
                                                      type: number
                                                      example: 0
                                            storage:
                                              type: object
                                              properties:
                                                total:
                                                  type: number
                                                  example: 1104.7526948819
                                                  description: The total storage costs of the cluster in given time range
                                                block:
                                                  type: object
                                                  properties:
                                                    total:
                                                      type: number
                                                      example: 1104.7526948819
                                                    pdPv:
                                                      type: object
                                                      properties:
                                                        total:
                                                          type: number
                                                          example: 1104.7526948819
                                                    pdBoot:
                                                      type: object
                                                      properties:
                                                        total:
                                                          type: number
                                                          example: 0
                                        detailedCosts:
                                          type: object
                                          properties:
                                            groupedBy:
                                              type: string
                                              example: n.l.name
                                            aggregations:
                                              type: object
                                              description: |
                                                Contains aggregation for each group by value.
                                              additionalProperties:
                                                type: object
                                                description: For example - if group by is namespace so each property name will a namesapce in the cluster.
                                                properties:
                                                  summary:
                                                    type: object
                                                    properties:
                                                      total:
                                                        type: number
                                                        example: 425.23778
                                                      compute:
                                                        type: object
                                                        properties:
                                                          total:
                                                            type: number
                                                            example: 125.23778
                                                      storage:
                                                        type: object
                                                        properties:
