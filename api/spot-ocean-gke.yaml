                          method:
                            example: POST
                      response:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                cluster:
                                  type: object
                                  description: The specification of the Ocean cluster.
                                  properties:
                                    name:
                                      type: string
                                      example: test
                                      description: |
                                        Add a name for the Ocean cluster.
                                    controllerClusterId:
                                      type: string
                                      example: test-123124
                                      description: |
