                          type: array
                          items:
                            type: object
                            required:
                              - backendServiceName
                            properties:
                              backendServiceName:
                                type: string
                                example: bserv-2
                              locationType:
                                type: string
                                enum:
                                  - regional
                                  - global
                                example: regional
                              scheme:
                                type: string
                                description: |
                                  Required if locationType is set to "regional".
                                enum:
