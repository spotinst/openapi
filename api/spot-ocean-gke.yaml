          name: location
          schema:
            type: string
          required: true
          example: us-central1-a
          description: |
            Location GKE Cluster Master.
        - in: query
          name: clusterName
          schema:
            type: string
          required: true
          example: test-gke
          description: |
            Name of the GKE Cluster.
        - in: query
          name: nodePoolName
          schema:
            type: string
          example: test
          description: |
            Name of the Node Pool to use as a default for the Cluster configuration.
        - in: query
          name: includeLaunchSpecs
          example: true
          description: |
            When set to "true", GKE cluster node pools will be imported to Ocean custom VNG ("customLaunchSpec") configurations.
          schema:
            type: boolean
            default: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - cluster
                  properties:
                    cluster:
                      type: object
                      description: The specification of the Ocean cluster.
                      required:
                        - compute
                      properties:
                        name:
                          type: string
                          example: test
                          description: |
                            Add a name for the Ocean cluster.
                        controllerClusterId:
                          type: string
                          example: test-123124
                          description: |
                            Enter the Ocean cluster identifier.
                        capacity: *ref_2
                        instanceTypes:
                          type: object
                          description: The type of instances that may or may not be a part of the Ocean cluster.
                          properties:
                            whitelist:
                              type: array
                              description: |
                                Instance types allowed in the Ocean cluster. Cannot be configured if a deny list is configured.
                              items:
                                type: string
                              example:
                                - n1-standard-2
                            blacklist:
                              type: array
                              description: |
                                Instance types to avoid launching in the Ocean cluster. Cannot be configured if a permit list is configured.
                              items:
                                type: string
                              example:
                                - n2d-highcpu-96
                        autoScaler: *ref_0
                        availabilityZones:
                          type: array
                          description: |
